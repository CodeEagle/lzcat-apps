# Skeleton — to land in template:.github/workflows/ once approved.
# Phase F5: browser verification after install.

name: Auto-Verify

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Migration slug to verify"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: verify-${{ inputs.slug }}
  cancel-in-progress: true   # newer verify runs supersede stale ones

jobs:
  verify:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/codeeagle/lzcat-bb-browser:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GH_PAT }}
    timeout-minutes: 30
    env:
      SLUG: ${{ inputs.slug }}
      GH_TOKEN: ${{ secrets.GH_PAT }}
      LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
      LAZYCAT_BOX_DOMAIN: ${{ secrets.LAZYCAT_BOX_DOMAIN }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: migration/${{ inputs.slug }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Capture screenshots + functional smoke
        run: |
          python3 scripts/capture_web_screenshot.py --slug "$SLUG"
          python3 scripts/web_probe.py --slug "$SLUG"
          python3 scripts/functional_checker.py --slug "$SLUG"
          python3 scripts/record_browser_acceptance.py --slug "$SLUG"

      - name: Commit browser acceptance + screenshots
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.function.users.noreply.github.com"
          git add apps/${SLUG}/.browser-acceptance.json \
                  apps/${SLUG}/store-submission/assets/screenshots/ || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(${SLUG}): record browser acceptance run"
            git push origin migration/${SLUG}
          fi

      - name: Update Project status
        if: always()
        run: |
          status=Awaiting-Human
          if [ "${{ job.status }}" = "failure" ]; then
            status=Blocked
          fi
          python3 scripts/project_board.py update "$SLUG" --status="$status"
