application:
  public_path:
    - /
  subdomain: piclaw
  upstreams:
    -
      backend: http://pibox:8080/
      location: /
author: rcarmo
description: Self-hosted Pi Coding Agent workspace with browser chat, session management, and persistent project storage.
homepage: https://github.com/rcarmo/piclaw
license: MIT
locales:
  en:
    description: Self-hosted Pi Coding Agent workspace with browser chat, session management, and persistent project storage.
    name: PiClaw
  zh:
    description: 在懒猫微服中运行的自托管 Pi Coding Agent 工作台，支持浏览器聊天、会话管理和持久化项目工作区。
    name: PiClaw
lzc-sdk-version: '0.1'
min_os_version: 1.3.8
name: PiClaw
package: fun.selfstudio.app.migration.piclaw
services:
  pibox:
    binds:
      - /lzcapp/var/data/piclaw/pibox/config:/config
      - /lzcapp/var/data/piclaw/pibox/workspace:/workspace
    environment:
      - TERM=xterm-256color
      - PUID=1000
      - PGID=1000
      - PICLAW_WEB_PORT=8080
      - PICLAW_AUTOSTART=1
    image: registry.lazycat.cloud/placeholder/piclaw:pibox
version: 2.0.1
