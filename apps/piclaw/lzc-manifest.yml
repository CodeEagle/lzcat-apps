application:
  public_path:
    - /
  subdomain: piclaw
  upstreams:
    -
      backend: http://pibox:8080/
      location: /
author: rcarmo
description: I'm going to build my own OpenClaw, with blackjack
homepage: https://github.com/rcarmo/piclaw
license: MIT
locales:
  en:
    description: I'm going to build my own OpenClaw, with blackjack
    name: piclaw
  zh:
    description: （迁移初稿）Piclaw 的懒猫微服版本
    name: piclaw
lzc-sdk-version: '0.1'
min_os_version: 1.3.8
name: piclaw
package: fun.selfstudio.app.migration.piclaw
services:
  pibox:
    binds:
      - /lzcapp/var/data/piclaw/pibox/config:/config
      - /lzcapp/var/data/piclaw/pibox/workspace:/workspace
    environment:
      - TERM=xterm-256color
      - PUID=1000
      - PGID=1000
      - PICLAW_WEB_PORT=8080
      - PICLAW_AUTOSTART=1
    image: registry.lazycat.cloud/placeholder/piclaw:pibox
version: 2.0.1
