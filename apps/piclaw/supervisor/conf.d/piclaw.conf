; LazyCat overlay for Piclaw.
;
; LazyCat bind-mounts /workspace as root:root. Piclaw itself runs as the
; unprivileged agent user and creates /workspace/logs during startup, so prepare
; the dedicated app volume as root first and then drop privileges for the app.

[program:piclaw]
command=/bin/bash -lc 'mkdir -p /workspace/logs /workspace/.piclaw/store /workspace/.piclaw/data /workspace/.pi/agent/sessions; chown agent:agent /workspace /config 2>/dev/null || true; chown -R agent:agent /workspace/logs /workspace/.piclaw /workspace/.pi /config/.pi 2>/dev/null || true; exec sudo -E -u agent /usr/local/bin/run-piclaw.sh'
user=root
directory=/home/agent
autostart=true
autorestart=true
startsecs=3
startretries=10
stopsignal=INT
stopwaitsecs=60
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/piclaw/piclaw.stdout.log
stderr_logfile=/var/log/piclaw/piclaw.stderr.log
environment=HOME="/home/agent",BUN_INSTALL="/usr/local/lib/bun",PATH="/usr/local/lib/bun/bin:/home/linuxbrew/.linuxbrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",PICLAW_WEB_TERMINAL_ENABLED="1"
