lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.cc-gateway
version: '0.1.1'
min_os_version: 1.3.8
name: cc-gateway
description: AI API identity gateway — reverse proxy that normalizes device fingerprints and telemetry for privacy-preserving API proxying
license: MIT
homepage: https://github.com/motiful/cc-gateway
author: motiful
application:
  subdomain: cc-gateway
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://nginx:80/
services:
  nginx:
    image: nginx:alpine
    binds:
      - /lzcapp/pkg/content/nginx.conf:/etc/nginx/nginx.conf
      - /lzcapp/pkg/content/ui:/usr/share/nginx/html
    depends_on:
      - gateway
  gateway:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/cc-gateway-gateway:69d6ef354d80c982
    binds:
      - /lzcapp/var/data/cc-gateway:/app/data
    setup_script: |
      rm -rf /app/config.yaml 2>/dev/null || true
      # Initialize missing persistent data
      if [ ! -f /app/data/config.yaml ]; then
        cp /lzcapp/pkg/content/config.example.yaml /app/data/config.yaml
      fi
      
      # Use Node.js to safely rewrite user parameters into config.yaml
      # Every time Deploy UI is used, this template renders new values and injects them
      node -e '
      const fs = require("fs");
      let c = fs.readFileSync("/app/data/config.yaml", "utf8");
      
      c = c.replace(/email:\s*".*?"/, `email: "{{ .U.user_email }}"`);
      c = c.replace(/refresh_token:\s*".*?"/, `refresh_token: "{{ .U.oauth_refresh_token }}"`);
      c = c.replace(/device_id:\s*".*?"/, `device_id: "{{ stable_secret "cc_device_id" | substr 0 64 }}"`);
      c = c.replace(/(client_tokens:\s*\n\s*-\s*)".*?"/, `$1"{{ .U.client_token }}"`);
      c = c.replace(/(auth:\s*\n\s*tokens:\s*\n\s*-\s*)".*?"/, `$1"{{ .U.auth_token }}"`);
      
      // Auto-migrate structural changes natively
      if(!c.includes("oauth:")) {
         c = c.replace(/auth:/, "oauth:");
         c += "\nauth:\n  tokens:\n    - \"{{ .U.auth_token }}\"\n";
      }
      
      fs.writeFileSync("/app/data/config.yaml", c);
      '
      
      ln -sf /app/data/config.yaml /app/config.yaml
locales:
  en:
    name: cc-gateway
    description: AI API identity gateway — reverse proxy that normalizes device fingerprints and telemetry for privacy-preserving API proxying
  zh:
    name: cc-gateway
    description: Cc Gateway 的懒猫微服版本（自带 Cyberpunk 前端教程）
