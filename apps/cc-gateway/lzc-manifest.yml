lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.cc-gateway
version: '0.1.1'
min_os_version: 1.3.8
name: cc-gateway
description: AI API identity gateway — reverse proxy that normalizes device fingerprints and telemetry for privacy-preserving API proxying
license: MIT
homepage: https://github.com/motiful/cc-gateway
author: motiful
application:
  subdomain: cc-gateway
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://nginx:80/
services:
  nginx:
    image: nginx:alpine
    binds:
      - /lzcapp/pkg/content/nginx.conf:/etc/nginx/nginx.conf
      - /lzcapp/pkg/content/ui:/usr/share/nginx/html
    depends_on:
      - gateway
  gateway:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/cc-gateway-gateway:fa2a2808b1d3c339
    binds:
      - /lzcapp/var/data/cc-gateway:/app/data
    setup_script: |
      rm -rf /app/config.yaml 2>/dev/null || true
      if [ ! -f /app/data/config.yaml ]; then
        if [ -f /app/config.example.yaml ]; then
          cp /app/config.example.yaml /app/data/config.yaml
        else
          cat << 'CONFEOF' > /app/data/config.yaml
      gateway:
        client_tokens:
          - "YOUR_LOCAL_TOKEN"
      identity:
        device_id: "104e14cfe0075eb20755b4fb9b6045620803517c2f6d6ed95818d04260000000"
        email: "anonymous@example.com"
      auth:
        refresh_token: "YOUR_EXTRACTED_REFRESH_TOKEN_HERE"
        tokens:
          - "YOUR_CLAUDE_SESSION_TOKEN_HERE"
      CONFEOF
        fi
      fi
      ln -sf /app/data/config.yaml /app/config.yaml
locales:
  en:
    name: cc-gateway
    description: AI API identity gateway — reverse proxy that normalizes device fingerprints and telemetry for privacy-preserving API proxying
  zh:
    name: cc-gateway
    description: Cc Gateway 的懒猫微服版本（自带 Cyberpunk 前端教程）
