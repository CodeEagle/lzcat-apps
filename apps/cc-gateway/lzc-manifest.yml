lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.cc-gateway
version: '0.1.1'
min_os_version: 1.3.8
name: cc-gateway
description: AI API identity gateway — reverse proxy that normalizes device fingerprints and telemetry for privacy-preserving API proxying
license: MIT
homepage: https://github.com/motiful/cc-gateway
author: motiful
application:
  subdomain: cc-gateway
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://nginx:80/
services:
  nginx:
    image: nginx:alpine
    binds:
      - /lzcapp/pkg/content/nginx.conf:/etc/nginx/nginx.conf
      - /lzcapp/pkg/content/ui:/usr/share/nginx/html
    depends_on:
      - gateway
  gateway:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/cc-gateway-gateway:2a2d7660ba7665d6
    binds:
      - /lzcapp/var/data/cc-gateway/config.yaml:/app/config.yaml
    setup_script: |
      mkdir -p /lzcapp/var/data/cc-gateway
      if [ ! -f /lzcapp/var/data/cc-gateway/config.yaml ]; then
          cp /lzcapp/pkg/content/config.example.yaml /lzcapp/var/data/cc-gateway/config.yaml
      fi
locales:
  en:
    name: cc-gateway
    description: AI API identity gateway — reverse proxy that normalizes device fingerprints and telemetry for privacy-preserving API proxying
  zh:
    name: cc-gateway
    description: Cc Gateway 的懒猫微服版本（自带 Cyberpunk 前端教程）
