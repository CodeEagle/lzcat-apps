lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.cc-gateway
version: '0.1.1'
min_os_version: 1.3.8
name: cc-gateway
description: AI API identity gateway — reverse proxy that normalizes device fingerprints and telemetry for privacy-preserving API proxying
license: MIT
homepage: https://github.com/motiful/cc-gateway
author: motiful
application:
  subdomain: cc-gateway
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://nginx:80/
services:
  nginx:
    image: nginx:alpine
    binds:
      - /lzcapp/pkg/content/nginx.conf:/etc/nginx/nginx.conf
      - /lzcapp/pkg/content/ui:/usr/share/nginx/html
    depends_on:
      - gateway
  gateway:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/cc-gateway-gateway:bdebf484fbd677c9
    binds:
      - /lzcapp/var/data/cc-gateway:/app/data
    setup_script: |
      rm -rf /app/config.yaml 2>/dev/null || true
      # Generate initial config dynamically using LazyCat advanced manifest render parameters
      if [ ! -f /app/data/config.yaml ]; then
        cat << 'CONFEOF' > /app/data/config.yaml
      gateway:
        client_tokens:
          - "{{ .U.client_token }}"
      identity:
        device_id: "{{ stable_secret "cc_device_id" | substr 0 64 }}"
        email: "{{ .U.user_email }}"
      auth:
        tokens:
          - "{{ .U.auth_token }}"
      oauth:
        refresh_token: "{{ .U.oauth_refresh_token }}"
      logging:
        level: "info"
        audit: true
      CONFEOF
      fi

      # Auto-migrate legacy structures
      if grep -q "^auth:" /app/data/config.yaml && ! grep -q "^oauth:" /app/data/config.yaml; then
        sed -i 's/^auth:/oauth:/g' /app/data/config.yaml || true
      fi
      
      if ! grep -q "^auth:" /app/data/config.yaml; then
        echo "" >> /app/data/config.yaml
        echo "auth:" >> /app/data/config.yaml
        echo "  tokens:" >> /app/data/config.yaml
        echo "    - \"{{ .U.auth_token }}\"" >> /app/data/config.yaml
      else
        if ! grep -E -q "^  tokens:" /app/data/config.yaml; then
          sed -i '/^auth:/a \ \ tokens:\n    - "{{ .U.auth_token }}"' /app/data/config.yaml
        fi
      fi
      ln -sf /app/data/config.yaml /app/config.yaml
locales:
  en:
    name: cc-gateway
    description: AI API identity gateway — reverse proxy that normalizes device fingerprints and telemetry for privacy-preserving API proxying
  zh:
    name: cc-gateway
    description: Cc Gateway 的懒猫微服版本（自带 Cyberpunk 前端教程）
