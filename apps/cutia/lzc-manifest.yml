lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.cutia
version: 0.1.0
min_os_version: 1.3.8
name: Cutia
description: (LazyCat Auto-build) Privacy-first, open-source video editing in browser
license: MIT
homepage: https://cutia.msgbyte.com
author: msgbyte
application:
  subdomain: cutia
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://cutia:3000/
  environment:
    - DATABASE_URL=postgresql://cutia:cutia@postgres:5432/cutia
    - BETTER_AUTH_URL=https://${LAZYCAT_APP_DOMAIN}
    - NODE_ENV=production
services:
  cutia:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/cutia:2bb0621ef9b4a637
    environment:
      - DATABASE_URL=postgresql://cutia:cutia@postgres:5432/cutia
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://${LAZYCAT_APP_DOMAIN}
      - UPSTASH_REDIS_REST_URL=http://redis:8079
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - postgres
      - redis
    binds:
      - /lzcapp/var/data/cutia:/data
    command: sh -lc 'mkdir -p /data && exec bun run start'

  postgres:
    image: registry.lazycat.cloud/invokerlaw/library/postgres:c7066f661fdb4a89
    environment:
      - POSTGRES_USER=cutia
      - POSTGRES_PASSWORD=cutia
      - POSTGRES_DB=cutia
    binds:
      - /lzcapp/var/db/cutia/postgres:/var/lib/postgresql/data

  redis:
    image: registry.lazycat.cloud/invokerlaw/library/redis:160a706bce934011
    binds:
      - /lzcapp/var/data/cutia/redis:/data
    command: redis-server --appendonly yes

locales:
  en:
    name: Cutia
    description: (LazyCat Auto-build) Privacy-first, open-source video editing in browser
  zh:
    name: Cutia
    description: （懒猫微服自动构建）开源浏览器视频编辑器，隐私优先
