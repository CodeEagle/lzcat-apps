lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.memoh
version: 0.6.3
min_os_version: 1.3.8
name: Memoh
description: ✨ Self hosted, always-on AI agent platform run in containers. Create multiple bots with long memory, and connect them to Telegram, Discord, Feishu(Lark), Matrix, etc (like OpenClaw).
license: AGPL-3.0
homepage: https://docs.memoh.ai
author: memohai
application:
  subdomain: memoh
  public_path:
    - /
  upstreams:
    -
      location: /api/
      backend: http://server:8080/
    -
      location: /
      backend: http://web:8082/
  health_check:
    test_url: http://web:8082/health
    start_period: 120s
services:
  postgres:
    image: registry.lazycat.cloud/placeholder/memoh:postgres
    environment:
      - POSTGRES_DB=memoh
      - POSTGRES_USER=memoh
      - POSTGRES_PASSWORD=memoh123
    binds:
      - /lzcapp/var/db/memoh/postgres:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U memoh
      interval: 10s
      timeout: 5s
      retries: 5
  migrate:
    image: registry.lazycat.cloud/placeholder/memoh:migrate
    depends_on:
      - postgres
    entrypoint: /bin/sh
    command: >-
      -lc 'set -e; mkdir -p /lzcapp/var/data/memoh/config; CONFIG_FILE=/lzcapp/var/data/memoh/config/config.toml;
      if [ ! -f "$CONFIG_FILE" ]; then cat > "$CONFIG_FILE" <<EOF
      [log]
      level = "info"
      format = "text"

      [server]
      addr = "server:8080"

      [admin]
      username = "admin"
      password = "${LAZYCAT_APP_ID}-admin"
      email = "admin@${LAZYCAT_APP_DOMAIN}"

      [auth]
      jwt_secret = "${LAZYCAT_APP_ID}-${LAZYCAT_BOX_DOMAIN}-jwt"
      jwt_expires_in = "168h"

      timezone = "UTC"

      [containerd]
      socket_path = "/run/containerd/containerd.sock"
      namespace = "default"

      [workspace]
      default_image = "debian:bookworm-slim"
      snapshotter = "overlayfs"
      data_root = "/opt/memoh/data"
      runtime_dir = "/opt/memoh/runtime"

      [postgres]
      host = "postgres"
      port = 5432
      user = "memoh"
      password = "memoh123"
      database = "memoh"
      sslmode = "disable"

      [qdrant]
      base_url = "http://qdrant:6334"
      api_key = ""
      timeout_seconds = 10

      [browser_gateway]
      host = "browser"
      port = 8083
      server_addr = "server:8080"

      [web]
      host = "0.0.0.0"
      port = 8082
      EOF
      fi; cp "$CONFIG_FILE" /app/config.toml; exec /app/memoh-server migrate up'
  server:
    image: registry.lazycat.cloud/placeholder/memoh:server
    depends_on:
      - migrate
      - qdrant
    binds:
      - /lzcapp/var/data/memoh/server/containerd:/var/lib/containerd
      - /lzcapp/var/data/memoh/server/cni:/var/lib/cni
      - /lzcapp/var/data/memoh/server/data:/opt/memoh/data
    entrypoint: /bin/sh
    command: >-
      -lc 'set -e; mkdir -p /lzcapp/var/data/memoh/config /opt/memoh/data /var/lib/cni /var/lib/containerd /run/containerd;
      CONFIG_FILE=/lzcapp/var/data/memoh/config/config.toml;
      if [ ! -f "$CONFIG_FILE" ]; then cat > "$CONFIG_FILE" <<EOF
      [log]
      level = "info"
      format = "text"

      [server]
      addr = "server:8080"

      [admin]
      username = "admin"
      password = "${LAZYCAT_APP_ID}-admin"
      email = "admin@${LAZYCAT_APP_DOMAIN}"

      [auth]
      jwt_secret = "${LAZYCAT_APP_ID}-${LAZYCAT_BOX_DOMAIN}-jwt"
      jwt_expires_in = "168h"

      timezone = "UTC"

      [containerd]
      socket_path = "/run/containerd/containerd.sock"
      namespace = "default"

      [workspace]
      default_image = "debian:bookworm-slim"
      snapshotter = "overlayfs"
      data_root = "/opt/memoh/data"
      runtime_dir = "/opt/memoh/runtime"

      [postgres]
      host = "postgres"
      port = 5432
      user = "memoh"
      password = "memoh123"
      database = "memoh"
      sslmode = "disable"

      [qdrant]
      base_url = "http://qdrant:6334"
      api_key = ""
      timeout_seconds = 10

      [browser_gateway]
      host = "browser"
      port = 8083
      server_addr = "server:8080"

      [web]
      host = "0.0.0.0"
      port = 8082
      EOF
      fi; cp "$CONFIG_FILE" /app/config.toml;
      ip link delete cni0 2>/dev/null || true;
      rm -rf /var/lib/cni/networks/* /var/lib/cni/results/* 2>/dev/null || true;
      sysctl -w net.ipv4.ip_forward=1 2>/dev/null || true;
      iptables -t nat -C POSTROUTING -s 10.88.0.0/16 ! -o cni0 -j MASQUERADE 2>/dev/null || iptables -t nat -A POSTROUTING -s 10.88.0.0/16 ! -o cni0 -j MASQUERADE 2>/dev/null || true;
      if [ -f /sys/fs/cgroup/cgroup.controllers ] && [ -w /sys/fs/cgroup ]; then
        mkdir -p /sys/fs/cgroup/init 2>/dev/null || true;
        if [ -d /sys/fs/cgroup/init ]; then
          while read -r pid; do echo "$pid" > /sys/fs/cgroup/init/cgroup.procs 2>/dev/null || true; done < /sys/fs/cgroup/cgroup.procs;
        fi;
        sed -e "s/ / +/g" -e "s/^/+/" < /sys/fs/cgroup/cgroup.controllers > /sys/fs/cgroup/cgroup.subtree_control 2>/dev/null || true;
      else
        echo "[memoh] skip cgroup v2 delegation: /sys/fs/cgroup is not writable";
      fi;
      containerd & CONTAINERD_PID=$!;
      for i in $(seq 1 30); do ctr version >/dev/null 2>&1 && break; sleep 1; done;
      ctr version >/dev/null 2>&1 || { echo "ERROR: containerd not responsive after 30s"; exit 1; };
      trap "kill \$SERVER_PID 2>/dev/null; kill \$CONTAINERD_PID 2>/dev/null; wait" TERM INT;
      /app/memoh-server serve & SERVER_PID=$!;
      wait \$SERVER_PID; EXIT_CODE=$?;
      kill \$CONTAINERD_PID 2>/dev/null || true;
      wait \$CONTAINERD_PID 2>/dev/null || true;
      exit \$EXIT_CODE'
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
  web:
    image: registry.lazycat.cloud/placeholder/memoh:web
    depends_on:
      - server
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:8082/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
  qdrant:
    image: registry.lazycat.cloud/placeholder/memoh:qdrant
    binds:
      - /lzcapp/var/data/memoh/qdrant/storage:/qdrant/storage
    healthcheck:
      test:
        - CMD-SHELL
        - timeout 10s bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
  browser:
    image: registry.lazycat.cloud/placeholder/memoh:browser
    depends_on:
      - server
    environment:
      - BROWSER_CORES=chromium,firefox
    setup_script: |
      mkdir -p /lzcapp/var/data/memoh/config
      CONFIG_FILE=/lzcapp/var/data/memoh/config/config.toml
      if [ ! -f "$CONFIG_FILE" ]; then
        cat > "$CONFIG_FILE" <<EOF
      [log]
      level = "info"
      format = "text"

      [server]
      addr = "server:8080"

      [admin]
      username = "admin"
      password = "${LAZYCAT_APP_ID}-admin"
      email = "admin@${LAZYCAT_APP_DOMAIN}"

      [auth]
      jwt_secret = "${LAZYCAT_APP_ID}-${LAZYCAT_BOX_DOMAIN}-jwt"
      jwt_expires_in = "168h"

      timezone = "UTC"

      [containerd]
      socket_path = "/run/containerd/containerd.sock"
      namespace = "default"

      [workspace]
      default_image = "debian:bookworm-slim"
      snapshotter = "overlayfs"
      data_root = "/opt/memoh/data"
      runtime_dir = "/opt/memoh/runtime"

      [postgres]
      host = "postgres"
      port = 5432
      user = "memoh"
      password = "memoh123"
      database = "memoh"
      sslmode = "disable"

      [qdrant]
      base_url = "http://qdrant:6334"
      api_key = ""
      timeout_seconds = 10

      [browser_gateway]
      host = "browser"
      port = 8083
      server_addr = "server:8080"

      [web]
      host = "0.0.0.0"
      port = 8082
      EOF
      fi
      cp "$CONFIG_FILE" /config.toml
    healthcheck:
      test:
        - CMD-SHELL
        - curl -sf http://127.0.0.1:8083/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
locales:
  en:
    name: Memoh
    description: ✨ Self hosted, always-on AI agent platform run in containers. Create multiple bots with long memory, and connect them to Telegram, Discord, Feishu(Lark), Matrix, etc (like OpenClaw).
  zh:
    name: Memoh
    description: （迁移初稿）Memoh 的懒猫微服版本
