lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.paseo
version: 0.1.52
min_os_version: 1.3.8
name: Paseo
description: Orchestrate coding agents remotely from your phone, desktop and CLI
homepage: https://paseo.sh
author: getpaseo
application:
  subdomain: paseo
  public_path:
    - /
  upstreams:
    -
      location: /
      backend: http://paseo:6767/
services:
  paseo:
    image: registry.lazycat.cloud/placeholder/paseo:bootstrap
    environment:
      - PASEO_LISTEN=0.0.0.0:6767
locales:
  en:
    name: Paseo
    description: Orchestrate coding agents remotely from your phone, desktop and CLI
  zh:
    name: Paseo
    description: Paseo 的懒猫微服打包版本
