params:
  - id: openrouter_api_key
    type: string
    name: OpenRouter API Key
    description: "推荐。通过 OpenRouter 统一接入 Claude、GPT、Gemini 等所有主流模型。获取地址：https://openrouter.ai/keys"
    default_value: ""
    optional: true

  - id: anthropic_api_key
    type: string
    name: Anthropic API Key
    description: "直连 Anthropic，使用 Claude 系列模型。获取地址：https://console.anthropic.com"
    default_value: ""
    optional: true

  - id: openai_api_key
    type: string
    name: OpenAI API Key
    description: "直连 OpenAI，使用 GPT 系列模型。获取地址：https://platform.openai.com/api-keys"
    default_value: ""
    optional: true

  - id: google_api_key
    type: string
    name: Google AI / Gemini API Key
    description: "使用 Gemini 系列模型。获取地址：https://aistudio.google.com/app/apikey"
    default_value: ""
    optional: true

  - id: default_model
    type: string
    name: Default Model
    description: "默认对话模型 ID，例如：anthropic/claude-sonnet-4-5（OpenRouter 格式）或 claude-sonnet-4-5（Anthropic 直连）。留空则使用 hermes 内置默认值。"
    default_value: ""
