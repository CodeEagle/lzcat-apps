lzc-sdk-version: "0.1"
package: fun.selfstudio.app.migration.hucre
version: '0.1.1'
min_os_version: 1.3.8
name: hucre
description: (LazyCat Auto-build) Spreadsheet playground for hucre XLSX, CSV, and ODS engine
license: MIT
homepage: https://github.com/productdevbook/hucre
author: productdevbook
application:
  subdomain: hucre
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://hucre-web:3000/
services:
  hucre-web:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/hucre:3fc3c94e390771d0
    environment:
      - NITRO_HOST=0.0.0.0
      - NITRO_PORT=3000
      - HOST=0.0.0.0
      - PORT=3000
    binds: []
locales:
  en:
    name: hucre
    description: (LazyCat Auto-build) Browser playground for hucre spreadsheet features
  zh:
    name: hucre
    description: （懒猫微服自动构建）hucre 电子表格引擎之浏览器演示站
