lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.openops
version: 0.6.23
min_os_version: 1.3.8
name: OpenOps
description: (LazyCat Auto-build) No-code FinOps automation platform with workflows, tables, and analytics
license: Apache-2.0
homepage: https://openops.com
author: OpenOps
application:
  subdomain: openops
  public_path:
    - /
    - /openops-analytics
    - /openops-tables
  upstreams:
    - location: /openops-tables/ws/core
      backend: http://openops-tables:80/openops-tables/ws/core
    - location: /openops-tables
      backend: http://openops-tables:80/openops-tables
    - location: /openops-analytics
      backend: http://openops-analytics:8088
    - location: /
      backend: http://openops-app:80
  health_check:
    test_url: http://openops-app:80/api/v1/health
    start_period: 120s
services:
  openops-app:
    image: registry.lazycat.cloud/invokerlaw/openops/openops-app:4c1e9a6e6e05dce4
    depends_on:
      - openops-tables
      - openops-analytics
      - postgres
      - redis
    setup_script: |
      mkdir -p /lzcapp/var/data/openops/cache
      mkdir -p /lzcapp/var/data/openops/config
    environment:
      - OPS_COMPONENT=app
      - OPS_VERSION=0.6.23
      - OPS_OPENOPS_TABLES_VERSION=0.2.17
      - OPS_ANALYTICS_VERSION=0.14.6
      - OPS_PUBLIC_URL=https://${LAZYCAT_APP_DOMAIN}
      - OPS_FRONTEND_URL=https://${LAZYCAT_APP_DOMAIN}
      - OPS_ENVIRONMENT_NAME=lazycat
      - OPS_TRIGGER_DEFAULT_POLL_INTERVAL=1
      - OPS_WEBHOOK_TIMEOUT_SECONDS=30
      - OPS_BLOCKS_SOURCE=FILE
      - OPS_BLOCKS_SYNC_MODE=NONE
      - OPS_QUEUE_MODE=REDIS
      - OPS_REDIS_HOST=redis
      - OPS_REDIS_PORT=6379
      - OPS_DB_TYPE=POSTGRES
      - OPS_POSTGRES_DATABASE=openops
      - OPS_POSTGRES_HOST=postgres
      - OPS_POSTGRES_PASSWORD=openops
      - OPS_POSTGRES_PORT=5432
      - OPS_POSTGRES_USERNAME=postgres
      - OPS_OPENOPS_TABLES_DB_HOST=postgres
      - OPS_ENCRYPTION_KEY=abcdef123456789abcdef123456789ab
      - OPS_JWT_SECRET=${LAZYCAT_APP_ID}-${LAZYCAT_BOX_DOMAIN}-jwt
      - OPS_OPENOPS_ADMIN_EMAIL=admin@${LAZYCAT_APP_DOMAIN}
      - OPS_OPENOPS_ADMIN_PASSWORD=${LAZYCAT_APP_ID}-admin
      - OPS_OPENOPS_TABLES_DATABASE_NAME=tables
      - OPS_OPENOPS_TABLES_API_URL=http://openops-tables
      - OPS_OPENOPS_TABLES_PUBLIC_URL=https://${LAZYCAT_APP_DOMAIN}/openops-tables
      - OPS_JWT_TOKEN_LIFETIME_HOURS=168
      - OPS_TABLES_TOKEN_LIFETIME_MINUTES=60
      - OPS_MAX_CONCURRENT_TABLES_REQUESTS=100
      - OPS_ANALYTICS_ENABLED=true
      - OPS_ANALYTICS_PUBLIC_URL=https://${LAZYCAT_APP_DOMAIN}/openops-analytics
      - OPS_ANALYTICS_PRIVATE_URL=http://openops-analytics:8088
      - OPS_ANALYTICS_ADMIN_PASSWORD=${LAZYCAT_APP_ID}-analytics-admin
      - ANALYTICS_POWERUSER_PASSWORD=${LAZYCAT_APP_ID}-analytics-poweruser
      - ANALYTICS_ALLOW_ADHOC_SUBQUERY=true
      - OPS_ENGINE_URL=http://openops-engine:3005/execute
      - OPS_EXECUTION_MODE=SANDBOX_CODE_ONLY
      - OPS_LOG_LEVEL=info
      - OPS_LOG_PRETTY=false
      - OPS_TELEMETRY_MODE=NONE
      - OPS_SLACK_ENABLE_INTERACTIONS=true
      - OPS_CODE_BLOCK_MEMORY_LIMIT_IN_MB=256
      - OPS_CACHE_PATH=/lzcapp/var/data/openops/cache
      - OPS_CONFIG_PATH=/lzcapp/var/data/openops/config
    binds:
      - /lzcapp/var/data/openops/cache:/lzcapp/var/data/openops/cache
      - /lzcapp/var/data/openops/config:/lzcapp/var/data/openops/config
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1/api/v1/health >/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  openops-engine:
    image: registry.lazycat.cloud/invokerlaw/openops/openops-engine:d3a09939277aa036
    depends_on:
      - openops-app
    environment:
      - OPS_COMPONENT=engine
      - OPS_PUBLIC_URL=https://${LAZYCAT_APP_DOMAIN}
      - OPS_FRONTEND_URL=https://${LAZYCAT_APP_DOMAIN}
      - OPS_ENVIRONMENT_NAME=lazycat
      - OPS_TRIGGER_DEFAULT_POLL_INTERVAL=1
      - OPS_WEBHOOK_TIMEOUT_SECONDS=30
      - OPS_BLOCKS_SOURCE=FILE
      - OPS_BLOCKS_SYNC_MODE=NONE
      - OPS_QUEUE_MODE=REDIS
      - OPS_REDIS_HOST=redis
      - OPS_REDIS_PORT=6379
      - OPS_DB_TYPE=POSTGRES
      - OPS_POSTGRES_DATABASE=openops
      - OPS_POSTGRES_HOST=postgres
      - OPS_POSTGRES_PASSWORD=openops
      - OPS_POSTGRES_PORT=5432
      - OPS_POSTGRES_USERNAME=postgres
      - OPS_OPENOPS_TABLES_DB_HOST=postgres
      - OPS_ENCRYPTION_KEY=abcdef123456789abcdef123456789ab
      - OPS_JWT_SECRET=${LAZYCAT_APP_ID}-${LAZYCAT_BOX_DOMAIN}-jwt
      - OPS_OPENOPS_TABLES_DATABASE_NAME=tables
      - OPS_OPENOPS_TABLES_API_URL=http://openops-tables
      - OPS_OPENOPS_TABLES_PUBLIC_URL=https://${LAZYCAT_APP_DOMAIN}/openops-tables
      - OPS_ANALYTICS_ENABLED=true
      - OPS_ANALYTICS_PUBLIC_URL=https://${LAZYCAT_APP_DOMAIN}/openops-analytics
      - OPS_ANALYTICS_PRIVATE_URL=http://openops-analytics:8088
      - OPS_ENGINE_URL=http://openops-engine:3005/execute
      - OPS_EXECUTION_MODE=SANDBOX_CODE_ONLY
      - OPS_SERVER_API_URL=http://openops-app/api/
      - OPS_BASE_CODE_DIRECTORY=/tmp/codes
      - OPS_LOG_LEVEL=info
      - OPS_LOG_PRETTY=false
      - OPS_TELEMETRY_MODE=NONE
      - OPS_CODE_BLOCK_MEMORY_LIMIT_IN_MB=256
    binds:
      - /lzcapp/var/data/openops/engine/codes:/tmp/codes
      - /lzcapp/var/data/openops/azure:/tmp/azure
      - /lzcapp/var/data/openops/gcloud:/tmp/gcloud

  openops-tables:
    image: registry.lazycat.cloud/invokerlaw/openops/openops-tables:998a74fe9e6bd972
    depends_on:
      - postgres
      - redis
    environment:
      - BASEROW_PUBLIC_URL=https://${LAZYCAT_APP_DOMAIN}/openops-tables
      - BASEROW_PRIVATE_URL=http://openops-tables
      - BASEROW_EXTRA_ALLOWED_HOSTS=*
      - SECRET_KEY=abcdef123456789abcdef123456789ab
      - BASEROW_JWT_SIGNING_KEY=${LAZYCAT_APP_ID}-${LAZYCAT_BOX_DOMAIN}-jwt
      - BASEROW_ADMIN_USERNAME=admin@${LAZYCAT_APP_DOMAIN}
      - BASEROW_ADMIN_PASSWORD=${LAZYCAT_APP_ID}-admin
      - BASEROW_REFRESH_TOKEN_LIFETIME_HOURS=168
      - BASEROW_ACCESS_TOKEN_LIFETIME_MINUTES=60
      - SYNC_TEMPLATES_ON_STARTUP=false
      - MIGRATE_ON_STARTUP=true
      - DISABLE_VOLUME_CHECK=yes
      - DATABASE_NAME=tables
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=openops
      - REDIS_URL=redis://redis:6379/0
      - EDITOR_URL=https://${LAZYCAT_APP_DOMAIN}/sign-in
    binds:
      - /lzcapp/var/data/openops/tables:/baserow/data
    healthcheck:
      test:
        - CMD-SHELL
        - /baserow/backend/docker/docker-entrypoint.sh backend-healthcheck
      interval: 20s
      timeout: 8s
      retries: 10
      start_period: 60s

  openops-analytics:
    image: registry.lazycat.cloud/invokerlaw/openops/openops-analytics:9a8f62eae688206c
    depends_on:
      - postgres
      - openops-tables
    setup_script: |
      mkdir -p /lzcapp/var/data/openops/analytics/sqllab
      chown -R 1000:1000 /lzcapp/var/data/openops/analytics
      chmod 775 /lzcapp/var/data/openops/analytics /lzcapp/var/data/openops/analytics/sqllab
    environment:
      - ADMIN_PASSWORD=${LAZYCAT_APP_ID}-analytics-admin
      - POWERUSER_PASSWORD=${LAZYCAT_APP_ID}-analytics-poweruser
      - GUNICORN_LOGLEVEL=debug
      - DATABASE_DIALECT=postgresql
      - DATABASE_DB=analytics
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=openops
      - DATABASE_HOST_ALT=postgres
      - SUPERSET_SECRET_KEY=abcdef123456789abcdef123456789ab
      - SUPERSET_FEATURE_ALLOW_ADHOC_SUBQUERY=true
    binds:
      - /lzcapp/var/data/openops/analytics:/app/superset_home
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8088/health
      interval: 20s
      timeout: 8s
      retries: 10
      start_period: 90s

  postgres:
    image: registry.lazycat.cloud/invokerlaw/library/postgres:25c411419a49cba1
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=openops
      - POSTGRES_DB=openops
    binds:
      - /lzcapp/var/db/openops/postgres:/var/lib/postgresql/data
      - /lzcapp/var/db/openops/init:/lzcapp/var/db/openops/init
    setup_script: |
      mkdir -p /lzcapp/var/db/openops/init
      cat > /lzcapp/var/db/openops/init/init-db.sh <<'EOF'
      #!/bin/sh
      set -e
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<-'EOSQL'
          CREATE DATABASE analytics;
          CREATE DATABASE tables;
      EOSQL
      EOF
      chmod +x /lzcapp/var/db/openops/init/init-db.sh
      mkdir -p /docker-entrypoint-initdb.d
      cp /lzcapp/var/db/openops/init/init-db.sh /docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: registry.lazycat.cloud/invokerlaw/library/redis:f74043befb949285
    command: redis-server --notify-keyspace-events Ex
    binds:
      - /lzcapp/var/data/openops/redis:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

locales:
  en:
    name: OpenOps
    description: (LazyCat Auto-build) No-code FinOps automation platform with workflows, tables, and analytics
  zh:
    name: OpenOps
    description: （懒猫微服自动构建）集成工作流、表格与分析能力的无代码 FinOps 自动化平台
