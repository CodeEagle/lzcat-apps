lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.llama-swap
version: '199'
min_os_version: 1.3.8
name: llama-swap
description: Reliable model swapping for any local OpenAI/Anthropic compatible server - llama.cpp, vllm, etc
license: MIT
homepage: https://github.com/mostlygeek/llama-swap
author: mostlygeek
application:
  subdomain: llama-swap
  public_path:
    - /
  upstreams:
    -
      location: /
      backend: http://llama-swap:8080/
services:
  llama-swap:
    image: registry.lazycat.cloud/invokerlaw/mostlygeek/llama-swap:e59d4d8ba311e618
    setup_script: |
      mkdir -p /lzcapp/var/config/llama-swap /lzcapp/var/data/llama-swap/models
      if [ ! -f /lzcapp/var/config/llama-swap/config.yaml ]; then
        cp /lzcapp/pkg/content/default-config.yaml /lzcapp/var/config/llama-swap/config.yaml
      fi
      chown -R llama-swap:llama-swap /lzcapp/var/config/llama-swap /lzcapp/var/data/llama-swap/models
    binds:
      - /lzcapp/var/config/llama-swap:/etc/llama-swap/config
      - /lzcapp/var/data/llama-swap/models:/models
locales:
  en:
    name: llama-swap
    description: Reliable model swapping for any local OpenAI/Anthropic compatible server - llama.cpp, vllm, etc
  zh:
    name: llama-swap
    description: （迁移初稿）Llama Swap 的懒猫微服版本
