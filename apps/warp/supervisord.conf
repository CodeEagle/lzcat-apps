[supervisord]
nodaemon=true
loglevel=info

[program:xvfb]
command=/usr/bin/Xvfb :0 -screen 0 1440x900x24 -ac +extension GLX +render -noreset
autorestart=true
priority=10

[program:fluxbox]
command=/usr/bin/fluxbox
environment=DISPLAY=":0"
autorestart=true
priority=20

[program:x11vnc]
command=/usr/bin/x11vnc -display :0 -forever -shared -nopw -listen 127.0.0.1 -xkb
autorestart=true
priority=30

[program:novnc]
command=/usr/share/novnc/utils/novnc_proxy --listen 0.0.0.0:8080 --vnc localhost:5900
autorestart=true
priority=40

[program:warp]
command=/usr/local/bin/start-warp
user=warp
directory=/workspace
environment=HOME="/home/warp",DISPLAY=":0",XDG_RUNTIME_DIR="/tmp/runtime-warp",XDG_CONFIG_HOME="/home/warp/.config",XDG_DATA_HOME="/home/warp/.local/share",XDG_CACHE_HOME="/home/warp/.cache",WINIT_UNIX_BACKEND="x11",WGPU_BACKEND="gl",LIBGL_ALWAYS_SOFTWARE="1",MESA_LOADER_DRIVER_OVERRIDE="llvmpipe"
autorestart=true
priority=50
startsecs=8
