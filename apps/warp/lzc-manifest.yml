lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.warp
version: 2026.4.27
min_os_version: 1.3.8
name: Warp
description: Unofficial LazyCat noVNC wrapper for the Warp agentic development environment
license: AGPL-3.0-or-later AND MIT
homepage: https://github.com/warpdotdev/warp
author: warpdotdev
application:
  subdomain: warp
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://warp:8080/
  health_check:
    test_url: http://warp:8080/vnc.html
    start_period: 180s
    timeout: 15s
services:
  warp:
    image: registry.lazycat.cloud/placeholder/warp:bootstrap
    environment:
      - TZ=Asia/Shanghai
      - HOME=/home/warp
      - DISPLAY=:0
      - XDG_RUNTIME_DIR=/tmp/runtime-warp
      - XDG_CONFIG_HOME=/home/warp/.config
      - XDG_DATA_HOME=/home/warp/.local/share
      - XDG_CACHE_HOME=/home/warp/.cache
      - WINIT_UNIX_BACKEND=x11
      - WGPU_BACKEND=gl
      - LIBGL_ALWAYS_SOFTWARE=1
      - MESA_LOADER_DRIVER_OVERRIDE=llvmpipe
    binds:
      - /lzcapp/var/data/warp/home:/home/warp
      - /lzcapp/var/data/warp/workspace:/workspace
    setup_script: |
      install -d -m 0755 /home/warp /workspace
      install -d -m 0700 /tmp/runtime-warp /home/warp/.warp /home/warp/.ssh /home/warp/.config /home/warp/.cache /home/warp/.local/share /home/warp/.local/state
      chown -R 1000:1000 /home/warp /workspace /tmp/runtime-warp
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:8080/vnc.html >/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
locales:
  en:
    name: Warp
    description: Unofficial LazyCat noVNC wrapper for the Warp agentic development environment
  zh:
    name: Warp
    description: Warp agentic development environment 的非官方懒猫 noVNC 桌面封装
