lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.shadmin
version: 2.1.6
min_os_version: 1.3.8
name: Shadmin
description: (LazyCat Auto-build) Enterprise-grade Go + React RBAC admin system with embedded web UI
license: MIT
homepage: https://github.com/ahaodev/shadmin
author: ahaodev
application:
  subdomain: shadmin
  public_path:
    - /
    - /api
    - /swagger
  upstreams:
    - location: /
      backend: http://shadmin:55667/
  health_check:
    test_url: http://shadmin:55667/
services:
  shadmin:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/shadmin:dd5c19bcfd7edd1a
    environment:
      - APP_ENV=production
      - CONTEXT_TIMEOUT=60
      - PORT=:55667
      - DB_TYPE=sqlite
      - DB_DSN=
      - ACCESS_TOKEN_EXPIRY_HOUR=3
      - REFRESH_TOKEN_EXPIRY_HOUR=24
      - ACCESS_TOKEN_SECRET=${LAZYCAT_APP_ID}-${LAZYCAT_BOX_DOMAIN}-access-token
      - REFRESH_TOKEN_SECRET=${LAZYCAT_APP_ID}-${LAZYCAT_BOX_DOMAIN}-refresh-token
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=change-me-123
      - ADMIN_EMAIL=admin@shadmin.local
      - STORAGE_TYPE=disk
      - STORAGE_BASE_PATH=/app/uploads
      - S3_ADDRESS=
      - S3_ACCESS_KEY=
      - S3_SECRET_KEY=
      - S3_BUCKET=
      - S3_TOKEN=
    binds:
      - /lzcapp/var/db:/app/.database
      - /lzcapp/var/uploads:/app/uploads
      - /lzcapp/var/logs:/app/.logs
    setup_script: |
      mkdir -p /app/.database
      mkdir -p /app/uploads
      mkdir -p /app/.logs
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:55667/ >/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
locales:
  en:
    name: Shadmin
    description: (LazyCat Auto-build) Enterprise-grade Go + React RBAC admin system with embedded web UI
  zh:
    name: Shadmin
    description: （懒猫微服自动构建）企业级 Go + React RBAC 权限管理系统，内置后台 Web 界面
