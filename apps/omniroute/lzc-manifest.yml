lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.omniroute
version: 2.9.5
min_os_version: 1.3.8
name: OmniRoute
description: (LazyCat Auto-build) Unified AI proxy with dashboard, OpenAI-compatible API, MCP, and A2A support
license: MIT
homepage: https://omniroute.online
author: diegosouzapw
application:
  subdomain: omniroute
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://omniroute:20128/
      disable_trim_location: true
  health_check:
    test_url: http://omniroute:20128/api/monitoring/health
    start_period: 120s
    timeout: 10s
services:
  omniroute:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/omniroute:43a36be248f667e5
    environment:
      - NODE_ENV=production
      - PORT=20128
      - HOSTNAME=0.0.0.0
      - API_HOST=0.0.0.0
      - DATA_DIR=/app/data
      - BASE_URL=http://omniroute:20128
      - NEXT_PUBLIC_BASE_URL=https://${LAZYCAT_APP_DOMAIN}
      - NEXT_PUBLIC_APP_URL=https://${LAZYCAT_APP_DOMAIN}
      - OMNIROUTE_BASE_URL=http://omniroute:20128
      - LOG_TO_FILE=true
      - LOG_FILE_PATH=/app/data/logs/application/app.log
      - AUTH_COOKIE_SECURE=true
      - INITIAL_PASSWORD=123456
      - INSTANCE_NAME=omniroute
    binds:
      - /lzcapp/var/data:/app/data
    healthcheck:
      test:
        - CMD
        - node
        - healthcheck.mjs
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
locales:
  en:
    name: OmniRoute
    description: (LazyCat Auto-build) Unified AI proxy with dashboard, OpenAI-compatible API, MCP, and A2A support
  zh:
    name: OmniRoute
    description: （懒猫微服自动构建）统一 AI 代理，提供控制台、OpenAI 兼容 API、MCP 与 A2A 能力
