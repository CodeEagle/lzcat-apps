lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.autoclip
version: 1.0.1
min_os_version: 1.3.8
name: AutoClip
description: (LazyCat Auto-build) AI video clipping workspace with web UI, worker queue, and Redis
license: MIT
homepage: https://github.com/zhouxiaoka/autoclip
author: zhouxiaoka
application:
  subdomain: autoclip
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://web:3000/
services:
  web:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/autoclip:a26102859aa5b7ab
    environment:
      - DATABASE_URL=sqlite:///./data/autoclip.db
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      - API_DASHSCOPE_API_KEY=${API_DASHSCOPE_API_KEY}
      - API_MODEL_NAME=qwen-plus
      - API_MAX_TOKENS=4096
      - API_TIMEOUT=30
      - CELERY_CONCURRENCY=2
    depends_on:
      - redis
    binds:
      - /lzcapp/var/data/autoclip:/app/data
      - /lzcapp/var/log/autoclip:/app/logs
    command: /usr/local/bin/start-web.sh

  worker:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/autoclip:a26102859aa5b7ab
    environment:
      - DATABASE_URL=sqlite:///./data/autoclip.db
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      - API_DASHSCOPE_API_KEY=${API_DASHSCOPE_API_KEY}
      - API_MODEL_NAME=qwen-plus
      - API_MAX_TOKENS=4096
      - API_TIMEOUT=30
      - CELERY_CONCURRENCY=2
    depends_on:
      - redis
      - web
    binds:
      - /lzcapp/var/data/autoclip:/app/data
      - /lzcapp/var/log/autoclip:/app/logs
    command: /usr/local/bin/start-worker.sh

  redis:
    image: registry.lazycat.cloud/invokerlaw/library/redis:160a706bce934011
    binds:
      - /lzcapp/var/data/autoclip/redis:/data
    command: redis-server --appendonly yes

locales:
  en:
    name: AutoClip
    description: (LazyCat Auto-build) AI video clipping workspace with web UI, worker queue, and Redis
  zh:
    name: AutoClip
    description: （懒猫微服自动构建）AI 视频智能切片工作台，集成 Web 界面、任务队列与 Redis
