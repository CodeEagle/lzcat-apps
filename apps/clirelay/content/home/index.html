<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CliRelay</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0d1117;
        --card: rgba(255, 255, 255, 0.03);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.5);
        --border: rgba(255, 255, 255, 0.08);
        --code-bg: rgba(255, 255, 255, 0.06);
        --accent: #238636;
        --accent-hover: #2ea043;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        --radius: 16px;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f0f2f5;
          --card: #ffffff;
          --text: #1f2328;
          --muted: #656d76;
          --border: rgba(31, 35, 40, 0.1);
          --code-bg: rgba(31, 35, 40, 0.04);
          --accent: #1f883d;
          --accent-hover: #1a7f37;
          --shadow: 0 8px 32px rgba(31, 35, 40, 0.1);
        }
      }
      * {
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        min-height: 100vh;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
          Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: fit-content;
        max-width: 800px;
        border: 1px solid var(--border);
        background: var(--card);
        border-radius: var(--radius);
        padding: 32px 28px 28px;
        box-shadow: var(--shadow);
      }
      h1 {
        margin: 0 0 28px;
        font-size: 22px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .badge {
        font-size: 11px;
        font-weight: 500;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 4px 10px;
        border-radius: 999px;
      }
      .section {
        margin-bottom: 20px;
      }
      .section:last-child {
        margin-bottom: 0;
      }
      .label {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 8px;
      }
      code {
        display: block;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 14px;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--code-bg);
        cursor: pointer;
        transition: background 150ms ease, border-color 150ms ease;
        word-break: break-all;
        line-height: 1.5;
      }
      code:hover {
        background: rgba(110, 118, 129, 0.12);
        border-color: rgba(110, 118, 129, 0.2);
      }
      code:active {
        background: rgba(110, 118, 129, 0.18);
      }
      .actions {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
        padding-top: 8px;
      }
      .btn-go {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 20px;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        background: var(--accent);
        border: none;
        border-radius: 10px;
        text-decoration: none;
        cursor: pointer;
        transition: background 150ms ease, transform 100ms ease;
      }
      .btn-go:hover {
        background: var(--accent-hover);
        text-decoration: none;
      }
      .btn-go:active {
        transform: scale(0.97);
      }
      .btn-go svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }
      .password {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
        flex-wrap: wrap;
      }
      .password code {
        display: inline-block;
        padding: 6px 10px;
        font-size: 12px;
      }
      /* toast */
      .toast {
        position: fixed;
        left: 50%;
        bottom: 28px;
        transform: translateX(-50%);
        background: rgba(31, 35, 40, 0.9);
        color: #fff;
        padding: 10px 16px;
        border-radius: 10px;
        font-size: 13px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
      }
      .toast.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>
        CliRelay
        <span class="badge">Service</span>
      </h1>

      <div class="section">
        <div class="label">AI API Base URL</div>
        <code id="apiBaseUrl" title="点击复制">-</code>
      </div>

      <div class="section">
        <div class="label">Dashboard</div>
        <code id="dashboardUrl" title="点击复制">-</code>
      </div>

      <div class="actions">
        <a id="dashboardLink" class="btn-go" href="#">
          打开 Dashboard
          <svg viewBox="0 0 16 16"><path d="M8.22 2.97a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042l2.97-2.97H3.75a.75.75 0 0 1 0-1.5h7.44L8.22 4.03a.75.75 0 0 1 0-1.06z"/></svg>
        </a>
        <div class="password">
          <span>默认管理密码</span>
          <code id="loginHint" title="点击复制">change-me-clirelay-admin-key</code>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">已复制</div>

    <script>
      (function () {
        var origin = location.origin;
        var u = new URL(origin);
        u.hostname = "api-" + u.hostname;
        var apiOrigin = u.origin;

        var apiBaseUrl = apiOrigin + "/v1";
        var dashboardUrl = apiOrigin + "/management.html";

        var apiBaseUrlEl = document.getElementById("apiBaseUrl");
        apiBaseUrlEl.textContent = apiBaseUrl;

        var dashboardUrlEl = document.getElementById("dashboardUrl");
        dashboardUrlEl.textContent = dashboardUrl;

        var linkEl = document.getElementById("dashboardLink");
        linkEl.href = dashboardUrl;

        var passwordEl = document.getElementById("loginHint");

        function toast(msg) {
          var t = document.getElementById("toast");
          t.textContent = msg || "已复制";
          t.classList.add("show");
          clearTimeout(toast._timer);
          toast._timer = setTimeout(function () {
            t.classList.remove("show");
          }, 1200);
        }

        function copyText(text) {
          if (!text) return;
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function () {
              toast("已复制");
            }).catch(function () {
              toast("复制失败");
            });
            return;
          }
          try {
            var ta = document.createElement("textarea");
            ta.value = text;
            ta.style.position = "fixed";
            ta.style.left = "-9999px";
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            toast("已复制");
          } catch (e) {
            toast("复制失败");
          }
        }

        apiBaseUrlEl.addEventListener("click", function () {
          copyText(apiBaseUrl);
        });

        dashboardUrlEl.addEventListener("click", function () {
          copyText(dashboardUrl);
        });

        passwordEl.addEventListener("click", function () {
          copyText(passwordEl.textContent);
        });
      })();
    </script>
  </body>
</html>
