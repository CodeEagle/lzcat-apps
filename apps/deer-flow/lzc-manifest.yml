      - JINA_API_KEY
      - INFOQUEST_API_KEY
      - FIRECRAWL_API_KEY
      - GITHUB_TOKEN
      - "{{ if index .U \"model.api_key\" }}OPENAI_API_KEY={{ index .U \"model.api_key\" }}{{ else }}OPENAI_API_KEY={{ end }}"
