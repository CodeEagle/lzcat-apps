lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.deer-flow
version: '0.1.13'
min_os_version: 1.3.8
name: deer-flow
description: An open-source long-horizon SuperAgent harness that researches, codes, and creates. With the help of sandboxes, memories, tools, skill, subagents and message gateway, it handles different levels of tasks that could take minutes to hours.
license: MIT
homepage: https://deerflow.tech
author: bytedance
application:
  subdomain: deer-flow
  public_path:
    - /
  upstreams:
    -
      location: /
      backend: http://nginx:2026/
  health_check:
    test_url: http://nginx:2026/health
services:
  config-ui:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/deer-flow-frontend:3a7f541838ffe642
    command: sh -lc 'mkdir -p /deer-flow-state/config /lzcapp/var/data/deer-flow/skills /lzcapp/var/data/deer-flow/runtime && if [ ! -f /deer-flow-state/config/extensions_config.json ]; then cp /lzcapp/pkg/content/extensions_config.json /deer-flow-state/config/extensions_config.json; fi && if [ ! -f /lzcapp/var/data/deer-flow/skills/README.md ]; then cp /lzcapp/pkg/content/skills/README.md /lzcapp/var/data/deer-flow/skills/README.md; fi && sh /lzcapp/pkg/content/render-deer-flow-config.sh && if [ -f /deer-flow-state/config/model.env ]; then set -a && . /deer-flow-state/config/model.env && set +a; fi && cd /app/frontend && node /lzcapp/pkg/content/config-ui/server.mjs'
    environment:
      - PORT=3210
      - CONFIG_UI_APP_NAME=DeerFlow
      - CONFIG_UI_SCHEMA_PATH=/lzcapp/pkg/content/config-ui/deer-flow-schema.json
      - CONFIG_UI_STATE_PATH=/deer-flow-state/config/model.env
      - CONFIG_UI_READY_MARKER=/deer-flow-state/config/.lazycat-config-ready
      - CONFIG_UI_RENDER_COMMAND=sh /lzcapp/pkg/content/render-deer-flow-config.sh
      - CONFIG_UI_SETTINGS_PATH=/settings/config
      - DEER_FLOW_SHARED_STATE_DIR=/deer-flow-state
      - DEER_FLOW_CONFIG_DIR=/deer-flow-state/config
      - DEER_FLOW_CONFIG_PATH=/deer-flow-state/config/config.yaml
      - DEER_FLOW_CONFIG_ENV_PATH=/deer-flow-state/config/model.env
      - DEER_FLOW_READY_MARKER=/deer-flow-state/config/.lazycat-config-ready
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/deer-flow-state/config/extensions_config.json
      - "{{ if index .U \"model.api_key\" }}OPENAI_API_KEY={{ index .U \"model.api_key\" }}{{ else }}OPENAI_API_KEY={{ end }}"
      - "{{ if index .U \"model.api_key\" }}OPENROUTER_API_KEY={{ index .U \"model.api_key\" }}{{ else }}OPENROUTER_API_KEY={{ end }}"
      - "{{ if index .U \"model.provider_preset\" }}DEER_FLOW_MODEL_PROVIDER_PRESET={{ index .U \"model.provider_preset\" }}{{ else }}DEER_FLOW_MODEL_PROVIDER_PRESET=openai{{ end }}"
      - "{{ if index .U \"model.name\" }}DEER_FLOW_MODEL_NAME={{ index .U \"model.name\" }}{{ else }}DEER_FLOW_MODEL_NAME=default-chat{{ end }}"
      - "{{ if index .U \"model.display_name\" }}DEER_FLOW_MODEL_DISPLAY_NAME={{ index .U \"model.display_name\" }}{{ else }}DEER_FLOW_MODEL_DISPLAY_NAME=Default Chat Model{{ end }}"
      - "{{ if index .U \"model.id\" }}DEER_FLOW_MODEL_ID={{ index .U \"model.id\" }}{{ else }}DEER_FLOW_MODEL_ID=gpt-4.1-mini{{ end }}"
      - "{{ if index .U \"model.base_url\" }}DEER_FLOW_MODEL_BASE_URL={{ index .U \"model.base_url\" }}{{ else }}DEER_FLOW_MODEL_BASE_URL={{ end }}"
      - "{{ if index .U \"model.api_key\" }}DEER_FLOW_MODEL_API_KEY={{ index .U \"model.api_key\" }}{{ else }}DEER_FLOW_MODEL_API_KEY={{ end }}"
      - "{{ if index .U \"model.use_responses_api\" }}DEER_FLOW_MODEL_USE_RESPONSES_API={{ index .U \"model.use_responses_api\" }}{{ else }}DEER_FLOW_MODEL_USE_RESPONSES_API=false{{ end }}"
      - "{{ if index .U \"model.temperature\" }}DEER_FLOW_MODEL_TEMPERATURE={{ index .U \"model.temperature\" }}{{ else }}DEER_FLOW_MODEL_TEMPERATURE=0.7{{ end }}"
      - "{{ if index .U \"search.tavily_api_key\" }}TAVILY_API_KEY={{ index .U \"search.tavily_api_key\" }}{{ else }}TAVILY_API_KEY={{ end }}"
      - "{{ if index .U \"fetch.jina_api_key\" }}JINA_API_KEY={{ index .U \"fetch.jina_api_key\" }}{{ else }}JINA_API_KEY={{ end }}"
    binds:
      - /lzcapp/var/data/deer-flow/runtime:/deer-flow-state
  nginx:
    image: registry.lazycat.cloud/invokerlaw/library/nginx:f14898f5b3ebfb0b
    command: sh -lc 'mkdir -p /deer-flow-state/config /lzcapp/var/data/deer-flow/skills /lzcapp/var/data/deer-flow/runtime && if [ ! -f /deer-flow-state/config/extensions_config.json ]; then cp /lzcapp/pkg/content/extensions_config.json /deer-flow-state/config/extensions_config.json; fi && if [ ! -f /lzcapp/var/data/deer-flow/skills/README.md ]; then cp /lzcapp/pkg/content/skills/README.md /lzcapp/var/data/deer-flow/skills/README.md; fi && sh /lzcapp/pkg/content/render-deer-flow-config.sh && if [ -f /deer-flow-state/config/model.env ]; then set -a && . /deer-flow-state/config/model.env && set +a; fi && exec nginx -g "daemon off;"'
    environment:
      - "{{ if index .U \"model.api_key\" }}OPENAI_API_KEY={{ index .U \"model.api_key\" }}{{ else }}OPENAI_API_KEY={{ end }}"
      - "{{ if index .U \"model.api_key\" }}OPENROUTER_API_KEY={{ index .U \"model.api_key\" }}{{ else }}OPENROUTER_API_KEY={{ end }}"
      - "{{ if index .U \"model.provider_preset\" }}DEER_FLOW_MODEL_PROVIDER_PRESET={{ index .U \"model.provider_preset\" }}{{ else }}DEER_FLOW_MODEL_PROVIDER_PRESET=openai{{ end }}"
      - "{{ if index .U \"model.name\" }}DEER_FLOW_MODEL_NAME={{ index .U \"model.name\" }}{{ else }}DEER_FLOW_MODEL_NAME=default-chat{{ end }}"
      - "{{ if index .U \"model.display_name\" }}DEER_FLOW_MODEL_DISPLAY_NAME={{ index .U \"model.display_name\" }}{{ else }}DEER_FLOW_MODEL_DISPLAY_NAME=Default Chat Model{{ end }}"
      - "{{ if index .U \"model.id\" }}DEER_FLOW_MODEL_ID={{ index .U \"model.id\" }}{{ else }}DEER_FLOW_MODEL_ID=gpt-4.1-mini{{ end }}"
      - "{{ if index .U \"model.base_url\" }}DEER_FLOW_MODEL_BASE_URL={{ index .U \"model.base_url\" }}{{ else }}DEER_FLOW_MODEL_BASE_URL={{ end }}"
      - "{{ if index .U \"model.api_key\" }}DEER_FLOW_MODEL_API_KEY={{ index .U \"model.api_key\" }}{{ else }}DEER_FLOW_MODEL_API_KEY={{ end }}"
      - "{{ if index .U \"model.use_responses_api\" }}DEER_FLOW_MODEL_USE_RESPONSES_API={{ index .U \"model.use_responses_api\" }}{{ else }}DEER_FLOW_MODEL_USE_RESPONSES_API=false{{ end }}"
      - "{{ if index .U \"model.temperature\" }}DEER_FLOW_MODEL_TEMPERATURE={{ index .U \"model.temperature\" }}{{ else }}DEER_FLOW_MODEL_TEMPERATURE=0.7{{ end }}"
      - "{{ if index .U \"search.tavily_api_key\" }}TAVILY_API_KEY={{ index .U \"search.tavily_api_key\" }}{{ else }}TAVILY_API_KEY={{ end }}"
      - "{{ if index .U \"fetch.jina_api_key\" }}JINA_API_KEY={{ index .U \"fetch.jina_api_key\" }}{{ else }}JINA_API_KEY={{ end }}"
    binds:
      - /lzcapp/pkg/content/nginx.conf:/etc/nginx/nginx.conf
      - /lzcapp/var/data/deer-flow/runtime:/deer-flow-state
  frontend:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/deer-flow-frontend:3a7f541838ffe642
    command: sh -lc 'mkdir -p /deer-flow-state/config /lzcapp/var/data/deer-flow/skills /lzcapp/var/data/deer-flow/runtime && if [ ! -f /deer-flow-state/config/extensions_config.json ]; then cp /lzcapp/pkg/content/extensions_config.json /deer-flow-state/config/extensions_config.json; fi && if [ ! -f /lzcapp/var/data/deer-flow/skills/README.md ]; then cp /lzcapp/pkg/content/skills/README.md /lzcapp/var/data/deer-flow/skills/README.md; fi && sh /lzcapp/pkg/content/render-deer-flow-config.sh && if [ -f /deer-flow-state/config/model.env ]; then set -a && . /deer-flow-state/config/model.env && set +a; fi && cd /app/frontend && pnpm dev --hostname 0.0.0.0 --port 3000'
    environment:
      - BETTER_AUTH_SECRET=${LAZYCAT_APP_ID}-${LAZYCAT_BOX_DOMAIN}-better-auth
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - "{{ if index .U \"model.api_key\" }}OPENAI_API_KEY={{ index .U \"model.api_key\" }}{{ else }}OPENAI_API_KEY={{ end }}"
      - "{{ if index .U \"model.api_key\" }}OPENROUTER_API_KEY={{ index .U \"model.api_key\" }}{{ else }}OPENROUTER_API_KEY={{ end }}"
      - "{{ if index .U \"model.provider_preset\" }}DEER_FLOW_MODEL_PROVIDER_PRESET={{ index .U \"model.provider_preset\" }}{{ else }}DEER_FLOW_MODEL_PROVIDER_PRESET=openai{{ end }}"
      - "{{ if index .U \"model.name\" }}DEER_FLOW_MODEL_NAME={{ index .U \"model.name\" }}{{ else }}DEER_FLOW_MODEL_NAME=default-chat{{ end }}"
      - "{{ if index .U \"model.display_name\" }}DEER_FLOW_MODEL_DISPLAY_NAME={{ index .U \"model.display_name\" }}{{ else }}DEER_FLOW_MODEL_DISPLAY_NAME=Default Chat Model{{ end }}"
      - "{{ if index .U \"model.id\" }}DEER_FLOW_MODEL_ID={{ index .U \"model.id\" }}{{ else }}DEER_FLOW_MODEL_ID=gpt-4.1-mini{{ end }}"
      - "{{ if index .U \"model.base_url\" }}DEER_FLOW_MODEL_BASE_URL={{ index .U \"model.base_url\" }}{{ else }}DEER_FLOW_MODEL_BASE_URL={{ end }}"
      - "{{ if index .U \"model.api_key\" }}DEER_FLOW_MODEL_API_KEY={{ index .U \"model.api_key\" }}{{ else }}DEER_FLOW_MODEL_API_KEY={{ end }}"
      - "{{ if index .U \"model.use_responses_api\" }}DEER_FLOW_MODEL_USE_RESPONSES_API={{ index .U \"model.use_responses_api\" }}{{ else }}DEER_FLOW_MODEL_USE_RESPONSES_API=false{{ end }}"
      - "{{ if index .U \"model.temperature\" }}DEER_FLOW_MODEL_TEMPERATURE={{ index .U \"model.temperature\" }}{{ else }}DEER_FLOW_MODEL_TEMPERATURE=0.7{{ end }}"
      - "{{ if index .U \"search.tavily_api_key\" }}TAVILY_API_KEY={{ index .U \"search.tavily_api_key\" }}{{ else }}TAVILY_API_KEY={{ end }}"
      - "{{ if index .U \"fetch.jina_api_key\" }}JINA_API_KEY={{ index .U \"fetch.jina_api_key\" }}{{ else }}JINA_API_KEY={{ end }}"
    binds:
      - /lzcapp/var/data/deer-flow/runtime:/deer-flow-state
  gateway:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/deer-flow-gateway:40cf35561c2a8983
    command: sh -lc 'mkdir -p /deer-flow-state/config /lzcapp/var/data/deer-flow/skills /lzcapp/var/data/deer-flow/runtime && if [ ! -f /deer-flow-state/config/extensions_config.json ]; then cp /lzcapp/pkg/content/extensions_config.json /deer-flow-state/config/extensions_config.json; fi && if [ ! -f /lzcapp/var/data/deer-flow/skills/README.md ]; then cp /lzcapp/pkg/content/skills/README.md /lzcapp/var/data/deer-flow/skills/README.md; fi && sh /lzcapp/pkg/content/render-deer-flow-config.sh && if [ -f /deer-flow-state/config/model.env ]; then set -a && . /deer-flow-state/config/model.env && set +a; fi && echo "[deer-flow] waiting for model configuration"; until [ -f /deer-flow-state/config/.lazycat-config-ready ]; do sleep 2; done && cd /app/backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --workers 2'
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_SHARED_STATE_DIR=/deer-flow-state
      - DEER_FLOW_CONFIG_DIR=/deer-flow-state/config
      - DEER_FLOW_CONFIG_PATH=/deer-flow-state/config/config.yaml
      - DEER_FLOW_CONFIG_ENV_PATH=/deer-flow-state/config/model.env
      - DEER_FLOW_READY_MARKER=/deer-flow-state/config/.lazycat-config-ready
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/deer-flow-state/config/extensions_config.json
      - OPENAI_API_KEY
      - OPENROUTER_API_KEY
      - ANTHROPIC_API_KEY
      - GEMINI_API_KEY
      - GOOGLE_API_KEY
      - DEEPSEEK_API_KEY
      - VOLCENGINE_API_KEY
      - TAVILY_API_KEY
      - JINA_API_KEY
      - INFOQUEST_API_KEY
      - FIRECRAWL_API_KEY
      - GITHUB_TOKEN
      - "{{ if index .U \"model.api_key\" }}OPENAI_API_KEY={{ index .U \"model.api_key\" }}{{ else }}OPENAI_API_KEY={{ end }}"
      - "{{ if index .U \"model.api_key\" }}OPENROUTER_API_KEY={{ index .U \"model.api_key\" }}{{ else }}OPENROUTER_API_KEY={{ end }}"
      - "{{ if index .U \"model.provider_preset\" }}DEER_FLOW_MODEL_PROVIDER_PRESET={{ index .U \"model.provider_preset\" }}{{ else }}DEER_FLOW_MODEL_PROVIDER_PRESET=openai{{ end }}"
      - "{{ if index .U \"model.name\" }}DEER_FLOW_MODEL_NAME={{ index .U \"model.name\" }}{{ else }}DEER_FLOW_MODEL_NAME=default-chat{{ end }}"
      - "{{ if index .U \"model.display_name\" }}DEER_FLOW_MODEL_DISPLAY_NAME={{ index .U \"model.display_name\" }}{{ else }}DEER_FLOW_MODEL_DISPLAY_NAME=Default Chat Model{{ end }}"
      - "{{ if index .U \"model.id\" }}DEER_FLOW_MODEL_ID={{ index .U \"model.id\" }}{{ else }}DEER_FLOW_MODEL_ID=gpt-4.1-mini{{ end }}"
      - "{{ if index .U \"model.base_url\" }}DEER_FLOW_MODEL_BASE_URL={{ index .U \"model.base_url\" }}{{ else }}DEER_FLOW_MODEL_BASE_URL={{ end }}"
      - "{{ if index .U \"model.api_key\" }}DEER_FLOW_MODEL_API_KEY={{ index .U \"model.api_key\" }}{{ else }}DEER_FLOW_MODEL_API_KEY={{ end }}"
      - "{{ if index .U \"model.use_responses_api\" }}DEER_FLOW_MODEL_USE_RESPONSES_API={{ index .U \"model.use_responses_api\" }}{{ else }}DEER_FLOW_MODEL_USE_RESPONSES_API=false{{ end }}"
      - "{{ if index .U \"model.temperature\" }}DEER_FLOW_MODEL_TEMPERATURE={{ index .U \"model.temperature\" }}{{ else }}DEER_FLOW_MODEL_TEMPERATURE=0.7{{ end }}"
      - "{{ if index .U \"search.tavily_api_key\" }}TAVILY_API_KEY={{ index .U \"search.tavily_api_key\" }}{{ else }}TAVILY_API_KEY={{ end }}"
      - "{{ if index .U \"fetch.jina_api_key\" }}JINA_API_KEY={{ index .U \"fetch.jina_api_key\" }}{{ else }}JINA_API_KEY={{ end }}"
    binds:
      - /lzcapp/var/data/deer-flow/runtime:/deer-flow-state
      - /lzcapp/var/data/deer-flow/runtime:/app/backend/.deer-flow
  langgraph:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/deer-flow-langgraph:cb256c7ad8046bf0
    command: sh -lc 'mkdir -p /deer-flow-state/config /lzcapp/var/data/deer-flow/skills /lzcapp/var/data/deer-flow/runtime && if [ ! -f /deer-flow-state/config/extensions_config.json ]; then cp /lzcapp/pkg/content/extensions_config.json /deer-flow-state/config/extensions_config.json; fi && if [ ! -f /lzcapp/var/data/deer-flow/skills/README.md ]; then cp /lzcapp/pkg/content/skills/README.md /lzcapp/var/data/deer-flow/skills/README.md; fi && sh /lzcapp/pkg/content/render-deer-flow-config.sh && if [ -f /deer-flow-state/config/model.env ]; then set -a && . /deer-flow-state/config/model.env && set +a; fi && echo "[deer-flow] waiting for model configuration"; until [ -f /deer-flow-state/config/.lazycat-config-ready ]; do sleep 2; done && mkdir -p /app/backend/.langgraph_api && cd /app/backend && uv run langgraph dev --no-browser --allow-blocking --no-reload --host 0.0.0.0 --port 2024'
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_SHARED_STATE_DIR=/deer-flow-state
      - DEER_FLOW_CONFIG_DIR=/deer-flow-state/config
      - DEER_FLOW_CONFIG_PATH=/deer-flow-state/config/config.yaml
      - DEER_FLOW_CONFIG_ENV_PATH=/deer-flow-state/config/model.env
      - DEER_FLOW_READY_MARKER=/deer-flow-state/config/.lazycat-config-ready
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/deer-flow-state/config/extensions_config.json
      - OPENAI_API_KEY
      - OPENROUTER_API_KEY
      - ANTHROPIC_API_KEY
      - GEMINI_API_KEY
      - GOOGLE_API_KEY
