params:
  - id: model.provider_preset
    type: string
    name: Provider Preset
    description: "Advanced defaults for DeerFlow. Preferred day-to-day UX is /settings/config."
    default_value: "openai"
    optional: true
  - id: model.name
    type: string
    name: Internal Model Name
    description: "Advanced default only."
    default_value: "default-chat"
    optional: true
  - id: model.display_name
    type: string
    name: Display Name
    description: "Advanced default only."
    default_value: "Default Chat Model"
    optional: true
  - id: model.id
    type: string
    name: API Model ID
    description: "Advanced default only."
    default_value: "gpt-4.1-mini"
    optional: true
  - id: model.base_url
    type: string
    name: Base URL
    description: "Optional advanced default for OpenAI-compatible endpoints."
    default_value: ""
    optional: true
  - id: model.api_key
    type: string
    name: API Key
    description: "Optional advanced default."
    default_value: ""
    optional: true
  - id: model.use_responses_api
    type: string
    name: Use Responses API
    description: "Optional advanced default."
    default_value: "false"
    optional: true
  - id: model.temperature
    type: string
    name: Temperature
    description: "Optional advanced default."
    default_value: "0.7"
    optional: true
  - id: search.tavily_api_key
    type: string
    name: Tavily API Key
    description: "Optional advanced default."
    default_value: ""
    optional: true
  - id: fetch.jina_api_key
    type: string
    name: Jina API Key
    description: "Optional advanced default."
    default_value: ""
    optional: true
