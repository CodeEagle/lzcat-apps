services:
  vibevoice:
    image: registry.lazycat.cloud/placeholder/vibevoice-ai:bootstrap
    restart: unless-stopped
    environment:
      SERVICE_PORT: "3000"
    volumes:
      - ${LZC_AGENT_DATA_DIR}/data:/data
      - ${LZC_AGENT_CACHE_DIR}/cache:/cache
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${LZC_SERVICE_ID}-vibevoice.rule=Host(`vibevoice-ai`)"
      - "traefik.http.services.${LZC_SERVICE_ID}-vibevoice.loadbalancer.server.port=3000"
    networks:
      - traefik-shared-network

networks:
  traefik-shared-network:
    external: true
    name: traefik-shared-network
