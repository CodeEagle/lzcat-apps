name: Update Edit Banana Image

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if no upstream change"
        required: false
        default: false
        type: boolean
      target_version:
        description: "Target upstream commit SHA. Leave empty for latest default-branch commit."
        required: false
        default: ""
        type: string
      publish_to_store:
        description: "Publish to LazyCat App Store"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 */6 * * *"

env:
  UPSTREAM_REPO: BIT-DataLab/Edit-Banana
  PROJECT_NAME: Edit Banana
  PROJECT_NAME_LOWER: edit-banana

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest upstream commit
        id: get-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_SHA="${{ inputs.target_version }}"

          if [ -n "$TARGET_SHA" ]; then
            LATEST_SHA="$TARGET_SHA"
          else
            DEFAULT_BRANCH=$(gh api "repos/${{ env.UPSTREAM_REPO }}" --jq '.default_branch')
            LATEST_SHA=$(gh api "repos/${{ env.UPSTREAM_REPO }}/commits/${DEFAULT_BRANCH}" --jq '.sha')
          fi

          UPSTREAM_SERVER=$(gh api "repos/${{ env.UPSTREAM_REPO }}/contents/server_pa.py?ref=${LATEST_SHA}" --jq '.content' | base64 -d)
          UPSTREAM_VERSION=$(printf '%s\n' "$UPSTREAM_SERVER" | sed -n 's/.*version="\([0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\)".*/\1/p' | head -1)

          if [ -z "$UPSTREAM_VERSION" ]; then
            echo "Failed to detect upstream version from server_pa.py"
            exit 1
          fi

          COMMIT_DATE=$(gh api "repos/${{ env.UPSTREAM_REPO }}/commits/${LATEST_SHA}" --jq '.commit.committer.date')
          SHORT_SHA=$(printf '%s' "$LATEST_SHA" | cut -c1-12)
          SOURCE_TAG=$(printf '%s' "$LATEST_SHA" | cut -c1-7)

          echo "latest_sha=$LATEST_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "source_tag=$SOURCE_TAG" >> "$GITHUB_OUTPUT"
          echo "latest_version=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"

          {
            echo "Build from upstream commit ${LATEST_SHA}"
            echo
            echo "Commit date: ${COMMIT_DATE}"
            echo "Upstream version: ${UPSTREAM_VERSION}"
          } > /tmp/release_notes.txt

      - name: Check if update needed
        id: check-update
        run: |
          CURRENT_REF=$(sed -n 's/^ARG UPSTREAM_REF=//p' Dockerfile | head -1)
          CURRENT_IMAGE=$(grep 'image:' lzc-manifest.yml | head -1 | awk '{print $2}')
          LATEST_SHA="${{ steps.get-version.outputs.latest_sha }}"
          SHORT_SHA="${{ steps.get-version.outputs.short_sha }}"

          echo "Current Dockerfile ref: $CURRENT_REF"
          echo "Current image: $CURRENT_IMAGE"

          if [ "${{ inputs.force_build }}" = "true" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.target_version }}" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          elif [ "$CURRENT_REF" != "$LATEST_SHA" ] || [[ "$CURRENT_IMAGE" != *"$SHORT_SHA"* ]]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        if: steps.check-update.outputs.update_needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.check-update.outputs.update_needed == 'true'
        id: build-image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_SHA="${{ steps.get-version.outputs.latest_sha }}"
          SOURCE_TAG="${{ steps.get-version.outputs.source_tag }}"
          SHORT_SHA="${{ steps.get-version.outputs.short_sha }}"
          LOCAL_IMAGE="ghcr.io/${{ github.repository }}:${SOURCE_TAG}"
          LOCAL_IMAGE=$(echo "$LOCAL_IMAGE" | tr '[:upper:]' '[:lower:]')
          EXTRA_IMAGE="ghcr.io/${{ github.repository }}:${SHORT_SHA}"
          EXTRA_IMAGE=$(echo "$EXTRA_IMAGE" | tr '[:upper:]' '[:lower:]')

          docker build \
            --build-arg UPSTREAM_REPO=${{ env.UPSTREAM_REPO }} \
            --build-arg UPSTREAM_REF="$LATEST_SHA" \
            -t "$LOCAL_IMAGE" \
            -t "$EXTRA_IMAGE" \
            .

          docker push "$LOCAL_IMAGE"
          docker push "$EXTRA_IMAGE"

      - name: Print pushed image
        if: steps.check-update.outputs.update_needed == 'true'
        run: |
          echo "Built and pushed image: ghcr.io/${{ github.repository }}:${{ steps.get-version.outputs.source_tag }}"
