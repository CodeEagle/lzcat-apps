lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.clirelay
version: 6.8.30
min_os_version: 1.3.8
name: CliRelay
description: (LazyCat Auto-build) AI CLI Relay - Unified API for Gemini CLI, Claude Code, OpenAI Codex
license: MIT
homepage: https://help.router-for.me/
author: kittors
application:
  subdomain: clirelay
  routes:
    - /=file:///lzcapp/pkg/content/home
  public_path:
    - /
  upstreams:
    - location: /
      domain_prefix: api
      backend: http://clirelay:8317/
services:
  clirelay:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/clirelay:456eada84925c1e4
    command: >-
      sh -lc 'mkdir -p /CLIProxyAPI/static /lzcapp/var/data/clirelay/auths /lzcapp/var/data/clirelay/logs &&
      cp /lzcapp/pkg/content/management.html /CLIProxyAPI/static/management.html &&
      if [ ! -f /lzcapp/var/data/clirelay/config.yaml ]; then cp /lzcapp/pkg/content/default-config.yaml /lzcapp/var/data/clirelay/config.yaml; fi &&
      ln -sf /lzcapp/var/data/clirelay/config.yaml /CLIProxyAPI/config.yaml &&
      rm -rf /root/.cli-proxy-api &&
      ln -s /lzcapp/var/data/clirelay/auths /root/.cli-proxy-api &&
      rm -rf /CLIProxyAPI/logs &&
      ln -s /lzcapp/var/data/clirelay/logs /CLIProxyAPI/logs &&
      exec /CLIProxyAPI/CLIProxyAPI'
    environment:
      - TZ=Asia/Shanghai
    binds:
      - /lzcapp/var/data/clirelay:/lzcapp/var/data/clirelay
locales:
  en:
    name: CliRelay
    description: (LazyCat Auto-build) AI CLI Relay - Unified API for Gemini CLI, Claude Code, OpenAI Codex
  zh:
    name: CliRelay
    description: （懒猫微服自动构建）AI CLI 代理 - 统一 API 服务
