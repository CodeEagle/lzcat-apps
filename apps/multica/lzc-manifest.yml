lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.multica
version: 0.1.0
min_os_version: 1.3.8
name: Multica
description: multica on LazyCat
homepage: https://github.com/multica-ai/multica
author: TODO
application:
  subdomain: multica
  oidc_redirect_path: /auth/callback
  public_path:
    - /
  injects:
    - id: lazycat-oidc-autologin
      auth_required: true
      when:
        - /login
      do: |
        (() => {
          if (window.location.pathname !== "/login") return;
          const params = new URLSearchParams(window.location.search);
          if (params.has("cli_callback")) return;
          const key = "multica.lazycat.oidc_autologin_started";
          if (window.sessionStorage.getItem(key) === "1") return;
          window.sessionStorage.setItem(key, "1");
          const stateParts = [];
          const next = params.get("next");
          if (next) stateParts.push(`next:${next}`);
          const target = new URL("/auth/oidc/start", window.location.origin);
          if (stateParts.length > 0) target.searchParams.set("state", stateParts.join(","));
          window.location.href = target.toString();
        })();
  upstreams:
    - backend: http://multica-backend:8080/api/
      location: /api/
    - backend: http://multica-backend:8080/ws
      location: /ws/
    - backend: http://multica-frontend:3000/
      location: /

locales:
  en:
    name: Multica
    description: Open-source AI agent management platform. Turn coding agents into real teammates — assign tasks, track progress, compound skills automatically.
  zh:
    name: Multica
    description: 开源 AI 代理管理平台。将 AI 编程代理变成真正的团队成员——分配任务、追踪进度、自动复用技能。

services:
  multica-postgres:
    image: registry.lazycat.cloud/invokerlaw/pgvector/pgvector:9cd4ca43bcc7bd9c
    environment:
      - POSTGRES_DB=multica
      - POSTGRES_USER=multica
      - POSTGRES_PASSWORD=multica
    binds:
      - /lzcapp/var/db/multica/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-multica} -d ${POSTGRES_DB:-multica}
      interval: 5s
      timeout: 5s
      retries: 5
  multica-backend:
    image: registry.lazycat.cloud/placeholder/multica:backend
    depends_on:
      - multica-postgres
    environment:
      - DATABASE_URL=postgres://multica:multica@multica-postgres:5432/multica?sslmode=disable
      - PORT=8080
      - JWT_SECRET=lzc_multica_jwt_secret_please_change_in_production
      - FRONTEND_ORIGIN=https://multica.${LAZYCAT_BOX_DOMAIN}
      - CORS_ALLOWED_ORIGINS=https://multica.${LAZYCAT_BOX_DOMAIN}
      - '{{ if index .U "resend_api_key" }}RESEND_API_KEY={{ index .U "resend_api_key" }}{{ else }}RESEND_API_KEY={{ end }}'
      - '{{ if index .U "resend_from_email" }}RESEND_FROM_EMAIL={{ index .U "resend_from_email" }}{{ else }}RESEND_FROM_EMAIL=noreply@multica.ai{{ end }}'
      - '{{ if index .U "google_client_id" }}GOOGLE_CLIENT_ID={{ index .U "google_client_id" }}{{ else }}GOOGLE_CLIENT_ID={{ end }}'
      - '{{ if index .U "google_client_secret" }}GOOGLE_CLIENT_SECRET={{ index .U "google_client_secret" }}{{ else }}GOOGLE_CLIENT_SECRET={{ end }}'
      - GOOGLE_REDIRECT_URI=https://multica.${LAZYCAT_BOX_DOMAIN}/auth/callback
      - OIDC_CLIENT_ID=${LAZYCAT_AUTH_OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${LAZYCAT_AUTH_OIDC_CLIENT_SECRET}
      - OIDC_AUTH_URI=${LAZYCAT_AUTH_OIDC_AUTH_URI}
      - OIDC_TOKEN_URI=${LAZYCAT_AUTH_OIDC_TOKEN_URI}
      - OIDC_USERINFO_URI=${LAZYCAT_AUTH_OIDC_USERINFO_URI}
      - OIDC_ISSUER_URI=${LAZYCAT_AUTH_OIDC_ISSUER_URI}
      - OIDC_REDIRECT_URI=https://multica.${LAZYCAT_BOX_DOMAIN}/auth/callback
      - S3_BUCKET=
      - S3_REGION=us-west-2
      - CLOUDFRONT_DOMAIN=
      - CLOUDFRONT_KEY_PAIR_ID=
      - CLOUDFRONT_PRIVATE_KEY=
      - COOKIE_DOMAIN=
      - MULTICA_APP_URL=https://multica.${LAZYCAT_BOX_DOMAIN}
    healthcheck:
      test:
        - CMD-SHELL
        - wget --spider -q http://localhost:8080/health || exit 1
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  multica-frontend:
    image: registry.lazycat.cloud/placeholder/multica-multica-frontend:bootstrap
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
    depends_on:
      - multica-backend
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q http://127.0.0.1:3000/ -O /dev/null || exit 1
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
