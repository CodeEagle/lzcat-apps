lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.multica
version: '0.1.14'
min_os_version: 1.3.8
name: multica
description: multica on LazyCat
license: Apache-2.0
homepage: https://multica.ai
author: multica-ai
application:
  subdomain: multica
  public_path:
    - /
  upstreams:
    -
      location: /
      backend: http://web:3000/
services:
  multica:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/multica:ecf063b03864b9d1
    depends_on:
      - postgres
    command: sh -lc './migrate up && exec ./server'
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://multica:multica@postgres:5432/multica?sslmode=disable
      - JWT_SECRET=${LAZYCAT_APP_ID}-${LAZYCAT_BOX_DOMAIN}-jwt
      - RESEND_API_KEY={{ default "" .U.resend_api_key }}
      - RESEND_FROM_EMAIL={{ default "noreply@multica.ai" .U.resend_from_email }}
  web:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/multica-web:ce8ca40a181d5637
    depends_on:
      - multica
    command: sh -lc "sed -i \"s/await sendCode(email);/await sendCode(email).catch(() => {});/g\" '/src/apps/web/app/(auth)/login/page.tsx'; cd apps/web && pnpm build && exec pnpm start --hostname 0.0.0.0 --port ${FRONTEND_PORT:-3000}"
    environment:
      - REMOTE_API_URL=http://multica:8080
      - FRONTEND_PORT=3000
      - NODE_ENV=production
  postgres:
    image: registry.lazycat.cloud/invokerlaw/pgvector/pgvector:9cd4ca43bcc7bd9c
    environment:
      - POSTGRES_DB=multica
      - POSTGRES_USER=multica
      - POSTGRES_PASSWORD=multica
    binds:
      - /lzcapp/var/db/multica/postgres-v3:/var/lib/postgresql/data
  dbfix:
    image: registry.lazycat.cloud/invokerlaw/pgvector/pgvector:9cd4ca43bcc7bd9c
    depends_on:
      - postgres
    command: sh -lc 'until pg_isready -h postgres -U multica >/dev/null 2>&1; do sleep 1; done; psql "postgres://multica:multica@postgres:5432/multica?sslmode=disable" -v ON_ERROR_STOP=0 -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;" -c "CREATE TABLE IF NOT EXISTS \"user\" (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), name TEXT NOT NULL, email TEXT UNIQUE NOT NULL, avatar_url TEXT, created_at TIMESTAMPTZ NOT NULL DEFAULT now(), updated_at TIMESTAMPTZ NOT NULL DEFAULT now());" -c "CREATE TABLE IF NOT EXISTS workspace (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), name TEXT NOT NULL, slug TEXT UNIQUE NOT NULL, description TEXT, context TEXT, settings JSONB NOT NULL DEFAULT '\''{}'\''::jsonb, repos JSONB NOT NULL DEFAULT '\''[]'\''::jsonb, issue_prefix TEXT NOT NULL DEFAULT '\''ISS'\'', issue_counter INTEGER NOT NULL DEFAULT 0, created_at TIMESTAMPTZ NOT NULL DEFAULT now(), updated_at TIMESTAMPTZ NOT NULL DEFAULT now());" -c "ALTER TABLE workspace ADD COLUMN IF NOT EXISTS context TEXT;" -c "ALTER TABLE workspace ADD COLUMN IF NOT EXISTS repos JSONB NOT NULL DEFAULT '\''[]'\''::jsonb;" -c "ALTER TABLE workspace ADD COLUMN IF NOT EXISTS issue_prefix TEXT NOT NULL DEFAULT '\'''\'';" -c "ALTER TABLE workspace ADD COLUMN IF NOT EXISTS issue_counter INT NOT NULL DEFAULT 0;" -c "UPDATE workspace SET issue_prefix = '\''WS'\'' WHERE issue_prefix = '\'''\'';" -c "CREATE TABLE IF NOT EXISTS member (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), workspace_id UUID NOT NULL REFERENCES workspace(id) ON DELETE CASCADE, user_id UUID NOT NULL REFERENCES \"user\"(id) ON DELETE CASCADE, role TEXT NOT NULL, created_at TIMESTAMPTZ NOT NULL DEFAULT now(), UNIQUE(workspace_id, user_id));" -c "CREATE TABLE IF NOT EXISTS verification_code (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), email TEXT NOT NULL, code TEXT NOT NULL, expires_at TIMESTAMPTZ NOT NULL, used BOOLEAN NOT NULL DEFAULT FALSE, created_at TIMESTAMPTZ NOT NULL DEFAULT now());" -c "CREATE INDEX IF NOT EXISTS idx_verification_code_email ON verification_code(email, used, expires_at);" -c "ALTER TABLE verification_code ADD COLUMN IF NOT EXISTS attempts INTEGER NOT NULL DEFAULT 0;" >/dev/null 2>&1 || true; sleep infinity'
  dbfix_task_queue:
    image: registry.lazycat.cloud/invokerlaw/pgvector/pgvector:9cd4ca43bcc7bd9c
    depends_on:
      - postgres
    command: sh -lc 'until pg_isready -h postgres -U multica >/dev/null 2>&1; do sleep 1; done; psql "postgres://multica:multica@postgres:5432/multica?sslmode=disable" -v ON_ERROR_STOP=0 -c "CREATE TABLE IF NOT EXISTS agent_task_queue (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), agent_id UUID NOT NULL, issue_id UUID NOT NULL, status TEXT NOT NULL DEFAULT '\''pending'\'', priority INTEGER NOT NULL DEFAULT 0, dispatched_at TIMESTAMPTZ, started_at TIMESTAMPTZ, completed_at TIMESTAMPTZ, result JSONB, error TEXT, created_at TIMESTAMPTZ NOT NULL DEFAULT now(), context JSONB NOT NULL DEFAULT '\''{}'\''::jsonb, runtime_id UUID, session_id TEXT, work_dir TEXT, trigger_comment_id UUID);" -c "CREATE TABLE IF NOT EXISTS agent_runtime (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), workspace_id UUID NOT NULL, daemon_id TEXT, name TEXT NOT NULL DEFAULT '\''runtime'\'', runtime_mode TEXT NOT NULL DEFAULT '\''local'\'', provider TEXT NOT NULL DEFAULT '\''codex'\'', status TEXT NOT NULL DEFAULT '\''offline'\'', device_info TEXT NOT NULL DEFAULT '\'''\'' , metadata JSONB NOT NULL DEFAULT '\''{}'\''::jsonb, last_seen_at TIMESTAMPTZ NOT NULL DEFAULT now(), created_at TIMESTAMPTZ NOT NULL DEFAULT now(), updated_at TIMESTAMPTZ NOT NULL DEFAULT now());" >/dev/null 2>&1 || true; sleep infinity'
locales:
  en:
    name: multica
    description: multica on LazyCat
  zh:
    name: multica
    description: （迁移初稿）Multica 的懒猫微服版本
