lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.multica
version: '0.1.14'
min_os_version: 1.3.8
name: multica
description: multica on LazyCat
license: Apache-2.0
homepage: https://multica.ai
author: multica-ai
application:
  subdomain: multica
  public_path:
    - /
  upstreams:
    -
      location: /
      backend: http://gateway:80/
services:
  multica:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/multica:5c7472ef4f3fcf8f
    depends_on:
      - postgres
    command: sh -lc './migrate up && exec ./server'
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://multica:multica@postgres:5432/multica?sslmode=disable
      - JWT_SECRET=${LAZYCAT_APP_ID}-${LAZYCAT_BOX_DOMAIN}-jwt
  gateway:
    image: registry.lazycat.cloud/invokerlaw/library/nginx:f14898f5b3ebfb0b
    depends_on:
      - multica
    binds:
      - /lzcapp/pkg/content/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /lzcapp/pkg/content/nginx/index.html:/usr/share/nginx/html/index.html
  postgres:
    image: registry.lazycat.cloud/invokerlaw/pgvector/pgvector:9cd4ca43bcc7bd9c
    environment:
      - POSTGRES_DB=multica
      - POSTGRES_USER=multica
      - POSTGRES_PASSWORD=multica
    binds:
      - /lzcapp/var/db/multica/postgres:/var/lib/postgresql/data
locales:
  en:
    name: multica
    description: multica on LazyCat
  zh:
    name: multica
    description: （迁移初稿）Multica 的懒猫微服版本
