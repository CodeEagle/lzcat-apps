lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.multica
version: '0.1.14'
min_os_version: 1.3.8
name: multica
description: multica on LazyCat
license: Apache-2.0
homepage: https://multica.ai
author: multica-ai
application:
  subdomain: multica
  public_path:
    - /
  upstreams:
    -
      location: /
      backend: http://web:3000/
services:
  multica:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/multica:9612cb395cb72334
    depends_on:
      - postgres
    command: sh -lc './migrate up && exec ./server'
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://multica:multica@postgres:5432/multica?sslmode=disable
      - JWT_SECRET=${LAZYCAT_APP_ID}-${LAZYCAT_BOX_DOMAIN}-jwt
  web:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/multica-web:bbb943bd6d297717
    depends_on:
      - multica
    command: sh -lc 'cd apps/web && pnpm build && exec pnpm start --hostname 0.0.0.0 --port ${FRONTEND_PORT:-3000}'
    environment:
      - REMOTE_API_URL=http://multica:8080
      - FRONTEND_PORT=3000
  postgres:
    image: registry.lazycat.cloud/invokerlaw/pgvector/pgvector:9cd4ca43bcc7bd9c
    environment:
      - POSTGRES_DB=multica
      - POSTGRES_USER=multica
      - POSTGRES_PASSWORD=multica
    binds:
      - /lzcapp/var/db/multica/postgres:/var/lib/postgresql/data
locales:
  en:
    name: multica
    description: multica on LazyCat
  zh:
    name: multica
    description: （迁移初稿）Multica 的懒猫微服版本
