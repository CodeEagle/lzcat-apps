lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.multica
version: 0.1.0
min_os_version: 1.3.8
name: Multica
description: multica on LazyCat
homepage: https://github.com/multica-ai/multica
author: TODO
application:
  subdomain: multica
  public_path:
    - /
  upstreams:
    - backend: http://multica-backend:8080/api/
      location: /api/
    - backend: http://multica-backend:8080/auth/
      location: /auth/
    - backend: http://multica-backend:8080/ws
      location: /ws/
    - backend: http://multica-frontend:3000/
      location: /
  injects:
    # Browser inject: auto-fill email, submit login form, then fill OTP for password-free access
    - id: multica-autofill-login
      auth_required: false
      when:
        - /login
      do: |
        (function () {
          // Guard against re-injection within the same page session
          if (window.__multicaLoginInjected) return;
          window.__multicaLoginInjected = true;

          const TARGET_EMAIL = ctx.deploy_params && ctx.deploy_params.login_email
            ? ctx.deploy_params.login_email
            : (ctx.persist.get("multica.login_email") || "");

          // Cooldown guard: don't auto-submit if we sent a code within the last 60s.
          // This prevents "please wait" errors when the page reloads (browser Back,
          // unauth redirect, etc.) while the backend rate-limit is still active.
          const COOLDOWN_MS = 62000;
          const lastSent = parseInt(ctx.persist.get("multica.last_code_sent_at") || "0", 10);
          const inCooldown = (Date.now() - lastSent) < COOLDOWN_MS;

          // Use React's native value setter to trigger React onChange properly
          const nativeSetter = Object.getOwnPropertyDescriptor(
            window.HTMLInputElement.prototype, "value"
          ).set;

          function fillReactInput(el, value) {
            nativeSetter.call(el, value);
            el.dispatchEvent(new Event("input", { bubbles: true }));
            el.dispatchEvent(new Event("change", { bubbles: true }));
          }

          // Fill the OTP hidden input rendered by input-otp (maxlength=6)
          function tryFillOtp() {
            const otpInput = document.querySelector(
              'input[data-input-otp], input[autocomplete="one-time-code"], ' +
              'input[type="text"][maxlength="6"]'
            );
            if (otpInput && !otpInput.value) {
              fillReactInput(otpInput, "888888");
              return true;
            }
            return false;
          }

          // Intercept the "Back" button on the OTP code step so it navigates
          // to homepage instead of reverting to the email step.
          function patchBackButton() {
            const btns = document.querySelectorAll('button[type="button"]');
            btns.forEach(function (btn) {
              if (btn.textContent.trim() === "Back" && !btn.__lzcPatched) {
                btn.__lzcPatched = true;
                btn.addEventListener("click", function (e) {
                  e.stopImmediatePropagation();
                  window.location.href = "/";
                }, true);
              }
            });
          }

          let emailSubmitted = false;

          function tryFillAndSubmitEmail() {
            if (emailSubmitted || inCooldown) return false;
            const emailInput = document.querySelector(
              'input[type="email"], input[id="login-email"]'
            );
            if (!emailInput || !TARGET_EMAIL) return false;
            if (!emailInput.value) {
              fillReactInput(emailInput, TARGET_EMAIL);
              ctx.persist.set("multica.login_email", TARGET_EMAIL);
            }
            // Lock immediately so no subsequent DOM mutation re-triggers this
            emailSubmitted = true;
            setTimeout(function () {
              const form = document.getElementById("login-form");
              const submitBtn = document.querySelector(
                'button[type="submit"][form="login-form"], button[type="submit"]'
              );
              if (form) {
                ctx.persist.set("multica.last_code_sent_at", String(Date.now()));
                try { form.requestSubmit(); } catch (e) { form.submit(); }
              } else if (submitBtn && !submitBtn.disabled) {
                ctx.persist.set("multica.last_code_sent_at", String(Date.now()));
                submitBtn.click();
              }
            }, 600);
            return true;
          }

          let otpFilled = false;
          const observer = new MutationObserver(function () {
            if (!emailSubmitted && !inCooldown) tryFillAndSubmitEmail();
            if (!otpFilled) otpFilled = tryFillOtp();
            patchBackButton();
          });
          observer.observe(document.body, { childList: true, subtree: true });
          tryFillAndSubmitEmail();
          patchBackButton();
          setTimeout(tryFillOtp, 2000);
        })();

locales:
  en:
    name: Multica
    description: Open-source AI agent management platform. Turn coding agents into real teammates — assign tasks, track progress, compound skills automatically.
  zh:
    name: Multica
    description: 开源 AI 代理管理平台。将 AI 编程代理变成真正的团队成员——分配任务、追踪进度、自动复用技能。

deploy_params:
  - key: login_email
    description: Login email for password-free access (leave blank to enter manually)
    required: false
    default: ""

services:
  multica-postgres:
    image: registry.lazycat.cloud/invokerlaw/pgvector/pgvector:9cd4ca43bcc7bd9c
    environment:
      - POSTGRES_DB=multica
      - POSTGRES_USER=multica
      - POSTGRES_PASSWORD=multica
    binds:
      - /lzcapp/var/db/multica/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-multica} -d ${POSTGRES_DB:-multica}
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    image: registry.lazycat.cloud/placeholder/multica:backend
    depends_on:
      - multica-postgres
    healthcheck:
      test:
        - CMD-SHELL
        - wget --spider -q http://localhost:8080/health || exit 1
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  multica-frontend:
    image: registry.lazycat.cloud/placeholder/multica-multica-frontend:bootstrap
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
    depends_on:
      - multica-backend
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q http://127.0.0.1:3000/ -O /dev/null || exit 1
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
