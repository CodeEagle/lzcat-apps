lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.multica
version: 0.1.0
min_os_version: 1.3.8
name: multica
description: The open-source managed agents platform
license: TODO
homepage: https://multica.ai
author: multica-ai
application:
  subdomain: multica
  public_path:
    - /
  upstreams:
    -
      location: /
      backend: http://postgres:5432/
services:
  postgres:
    image: registry.lazycat.cloud/placeholder/multica:postgres
    environment:
      - POSTGRES_DB=multica
      - POSTGRES_USER=multica
      - POSTGRES_PASSWORD=multica
    binds:
      - /lzcapp/var/db/multica/postgres:/var/lib/postgresql/data
locales:
  en:
    name: multica
    description: The open-source managed agents platform
  zh:
    name: multica
    description: （迁移初稿）Multica 的懒猫微服版本
