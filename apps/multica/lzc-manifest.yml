lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.multica
version: '0.1.14'
min_os_version: 1.3.8
name: multica
description: multica on LazyCat
license: Apache-2.0
homepage: https://multica.ai
author: multica-ai
application:
  subdomain: multica
  public_path:
    - /
  upstreams:
    -
      location: /
      backend: http://web:3000/
services:
  multica:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/multica:3f06c2dc66b23451
    depends_on:
      - postgres
      - dbfix
      - dbfix_task_queue
    command: sh -lc 'until ./migrate up; do echo "waiting for postgres..."; sleep 2; done; until psql "$DATABASE_URL" -Atc "SELECT 1 FROM pg_catalog.pg_tables WHERE schemaname='\''public'\'' AND tablename='\''daemon_token'\'';" | grep -q 1; do echo "waiting for schema bootstrap..."; sleep 2; done; exec ./server'
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://multica:multica@postgres:5432/multica?sslmode=disable
      - JWT_SECRET=${LAZYCAT_APP_ID}-${LAZYCAT_BOX_DOMAIN}-jwt
      - RESEND_API_KEY={{ default "" .U.resend_api_key }}
      - RESEND_FROM_EMAIL={{ default "noreply@multica.ai" .U.resend_from_email }}
  web:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/multica-web:0ddfbf6e7361eb7a
    depends_on:
      - multica
    command: sh -lc "sed -i \"s/await sendCode(email);/await sendCode(email).catch(() => {});/g\" '/src/apps/web/app/(auth)/login/page.tsx'; cd apps/web && pnpm build && exec pnpm start --hostname 0.0.0.0 --port ${FRONTEND_PORT:-3000}"
    environment:
      - REMOTE_API_URL=http://multica:8080
      - FRONTEND_PORT=3000
      - NODE_ENV=production
  postgres:
    image: registry.lazycat.cloud/invokerlaw/pgvector/pgvector:9cd4ca43bcc7bd9c
    environment:
      - POSTGRES_DB=multica
      - POSTGRES_USER=multica
      - POSTGRES_PASSWORD=multica
    binds:
      - /lzcapp/var/db/multica/postgres-v4:/var/lib/postgresql/data
  dbfix:
    image: registry.lazycat.cloud/invokerlaw/pgvector/pgvector:9cd4ca43bcc7bd9c
    depends_on:
      - postgres
    command: sh -lc 'until pg_isready -h postgres -U multica >/dev/null 2>&1; do sleep 1; done; psql "postgres://multica:multica@postgres:5432/multica?sslmode=disable" -v ON_ERROR_STOP=0 -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;" -c "CREATE TABLE IF NOT EXISTS \"user\" (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), name TEXT NOT NULL, email TEXT UNIQUE NOT NULL, avatar_url TEXT, created_at TIMESTAMPTZ NOT NULL DEFAULT now(), updated_at TIMESTAMPTZ NOT NULL DEFAULT now());" -c "CREATE TABLE IF NOT EXISTS workspace (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), name TEXT NOT NULL, slug TEXT UNIQUE NOT NULL, description TEXT, context TEXT, settings JSONB NOT NULL DEFAULT '\''{}'\''::jsonb, repos JSONB NOT NULL DEFAULT '\''[]'\''::jsonb, issue_prefix TEXT NOT NULL DEFAULT '\''ISS'\'', issue_counter INTEGER NOT NULL DEFAULT 0, created_at TIMESTAMPTZ NOT NULL DEFAULT now(), updated_at TIMESTAMPTZ NOT NULL DEFAULT now());" -c "ALTER TABLE workspace ADD COLUMN IF NOT EXISTS context TEXT;" -c "ALTER TABLE workspace ADD COLUMN IF NOT EXISTS repos JSONB NOT NULL DEFAULT '\''[]'\''::jsonb;" -c "ALTER TABLE workspace ADD COLUMN IF NOT EXISTS issue_prefix TEXT NOT NULL DEFAULT '\'''\'';" -c "ALTER TABLE workspace ADD COLUMN IF NOT EXISTS issue_counter INT NOT NULL DEFAULT 0;" -c "UPDATE workspace SET issue_prefix = '\''WS'\'' WHERE issue_prefix = '\'''\'';" -c "CREATE TABLE IF NOT EXISTS member (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), workspace_id UUID NOT NULL REFERENCES workspace(id) ON DELETE CASCADE, user_id UUID NOT NULL REFERENCES \"user\"(id) ON DELETE CASCADE, role TEXT NOT NULL, created_at TIMESTAMPTZ NOT NULL DEFAULT now(), UNIQUE(workspace_id, user_id));" -c "CREATE TABLE IF NOT EXISTS verification_code (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), email TEXT NOT NULL, code TEXT NOT NULL, expires_at TIMESTAMPTZ NOT NULL, used BOOLEAN NOT NULL DEFAULT FALSE, created_at TIMESTAMPTZ NOT NULL DEFAULT now());" -c "CREATE INDEX IF NOT EXISTS idx_verification_code_email ON verification_code(email, used, expires_at);" -c "ALTER TABLE verification_code ADD COLUMN IF NOT EXISTS attempts INTEGER NOT NULL DEFAULT 0;" -c "CREATE TABLE IF NOT EXISTS personal_access_token (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), user_id UUID NOT NULL REFERENCES \"user\"(id) ON DELETE CASCADE, name TEXT NOT NULL, token_hash TEXT NOT NULL, token_prefix TEXT NOT NULL, expires_at TIMESTAMPTZ, last_used_at TIMESTAMPTZ, revoked BOOLEAN NOT NULL DEFAULT FALSE, created_at TIMESTAMPTZ NOT NULL DEFAULT now());" -c "CREATE INDEX IF NOT EXISTS idx_pat_user ON personal_access_token(user_id, revoked);" -c "CREATE UNIQUE INDEX IF NOT EXISTS idx_pat_token_hash ON personal_access_token(token_hash);" -c "CREATE TABLE IF NOT EXISTS daemon_token (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), token_hash TEXT NOT NULL, workspace_id UUID NOT NULL REFERENCES workspace(id) ON DELETE CASCADE, daemon_id TEXT NOT NULL, expires_at TIMESTAMPTZ NOT NULL, created_at TIMESTAMPTZ NOT NULL DEFAULT now());" -c "CREATE UNIQUE INDEX IF NOT EXISTS idx_daemon_token_hash ON daemon_token(token_hash);" -c "CREATE INDEX IF NOT EXISTS idx_daemon_token_workspace_daemon ON daemon_token(workspace_id, daemon_id);" >/dev/null 2>&1 || true; sleep infinity'
  dbfix_task_queue:
    image: registry.lazycat.cloud/invokerlaw/pgvector/pgvector:9cd4ca43bcc7bd9c
    depends_on:
      - postgres
    command: sh -lc 'until pg_isready -h postgres -U multica >/dev/null 2>&1; do sleep 1; done; psql "postgres://multica:multica@postgres:5432/multica?sslmode=disable" -v ON_ERROR_STOP=0 -c "CREATE TABLE IF NOT EXISTS agent_task_queue (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), agent_id UUID NOT NULL, issue_id UUID NOT NULL, status TEXT NOT NULL DEFAULT '\''pending'\'', priority INTEGER NOT NULL DEFAULT 0, dispatched_at TIMESTAMPTZ, started_at TIMESTAMPTZ, completed_at TIMESTAMPTZ, result JSONB, error TEXT, created_at TIMESTAMPTZ NOT NULL DEFAULT now(), context JSONB NOT NULL DEFAULT '\''{}'\''::jsonb, runtime_id UUID, session_id TEXT, work_dir TEXT, trigger_comment_id UUID);" -c "CREATE TABLE IF NOT EXISTS agent_runtime (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), workspace_id UUID NOT NULL, daemon_id TEXT, name TEXT NOT NULL DEFAULT '\''runtime'\'', runtime_mode TEXT NOT NULL DEFAULT '\''local'\'', provider TEXT NOT NULL DEFAULT '\''codex'\'', status TEXT NOT NULL DEFAULT '\''offline'\'', device_info TEXT NOT NULL DEFAULT '\'''\'' , metadata JSONB NOT NULL DEFAULT '\''{}'\''::jsonb, last_seen_at TIMESTAMPTZ NOT NULL DEFAULT now(), created_at TIMESTAMPTZ NOT NULL DEFAULT now(), updated_at TIMESTAMPTZ NOT NULL DEFAULT now());" -c "DELETE FROM agent_runtime a USING agent_runtime b WHERE a.id < b.id AND a.workspace_id = b.workspace_id AND a.daemon_id = b.daemon_id AND a.provider = b.provider AND a.daemon_id IS NOT NULL;" -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_constraint WHERE conname = '\''uq_agent_runtime_workspace_daemon_provider'\'') THEN ALTER TABLE agent_runtime ADD CONSTRAINT uq_agent_runtime_workspace_daemon_provider UNIQUE (workspace_id, daemon_id, provider); END IF; END \$\$;" -c "CREATE INDEX IF NOT EXISTS idx_agent_runtime_workspace ON agent_runtime(workspace_id);" -c "CREATE INDEX IF NOT EXISTS idx_agent_runtime_status ON agent_runtime(workspace_id, status);" >/dev/null 2>&1 || true; sleep infinity'
  db_audit:
    image: registry.lazycat.cloud/invokerlaw/pgvector/pgvector:9cd4ca43bcc7bd9c
    depends_on:
      - postgres
      - dbfix
      - dbfix_task_queue
    command: sh -lc "until pg_isready -h postgres -U multica >/dev/null 2>&1; do sleep 1; done; until psql \"postgres://multica:multica@postgres:5432/multica?sslmode=disable\" -Atc \"SELECT 1 FROM pg_catalog.pg_tables WHERE schemaname='public' AND tablename='daemon_token';\" | grep -q 1; do sleep 1; done; report=\$(psql \"postgres://multica:multica@postgres:5432/multica?sslmode=disable\" -Atc \"WITH expected_tables(kind,name) AS (VALUES ('table','user'),('table','workspace'),('table','member'),('table','agent'),('table','issue'),('table','issue_label'),('table','issue_to_label'),('table','issue_dependency'),('table','comment'),('table','inbox_item'),('table','agent_task_queue'),('table','daemon_connection'),('table','activity_log'),('table','agent_runtime'),('table','daemon_pairing_session'),('table','skill'),('table','skill_file'),('table','agent_skill'),('table','verification_code'),('table','personal_access_token'),('table','runtime_usage'),('table','issue_subscriber'),('table','comment_reaction'),('table','task_message'),('table','issue_reaction'),('table','attachment'),('table','daemon_token')), expected_indexes(kind,name) AS (VALUES ('index','idx_pat_token_hash'),('index','idx_daemon_token_hash'),('index','idx_daemon_token_workspace_daemon')), expected_constraints(kind,name) AS (VALUES ('constraint','uq_agent_runtime_workspace_daemon_provider')), missing_tables AS (SELECT kind, name FROM expected_tables e LEFT JOIN pg_catalog.pg_tables t ON t.schemaname='public' AND t.tablename=e.name WHERE t.tablename IS NULL), missing_indexes AS (SELECT kind, name FROM expected_indexes e LEFT JOIN pg_catalog.pg_indexes i ON i.schemaname='public' AND i.indexname=e.name WHERE i.indexname IS NULL), missing_constraints AS (SELECT kind, name FROM expected_constraints e LEFT JOIN pg_catalog.pg_constraint c ON c.conname=e.name WHERE c.conname IS NULL) SELECT kind || ':' || name FROM missing_tables UNION ALL SELECT kind || ':' || name FROM missing_indexes UNION ALL SELECT kind || ':' || name FROM missing_constraints ORDER BY 1;\"); if [ -n \"\$report\" ]; then echo \"[schema-audit] missing schema objects:\"; echo \"\$report\"; else echo \"[schema-audit] all required tables, indexes, and constraints exist\"; fi; sleep infinity"
  db_smoke:
    image: registry.lazycat.cloud/invokerlaw/pgvector/pgvector:9cd4ca43bcc7bd9c
    depends_on:
      - postgres
      - dbfix
      - dbfix_task_queue
    command: sh -lc "until pg_isready -h postgres -U multica >/dev/null 2>&1; do sleep 1; done; until psql \"postgres://multica:multica@postgres:5432/multica?sslmode=disable\" -Atc \"SELECT 1 FROM pg_catalog.pg_tables WHERE schemaname='public' AND tablename='daemon_token';\" | grep -q 1; do sleep 1; done; psql \"postgres://multica:multica@postgres:5432/multica?sslmode=disable\" -v ON_ERROR_STOP=1 -c \"BEGIN;\" -c \"DO \\\$\\\$ DECLARE v_user UUID := gen_random_uuid(); v_workspace UUID := gen_random_uuid(); v_runtime UUID; BEGIN INSERT INTO \\\"user\\\" (id, name, email) VALUES (v_user, 'schema smoke', 'smoke_' || replace(v_user::text, '-', '') || '@example.com'); INSERT INTO workspace (id, name, slug, issue_prefix, issue_counter) VALUES (v_workspace, 'schema smoke', 'smoke-' || substr(replace(v_workspace::text, '-', ''), 1, 12), 'SMK', 0); INSERT INTO member (id, workspace_id, user_id, role) VALUES (gen_random_uuid(), v_workspace, v_user, 'owner'); INSERT INTO agent_runtime (workspace_id, daemon_id, name, runtime_mode, provider, status, device_info, metadata, last_seen_at) VALUES (v_workspace, 'schema-smoke-daemon', 'Schema Smoke Runtime', 'local', 'codex', 'online', 'schema-smoke', '{}'::jsonb, now()) ON CONFLICT (workspace_id, daemon_id, provider) DO UPDATE SET updated_at = now(), last_seen_at = now() RETURNING id INTO v_runtime; INSERT INTO personal_access_token (id, user_id, name, token_hash, token_prefix, created_at) VALUES (gen_random_uuid(), v_user, 'schema smoke', md5('schema-smoke-token'), 'mul_smoke', now()); INSERT INTO daemon_token (id, token_hash, workspace_id, daemon_id, expires_at, created_at) VALUES (gen_random_uuid(), md5('schema-smoke-daemon-token'), v_workspace, 'schema-smoke-daemon', now() + interval '1 day', now()); INSERT INTO runtime_usage (id, runtime_id, date, provider, model, input_tokens, output_tokens, cache_read_tokens, cache_write_tokens, created_at, updated_at) VALUES (gen_random_uuid(), v_runtime, current_date, 'codex', 'schema-smoke', 0, 0, 0, 0, now(), now()) ON CONFLICT (runtime_id, date, provider, model) DO UPDATE SET updated_at = now(); END \\\$\\\$;\" -c \"ROLLBACK;\" && echo \"[schema-smoke] transactional write checks passed\"; sleep infinity"
locales:
  en:
    name: multica
    description: multica on LazyCat
  zh:
    name: multica
    description: （迁移初稿）Multica 的懒猫微服版本
