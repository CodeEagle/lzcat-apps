lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.multica
version: 0.1.0
min_os_version: 1.3.8
name: Multica
description: multica on LazyCat
homepage: https://github.com/multica-ai/multica
author: TODO
application:
  subdomain: multica
  public_path:
    - /
  upstreams:
    - backend: http://multica-backend:8080/api/
      location: /api/
    - backend: http://multica-backend:8080/auth/
      location: /auth/
    - backend: http://multica-backend:8080/ws
      location: /ws/
    - backend: http://multica-frontend:3000/
      location: /
  injects:
    # Browser inject: auto-fill email, submit login form, then fill OTP for password-free access
    - id: multica-autofill-login
      auth_required: false
      when:
        - /login
      do: |
        (function () {
          if (window.__multicaLoginInjected) return;
          window.__multicaLoginInjected = true;

          // ctx.params (not ctx.deploy_params) is the correct LazyCat inject API
          const TARGET_EMAIL = (ctx.params && ctx.params.login_email) || "";

          // Use sessionStorage for synchronous cooldown tracking.
          // ctx.persist.get() is ASYNC (returns Promise) - cannot be used synchronously.
          // sessionStorage persists across page navigations within the same browser tab.
          const COOLDOWN_MS = 62000;
          function getLastSent() {
            return parseInt(sessionStorage.getItem("multica.last_code_sent_at") || "0", 10);
          }
          function setLastSent() {
            sessionStorage.setItem("multica.last_code_sent_at", String(Date.now()));
          }
          function inCooldown() {
            return (Date.now() - getLastSent()) < COOLDOWN_MS;
          }

          const nativeSetter = Object.getOwnPropertyDescriptor(
            window.HTMLInputElement.prototype, "value"
          ).set;

          function fillReactInput(el, value) {
            nativeSetter.call(el, value);
            el.dispatchEvent(new Event("input", { bubbles: true }));
            el.dispatchEvent(new Event("change", { bubbles: true }));
          }

          function tryFillOtp() {
            const otpInput = document.querySelector(
              'input[data-input-otp], input[autocomplete="one-time-code"], ' +
              'input[type="text"][maxlength="6"]'
            );
            if (otpInput && !otpInput.value) {
              fillReactInput(otpInput, "888888");
              return true;
            }
            return false;
          }

          // Directly bind to "Back" button when it appears in the OTP step.
          // When the Back button is found, we also call setLastSent() so that
          // even a manually-sent code is tracked — preventing re-submission
          // if the user returns to /login after clicking Back.
          function attachBackListener() {
            var buttons = document.querySelectorAll("button");
            for (var i = 0; i < buttons.length; i++) {
              var btn = buttons[i];
              if (btn.textContent.trim() === "Back" && !btn.__lzcBackPatched) {
                btn.__lzcBackPatched = true;
                // OTP step is now visible — record cooldown even if user sent manually
                setLastSent();
                btn.addEventListener("click", function () {
                  // Ensure cooldown is recorded, then navigate home after React
                  setLastSent();
                  setTimeout(function () { window.location.href = "/"; }, 50);
                }, { once: true });
              }
            }
          }

          let emailSubmitted = false;

          function tryFillAndSubmitEmail() {
            if (emailSubmitted || inCooldown()) return false;
            const emailInput = document.querySelector(
              'input[type="email"], input[id="login-email"]'
            );
            if (!emailInput || !TARGET_EMAIL) return false;
            if (!emailInput.value) {
              fillReactInput(emailInput, TARGET_EMAIL);
            }
            emailSubmitted = true;
            setTimeout(function () {
              const form = document.getElementById("login-form");
              const submitBtn = document.querySelector(
                'button[type="submit"][form="login-form"], button[type="submit"]'
              );
              if (form) {
                setLastSent();
                try { form.requestSubmit(); } catch (e) { form.submit(); }
              } else if (submitBtn && !submitBtn.disabled) {
                setLastSent();
                submitBtn.click();
              }
            }, 600);
            return true;
          }

          let otpFilled = false;
          const observer = new MutationObserver(function () {
            attachBackListener();
            if (!emailSubmitted && !inCooldown()) tryFillAndSubmitEmail();
            if (!otpFilled) otpFilled = tryFillOtp();
          });
          observer.observe(document.body, { childList: true, subtree: true });
          attachBackListener();
          tryFillAndSubmitEmail();
          setTimeout(tryFillOtp, 2000);
        })();

locales:
  en:
    name: Multica
    description: Open-source AI agent management platform. Turn coding agents into real teammates — assign tasks, track progress, compound skills automatically.
  zh:
    name: Multica
    description: 开源 AI 代理管理平台。将 AI 编程代理变成真正的团队成员——分配任务、追踪进度、自动复用技能。

deploy_params:
  - key: login_email
    description: Login email for password-free access (leave blank to enter manually)
    required: false
    default: ""

services:
  multica-postgres:
    image: registry.lazycat.cloud/invokerlaw/pgvector/pgvector:9cd4ca43bcc7bd9c
    environment:
      - POSTGRES_DB=multica
      - POSTGRES_USER=multica
      - POSTGRES_PASSWORD=multica
    binds:
      - /lzcapp/var/db/multica/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-multica} -d ${POSTGRES_DB:-multica}
      interval: 5s
      timeout: 5s
      retries: 5
  multica-backend:
    image: registry.lazycat.cloud/placeholder/multica:backend
    depends_on:
      - multica-postgres
    healthcheck:
      test:
        - CMD-SHELL
        - wget --spider -q http://localhost:8080/health || exit 1
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  multica-frontend:
    image: registry.lazycat.cloud/placeholder/multica-multica-frontend:bootstrap
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
    depends_on:
      - multica-backend
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q http://127.0.0.1:3000/ -O /dev/null || exit 1
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
