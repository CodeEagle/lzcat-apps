<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multica Gateway</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 24px; color: #111; background: #f6f8fa; }
      .card { max-width: 760px; margin: 40px auto; background: #fff; border: 1px solid #d0d7de; border-radius: 10px; padding: 24px; }
      h1 { margin-top: 0; font-size: 24px; }
      code { background: #f6f8fa; padding: 2px 6px; border-radius: 6px; }
      ul { line-height: 1.8; }
      a { color: #0969da; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Multica backend is running</h1>
      <p>The full upstream web UI is not bundled in this package yet. Available endpoints:</p>
      <ul>
        <li><a href="/health"><code>/health</code></a></li>
        <li><code>/api/*</code> (proxied to backend)</li>
        <li><code>/auth/*</code> (proxied to backend)</li>
        <li><code>/ws</code> (proxied websocket endpoint)</li>
      </ul>
    </div>
  </body>
</html>
