lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.higress
version: '2.2.0'
min_os_version: 1.3.8
name: Higress
description: (LazyCat Auto-build) AI Native API Gateway
license: Apache-2.0
homepage: https://higress.io
author: Alibaba
application:
  subdomain: higress
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://higress:8001/
services:
  higress:
    image: registry.lazycat.cloud/invokerlaw/higress/all-in-one:33987ebb391d3192
    environment:
      # Higress 控制台端口
      - HIGRESS_CONSOLE_PORT=8001
      # HTTP 端口
      - HIGRESS_HTTP_PORT=8080
      # HTTPS 端口
      - HIGRESS_HTTPS_PORT=8443
    binds:
      # 配置文件持久化
      - /lzcapp/var/data:/data
locales:
  en:
    name: Higress
    description: (LazyCat Auto-build) AI Native API Gateway
  zh:
    name: Higress
    description: （懒猫微服自动构建）AI 原生 API 网关
