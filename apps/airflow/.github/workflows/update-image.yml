name: Update Image

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if version exists'
        required: false
        default: 'false'
        type: boolean
      target_version:
        description: 'Target version to build'
        required: false
        default: ''
        type: string
      publish_to_store:
        description: 'Reserved for lzcat-trigger compatibility'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 */6 * * *'

jobs:
  update-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.target_version }}" ]; then
            SOURCE_VERSION="${{ inputs.target_version }}"
          else
            SOURCE_VERSION=$(gh api 'repos/apache/airflow/releases?per_page=20' --jq '.[] | .tag_name' | while read -r tag; do
              if [[ "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "$tag"
                break
              fi
            done)
          fi
          VERSION="${SOURCE_VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "Failed to resolve Airflow version"
            exit 1
          fi
          echo "source_version=${SOURCE_VERSION}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            if echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin; then
              exit 0
            fi
            echo "GHCR login failed on attempt ${attempt}, retrying..."
            sleep 10
          done
          echo "Failed to login to GHCR after retries"
          exit 1

      - name: Pull and tag image
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SOURCE_VERSION=${{ steps.version.outputs.source_version }}
          # Convert to lowercase for ghcr.io
          GHCR_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          # Pull official image
          docker pull apache/airflow:${VERSION}
          
          # Tag for GHCR
          docker tag apache/airflow:${VERSION} ghcr.io/${GHCR_REPO}:${SOURCE_VERSION}
          docker tag apache/airflow:${VERSION} ghcr.io/${GHCR_REPO}:${VERSION}
          docker tag apache/airflow:${VERSION} ghcr.io/${GHCR_REPO}:latest
          
          # Push to GHCR only
          docker push ghcr.io/${GHCR_REPO}:${SOURCE_VERSION}
          docker push ghcr.io/${GHCR_REPO}:${VERSION}
          docker push ghcr.io/${GHCR_REPO}:latest

      - name: Output metadata
        run: |
          echo "source_version=${{ steps.version.outputs.source_version }}" >> $GITHUB_STEP_SUMMARY
          echo "image=ghcr.io/${{ github.repository }}:${{ steps.version.outputs.source_version }}" >> $GITHUB_STEP_SUMMARY
