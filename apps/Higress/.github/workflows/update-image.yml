name: Update Higress Image

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if no new version'
        required: false
        default: false
        type: boolean
      target_version:
        description: 'Target version to build (e.g., 1.4.0). Leave empty for latest.'
        required: false
        default: ''
        type: string
      publish_to_store:
        description: 'Publish to LazyCat App Store'
        required: false
        default: false
        type: boolean
  # 定时检查，每6小时一次
  schedule:
    - cron: '0 */6 * * *'

# ==================== 配置区域 ====================
# 以下变量需要根据项目实际情况修改
env:
  # 上游仓库信息
  UPSTREAM_REPO: alibaba/higress
  PROJECT_NAME: Higress
  PROJECT_NAME_LOWER: higress

  # 官方镜像地址
  OFFICIAL_IMAGE_REGISTRY: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/all-in-one

  # 镜像仓库区域镜像源
  # 中国（杭州）: higress-registry.cn-hangzhou.cr.aliyuncs.com
  # 北美: higress-registry.us-west-1.cr.aliyuncs.com
  # 东南亚: higress-registry.ap-southeast-7.cr.aliyuncs.com
# ==================== 配置区域结束 ====================

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest version
        id: get-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_VERSION="${{ inputs.target_version }}"

          if [ -n "$TARGET_VERSION" ]; then
            # 使用指定版本
            LATEST_VERSION="$TARGET_VERSION"
            echo "Using specified version: $LATEST_VERSION"
            RELEASE_NOTES="Build Higress version $LATEST_VERSION"
          else
            # 从 GitHub releases 获取最新版本
            RELEASE_DATA=$(gh api repos/${{ env.UPSTREAM_REPO }}/releases/latest 2>/dev/null || echo "")

            if [ -z "$RELEASE_DATA" ]; then
              echo "No release found, using latest tag"
              # 如果没有 release，尝试获取最新 tag
              LATEST_VERSION=$(gh api repos/${{ env.UPSTREAM_REPO }}/tags --jq '.[0].name' 2>/dev/null || echo "latest")
              LATEST_VERSION=${LATEST_VERSION#v}
              RELEASE_NOTES="Build Higress version $LATEST_VERSION"
            else
              LATEST_VERSION=$(echo "$RELEASE_DATA" | jq -r '.tag_name')
              LATEST_VERSION=${LATEST_VERSION#v}
              RELEASE_NOTES=$(echo "$RELEASE_DATA" | jq -r '.body')
              echo "Latest version found: $LATEST_VERSION"
            fi
          fi

          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT

          # 保存 release notes 到文件
          echo "$RELEASE_NOTES" > /tmp/release_notes.txt
          echo "release_notes_file=/tmp/release_notes.txt" >> $GITHUB_OUTPUT

      - name: Check if update needed
        id: check-update
        run: |
          CURRENT_IMAGE=$(grep 'image:' lzc-manifest.yml | head -1 | awk '{print $2}')
          echo "Current image: $CURRENT_IMAGE"

          LATEST_VERSION="${{ steps.get-version.outputs.latest_version }}"
          FORCE_BUILD="${{ inputs.force_build }}"
          TARGET_VERSION="${{ inputs.target_version }}"

          if [ -n "$TARGET_VERSION" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "Target version specified: $TARGET_VERSION"
          elif [ "$FORCE_BUILD" = "true" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "Force build requested"
          elif [ -n "$LATEST_VERSION" ] && [[ "$CURRENT_IMAGE" != *"$LATEST_VERSION"* ]]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "New version available: $LATEST_VERSION"
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
            echo "Already on latest version"
          fi

      - name: Login to GHCR
        if: steps.check-update.outputs.update_needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.check-update.outputs.update_needed == 'true'
        id: build-image
        run: |
          RAW_VERSION="${{ steps.get-version.outputs.latest_version }}"
          LATEST_VERSION="${RAW_VERSION#v}"
          GHCR_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SOURCE_TAG="v${LATEST_VERSION}"
          GHCR_IMAGE_WITH_V="ghcr.io/${GHCR_REPO}:${SOURCE_TAG}"
          GHCR_IMAGE_PLAIN="ghcr.io/${GHCR_REPO}:${LATEST_VERSION}"

          if [ "$LATEST_VERSION" = "latest" ] || [ -z "$LATEST_VERSION" ]; then
            SOURCE_IMAGE="${{ env.OFFICIAL_IMAGE_REGISTRY }}:latest"
          else
            SOURCE_IMAGE="${{ env.OFFICIAL_IMAGE_REGISTRY }}:$LATEST_VERSION"
          fi

          echo "Pulling official image: $SOURCE_IMAGE"
          if ! docker pull "$SOURCE_IMAGE"; then
            SOURCE_IMAGE="${{ env.OFFICIAL_IMAGE_REGISTRY }}:latest"
            echo "Versioned image missing, falling back to: $SOURCE_IMAGE"
            docker pull "$SOURCE_IMAGE"
          fi
          docker tag "$SOURCE_IMAGE" "$GHCR_IMAGE_WITH_V"
          docker tag "$SOURCE_IMAGE" "$GHCR_IMAGE_PLAIN"
          docker push "$GHCR_IMAGE_WITH_V"
          docker push "$GHCR_IMAGE_PLAIN"

      - name: Print pushed image
        if: steps.check-update.outputs.update_needed == 'true'
        run: |
          echo "Built and pushed image: ghcr.io/${{ github.repository }}:v${{ steps.get-version.outputs.latest_version }}"
