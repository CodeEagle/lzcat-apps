lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.signoz
version: 0.116.15
min_os_version: 1.3.8
name: SigNoz
description: (LazyCat Auto-build) Open-source observability with traces, metrics, and logs
license: MIT
homepage: https://signoz.io
author: SigNoz Inc.
application:
  subdomain: signoz
  public_path:
    - /
  health_check:
    test_url: http://signoz:8080/api/v1/health
    start_period: 300s
    timeout: 10s
  upstreams:
    - location: /
      backend: http://signoz:8080/
services:
  init-clickhouse:
    image: registry.lazycat.cloud/invokerlaw/clickhouse/clickhouse-server:ccb6549ae7e253ed
    command: >-
      bash -lc 'set -e;
      mkdir -p /var/lib/clickhouse/user_scripts;
      if [ ! -x /var/lib/clickhouse/user_scripts/histogramQuantile ]; then
      version="v0.0.1";
      node_os=$$(uname -s | tr "[:upper:]" "[:lower:]");
      node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/);
      cd /tmp;
      wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz";
      tar -xzf histogram-quantile.tar.gz;
      mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile;
      chmod +x /var/lib/clickhouse/user_scripts/histogramQuantile;
      fi'
    binds:
      - /lzcapp/var/db/signoz/clickhouse:/var/lib/clickhouse

  zookeeper:
    image: registry.lazycat.cloud/invokerlaw/signoz/zookeeper:730916d2ce75de76
    user: root
    environment:
      - ZOO_SERVER_ID=1
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
      - ZOO_ENABLE_PROMETHEUS_METRICS=yes
      - ZOO_PROMETHEUS_METRICS_PORT_NUMBER=9141
    binds:
      - /lzcapp/var/db/signoz/zookeeper:/bitnami/zookeeper
    healthcheck:
      test: ["CMD-SHELL", "curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null"]
      interval: 30s
      timeout: 5s
      retries: 10

  clickhouse:
    image: registry.lazycat.cloud/invokerlaw/clickhouse/clickhouse-server:ccb6549ae7e253ed
    depends_on:
      - init-clickhouse
      - zookeeper
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
    binds:
      - /lzcapp/var/db/signoz/clickhouse:/var/lib/clickhouse
    setup_script: |
      mkdir -p /etc/clickhouse-server/config.d /var/lib/clickhouse/user_scripts
      cp /lzcapp/pkg/content/clickhouse/users.xml /etc/clickhouse-server/users.xml
      cp /lzcapp/pkg/content/clickhouse/cluster.xml /etc/clickhouse-server/config.d/cluster.xml
      cp /lzcapp/pkg/content/clickhouse/macros.xml /etc/clickhouse-server/config.d/macros.xml
      cp /lzcapp/pkg/content/clickhouse/custom-function.xml /etc/clickhouse-server/custom-function.xml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "0.0.0.0:8123/ping"]
      interval: 30s
      timeout: 5s
      retries: 10

  signoz:
    image: registry.lazycat.cloud/invokerlaw/signoz/signoz:a16516d0ba0ee588
    depends_on:
      - clickhouse
    environment:
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
      - SIGNOZ_TOKENIZER_JWT_SECRET=secret
    binds:
      - /lzcapp/var/data/signoz/sqlite:/var/lib/signoz
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 10

  otel-collector:
    image: registry.lazycat.cloud/invokerlaw/signoz/signoz-otel-collector:85bd090294be0dbf
    depends_on:
      - clickhouse
      - signoz
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    entrypoint: /bin/sh
    command: >-
      -lc 'set -e; cp /lzcapp/pkg/content/otel-collector-config.yaml /var/tmp/otel-config.yaml; until /signoz-otel-collector migrate ready --clickhouse-dsn tcp://clickhouse:9000 --clickhouse-cluster cluster --clickhouse-replication; do sleep 3; done; /signoz-otel-collector migrate bootstrap --clickhouse-dsn tcp://clickhouse:9000 --clickhouse-cluster cluster --clickhouse-replication; /signoz-otel-collector migrate sync up --clickhouse-dsn tcp://clickhouse:9000 --clickhouse-cluster cluster --clickhouse-replication; /signoz-otel-collector migrate async up --clickhouse-dsn tcp://clickhouse:9000 --clickhouse-cluster cluster --clickhouse-replication; until /signoz-otel-collector migrate sync check --clickhouse-dsn tcp://clickhouse:9000 --clickhouse-cluster cluster --clickhouse-replication; do sleep 3; done; exec /signoz-otel-collector --config /var/tmp/otel-config.yaml'
    healthcheck:
      test:
        [
          "CMD",
          "/signoz-otel-collector",
          "migrate",
          "sync",
          "check",
          "--clickhouse-dsn",
          "tcp://clickhouse:9000",
          "--clickhouse-cluster",
          "cluster",
          "--clickhouse-replication"
        ]
      interval: 30s
      timeout: 5s
      retries: 10
locales:
  en:
    name: SigNoz
    description: (LazyCat Auto-build) Open-source observability with traces, metrics, and logs
  zh:
    name: SigNoz
    description: （懒猫微服自动构建）开源可观测性平台，统一查看链路、指标和日志
