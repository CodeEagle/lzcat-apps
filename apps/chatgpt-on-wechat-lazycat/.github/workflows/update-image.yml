name: Update ChatGPT-on-WeChat Image

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if no new version'
        required: false
        default: false
        type: boolean
      target_version:
        description: 'Target version to build (e.g., 1.0.0). Leave empty for latest.'
        required: false
        default: ''
        type: string
      publish_to_store:
        description: 'Publish to LazyCat App Store'
        required: false
        default: false
        type: boolean
  # 定时检查，每6小时一次
  schedule:
    - cron: '0 */6 * * *'

# ==================== 配置区域 ====================
env:
  # 上游仓库信息
  UPSTREAM_REPO: zhayujie/chatgpt-on-wechat
  PROJECT_NAME: ChatGPT-on-WeChat
  PROJECT_NAME_LOWER: chatgpt-on-wechat

  # 镜像配置
  # 官方镜像地址
  OFFICIAL_IMAGE_REGISTRY: docker.io/zhayujie/chatgpt-on-wechat

  # 预编译二进制配置（本项目使用官方镜像，不需要）
  PRECOMPILED_BINARY_URL: ''
  DOCKERFILE_TYPE: simple
  SERVICE_PORT: 9899
  SERVICE_CMD: '["python", "app.py"]'
# ==================== 配置区域结束 ====================

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest package version
        id: get-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_VERSION="${{ inputs.target_version }}"

          if [ -n "$TARGET_VERSION" ]; then
            # 使用指定版本
            LATEST_VERSION="$TARGET_VERSION"
            echo "Using specified version: $LATEST_VERSION"
            RELEASE_NOTES="Build version $LATEST_VERSION"
          else
            # 从上游 GitHub 获取最新 release tag
            LATEST_VERSION=$(gh api "repos/${{ env.UPSTREAM_REPO }}/releases/latest" --jq '.tag_name')
            if [ -z "$LATEST_VERSION" ]; then
              echo "Failed to get latest version from upstream"
              exit 1
            fi
            RELEASE_NOTES="Auto-build from upstream $LATEST_VERSION"
            echo "Using upstream version: $LATEST_VERSION"
          fi

          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" > /tmp/release_notes.txt
          echo "release_notes_file=/tmp/release_notes.txt" >> $GITHUB_OUTPUT

      - name: Check if update needed
        id: check-update
        run: |
          CURRENT_IMAGE=$(grep 'image:' lzc-manifest.yml | head -1 | awk '{print $2}')
          echo "Current image: $CURRENT_IMAGE"

          LATEST_VERSION="${{ steps.get-version.outputs.latest_version }}"
          FORCE_BUILD="${{ inputs.force_build }}"
          TARGET_VERSION="${{ inputs.target_version }}"

          if [ -n "$TARGET_VERSION" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "Target version specified: $TARGET_VERSION"
          elif [ "$FORCE_BUILD" = "true" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "Force build requested"
          elif [[ "$CURRENT_IMAGE" != *"chatgpt-on-wechat"* ]] || [[ "$CURRENT_IMAGE" != *"$LATEST_VERSION"* ]]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "New version available: $LATEST_VERSION"
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
            echo "Already on latest version"
          fi

      - name: Login to GHCR
        if: steps.check-update.outputs.update_needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.check-update.outputs.update_needed == 'true'
        id: build-image
        run: |
          LATEST_VERSION="${{ steps.get-version.outputs.latest_version }}"
          SOURCE_IMAGE="${{ env.OFFICIAL_IMAGE_REGISTRY }}:latest"
          GHCR_IMAGE="ghcr.io/${{ github.repository }}:${LATEST_VERSION}"
          GHCR_IMAGE=$(echo "$GHCR_IMAGE" | tr '[:upper:]' '[:lower:]')

          echo "Pulling official image: $SOURCE_IMAGE"
          docker pull "$SOURCE_IMAGE"
          docker tag "$SOURCE_IMAGE" "$GHCR_IMAGE"
          docker push "$GHCR_IMAGE"

      - name: Print pushed image
        if: steps.check-update.outputs.update_needed == 'true'
        run: |
          echo "Built and pushed image: ghcr.io/${{ github.repository }}:${{ steps.get-version.outputs.latest_version }}"
