lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.vane
version: 1.12.1
min_os_version: 1.3.8
name: Vane
description: (LazyCat Auto-build) Privacy-focused AI answering engine with built-in SearXNG search
license: MIT
homepage: https://github.com/ItzCrazyKns/Vane
author: ItzCrazyKns
application:
  subdomain: vane
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://vane:3000/
  health_check:
    test_url: http://vane:3000/
    start_period: 600s
    timeout: 20s

services:
  vane:
    image: registry.lazycat.cloud/invokerlaw/itzcrazykns1337/vane:064e8d735176fe5e
    environment:
      - DATA_DIR=/home/vane
      - SEARXNG_API_URL=http://localhost:8080
      - NODE_ENV=production
    binds:
      - /lzcapp/var/data/vane:/home/vane/data
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:3000/ >/dev/null || exit 1
      interval: 30s
      timeout: 20s
      retries: 20
      start_period: 600s

locales:
  en:
    name: Vane
    description: (LazyCat Auto-build) Privacy-focused AI answering engine with built-in SearXNG search
  zh:
    name: Vane
    description: （懒猫微服自动构建）隐私优先的 AI 搜索问答引擎，内置 SearXNG 搜索
