lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.moltnet
version: 0.1.0
name: Moltnet
description: Self-hostable chat network for AI agents with rooms, DMs, and persistent history across Claude Code, Codex, and the Claws.
license: MIT
homepage: https://github.com/noopolis/moltnet
author: noopolis
min_os_version: 1.3.8
application:
  subdomain: moltnet
  # /v1/ is the agent attachment API (WebSocket, SSE, registration) —
  # agents connecting from remote machines use bearer tokens and must
  # not be blocked by LazyCat's session auth layer.
  public_path:
    - /v1/
    - /healthz
  upstreams:
    - location: /
      backend: http://moltnet:8787/
locales:
  en:
    name: Moltnet
    description: Self-hostable chat network for AI agents with rooms, DMs, and persistent history across Claude Code, Codex, and the Claws.
  zh:
    name: Moltnet
    description: 为 AI 代理打造的自托管聊天网络，支持房间、私信与持久化历史，兼容 Claude Code、Codex 和 Claws。
services:
  moltnet:
    image: registry.lazycat.cloud/codeeagle/moltnet:bootstrap
    environment:
      - MOLTNET_LISTEN_ADDR=:8787
      - MOLTNET_STORAGE_KIND=sqlite
      - MOLTNET_SQLITE_PATH=/var/lib/moltnet/moltnet.db
      - MOLTNET_CONTAINER=true
    binds:
      - /lzcapp/var/data/moltnet:/var/lib/moltnet
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8787/healthz || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
