application:
  public_path:
    - /
    - /api/
    - /mcp
    - /sse
    - /sse/
    - /messages/
  routes:
    - /=file:///lzcapp/pkg/content/home
  subdomain: markitdown
  upstreams:
    -
      backend: http://markitdown:3000/api/
      location: /api/
    -
      backend: http://markitdown:3001/mcp
      location: /mcp
    -
      backend: http://markitdown:3001/sse
      location: /sse
    -
      backend: http://markitdown:3001/sse/
      location: /sse/
    -
      backend: http://markitdown:3001/messages/
      location: /messages/
    -
      backend: http://markitdown:3000/healthz
      location: /_lzc_probe
author: Adam Fourney, Microsoft
description: (LazyCat Auto-build) Web and MCP service for converting files and URLs to Markdown
homepage: https://github.com/microsoft/markitdown
license: MIT
locales:
  en:
    description: (LazyCat Auto-build) Web and MCP service for converting files and URLs to Markdown
    name: MarkItDown Web & MCP
  zh:
    description: （懒猫微服自动构建）同时提供 Web 与 MCP 的 Markdown 转换服务
    name: MarkItDown Web & MCP
lzc-sdk-version: '0.1'
min_os_version: 1.3.8
name: MarkItDown Web & MCP
package: fun.selfstudio.app.migration.microsoft.markitdown-mcp
services:
  markitdown:
    binds:
      - /lzcapp/var/data:/workdir
    command: all
    environment:
      - MARKITDOWN_ENABLE_PLUGINS=true
      - MARKITDOWN_MAX_UPLOAD_BYTES=26214400
    image: registry.lazycat.cloud/invokerlaw/codeeagle/markitdown:e2e1ab9581a4fb75
version: 0.1.5
