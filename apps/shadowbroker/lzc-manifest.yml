lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.shadowbroker
version: 0.9.5
min_os_version: 1.3.8
name: Shadowbroker
description: Open-source intelligence for the global theater. Track everything from the corporate/private jets of the wealthy, and spy satellites, to seismic events in one unified interface. The knowledge is available to all but rarely aggregated in the open, until now.
license: AGPL-3.0
homepage: https://github.com/BigBodyCobain/Shadowbroker
author: BigBodyCobain
application:
  subdomain: shadowbroker
  public_path:
    - /
  upstreams:
    -
      location: /
      backend: http://frontend:3000/
services:
  backend:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/shadowbroker-backend:53f389f401ed6ff6
    environment:
      - AIS_API_KEY
      - OPENSKY_CLIENT_ID
      - OPENSKY_CLIENT_SECRET
      - LTA_ACCOUNT_KEY
      - CORS_ORIGINS
    binds:
      - /lzcapp/var/data/shadowbroker/backend/data:/app/data
    healthcheck:
      test:
        - CMD
        - curl
        - "-f"
        - http://localhost:8000/api/live-data/fast
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
  frontend:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/shadowbroker-frontend:2ba81d1be2a99e46
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
    healthcheck:
      test:
        - CMD
        - wget
        - "-q"
        - "--spider"
        - http://localhost:3000/
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
locales:
  en:
    name: Shadowbroker
    description: Open-source intelligence for the global theater. Track everything from the corporate/private jets of the wealthy, and spy satellites, to seismic events in one unified interface. The knowledge is available to all but rarely aggregated in the open, until now.
  zh:
    name: Shadowbroker
    description: （迁移初稿）Shadowbroker 的懒猫微服版本
