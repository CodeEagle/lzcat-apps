application:
  public_path:
    - /
  subdomain: showpilot
  upstreams:
    -
      backend: http://showpilot:3100/
      location: /
author: ShowPilotFPP
description: Self-hosted Remote Falcon alternative for FPP — queue, control, and stream all in one place
homepage: https://github.com/ShowPilotFPP/ShowPilot
license: MIT
locales:
  en:
    description: Self-hosted Remote Falcon alternative for FPP — queue, control, and stream all in one place
    name: ShowPilot
  zh:
    description: （迁移初稿）Showpilot 的懒猫微服版本
    name: ShowPilot
lzc-sdk-version: '0.1'
min_os_version: 1.3.8
name: ShowPilot
package: fun.selfstudio.app.migration.showpilot
services:
  showpilot:
    binds:
      - /lzcapp/var/data/showpilot:/app/data
      - /lzcapp/var/data/showpilot/showpilot:/data
    healthcheck:
      interval: 30s
      retries: 5
      test:
        - CMD-SHELL
        - "node -e \"require('http').get('http://127.0.0.1:3100/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""
      timeout: 10s
    image: registry.lazycat.cloud/placeholder/showpilot:bootstrap
version: 0.33.135
