lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.goclaw
version: 0.0.1
name: goclaw
description: Multi-tenant AI agent platform (migration package)
license: 'CC-BY-NC-4.0'
homepage: https://github.com/nextlevelbuilder/goclaw
author: nextlevelbuilder
application:
  subdomain: goclaw
  public_path:
    - /
  upstreams:
    -
      location: /
      backend: http://goclaw:18790/
services:
  goclaw:
    image: registry.lazycat.cloud/codeeagle/goclaw:REPLACE_ME
    environment:
      - GOCLAW_HOST=0.0.0.0
      - GOCLAW_PORT=18790
      - GOCLAW_CONFIG=/app/data/config.json
    binds:
      - /lzcapp/var/data/goclaw:/app/data
      - /lzcapp/var/workspace/goclaw:/app/workspace
    command: ["serve"]
    healthcheck:
      path: /health
      port: 18790
data_paths:
  - host: /lzcapp/var/data/goclaw
    container: /app/data
    description: goclaw data, config, bundled-skills
  - host: /lzcapp/var/workspace/goclaw
    container: /app/workspace
    description: workspace and runtime files
locales:
  en:
    name: goclaw
    description: Multi-tenant AI agent platform
  zh:
    name: goclaw
    description: 多租戶 AI 代理平台（遷移版）
