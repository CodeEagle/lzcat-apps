lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.goclaw
version: 2.67.4
min_os_version: 1.3.8
name: goclaw
description: GoClaw - GoClaw is OpenClaw rebuilt in Go — with multi-tenant isolation, 5-layer security, and native concurrency. Deploy AI agent teams at scale without compromising on safety.
license: NOASSERTION
homepage: https://goclaw.sh
author: nextlevelbuilder
application:
  subdomain: goclaw
  public_path:
    - /
  upstreams:
    -
      location: /
      backend: http://goclaw:18790/
services:
  goclaw:
    image: registry.lazycat.cloud/placeholder/goclaw:goclaw
    depends_on:
      - postgres
    setup_script: |
      set -eu

      wait_for_port() {
        host="$1"
        port="$2"
        label="$3"
        for _ in $(seq 1 120); do
          # try hostname (v4/v6)
          if bash -lc ">/dev/tcp/${host}/${port}" >/dev/null 2>&1; then
            return 0
          fi
          # prefer IPv4 if available
          ipv4=$(getent hosts "${host}" 2>/dev/null | awk '/\./{print $1; exit}' || true)
          if [ -n "${ipv4}" ] && bash -lc ">/dev/tcp/${ipv4}/${port}" >/dev/null 2>&1; then
            return 0
          fi
          sleep 2
        done
        echo "${label} is not reachable" >&2
        exit 1
      }

      wait_for_port postgres 5432 PostgreSQL

      # 若未建立 schema_migrations，改以 psql 分批套用 migrations，避免 goclaw 於進程內一次性執行導致 OOM
      if ! psql -U postgres -d goclaw -c "SELECT 1 FROM information_schema.tables WHERE table_name='schema_migrations'" >/dev/null 2>&1; then
        echo 'schema_migrations absent; applying migrations via psql'
        for f in /app/migrations/*up.sql; do
          echo 'Applying' "$f"
          psql -U postgres -d goclaw -v ON_ERROR_STOP=1 -f "$f" || { echo "Migration failed: $f" >&2; exit 1; }
        done
      else
        echo 'schema_migrations present; skip psql bulk apply'
      fi
    restart: always
    command: ["/app/goclaw","serve"]

    environment:
      - GOCLAW_HOST=0.0.0.0
      - GOCLAW_PORT=18790
      - GOCLAW_CONFIG=/app/data/config.json
      - GOCLAW_GATEWAY_TOKEN=
      - GOCLAW_ENCRYPTION_KEY=
      - GOCLAW_POSTGRES_DSN=postgres://postgres:postgres@postgres:5432/goclaw?sslmode=disable
      - GOCLAW_SKILLS_DIR=/app/data/skills
      - GOCLAW_TRACE_VERBOSE=0
    binds:
      - /lzcapp/var/data/goclaw/goclaw/data:/app/data
      - /lzcapp/var/data/goclaw/goclaw/workspace:/app/workspace

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=goclaw
    binds:
      - /lzcapp/var/data/goclaw/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d goclaw"]
      interval: 10s
      timeout: 5s
      retries: 10
locales:
  en:
    name: goclaw
    description: GoClaw - GoClaw is OpenClaw rebuilt in Go — with multi-tenant isolation, 5-layer security, and native concurrency. Deploy AI agent teams at scale without compromising on safety.
  zh:
    name: goclaw
    description: （迁移初稿）Goclaw 的懒猫微服版本
