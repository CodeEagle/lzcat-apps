<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copilot API 用量仪表盘</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe7;
        --bg-accent: #efe6d9;
        --surface: rgba(255, 252, 247, 0.88);
        --surface-strong: #fffdf9;
        --panel: rgba(19, 52, 59, 0.06);
        --panel-strong: #f1ece3;
        --line: rgba(22, 55, 63, 0.12);
        --line-strong: rgba(22, 55, 63, 0.2);
        --text: #16252b;
        --muted: #5e6d72;
        --brand: #16606e;
        --brand-strong: #0f4b56;
        --brand-soft: rgba(22, 96, 110, 0.12);
        --success: #167a62;
        --success-soft: rgba(22, 122, 98, 0.12);
        --warning: #b2681f;
        --warning-soft: rgba(178, 104, 31, 0.14);
        --danger: #b2473f;
        --danger-soft: rgba(178, 71, 63, 0.14);
        --shadow: 0 24px 60px rgba(16, 39, 45, 0.08);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: "Noto Sans SC", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(22, 96, 110, 0.14), transparent 30%),
          radial-gradient(circle at top right, rgba(178, 104, 31, 0.12), transparent 32%),
          linear-gradient(180deg, #f8f4ed 0%, var(--bg) 100%);
        color: var(--text);
      }

      .page-shell {
        position: relative;
        min-height: 100vh;
      }

      .page-shell::before {
        content: "";
        position: fixed;
        inset: auto -10vw -22vh auto;
        width: 30rem;
        height: 30rem;
        background: radial-gradient(circle, rgba(22, 96, 110, 0.12), transparent 72%);
        pointer-events: none;
        filter: blur(10px);
      }

      .dashboard-card {
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: var(--surface);
        backdrop-filter: blur(14px);
        box-shadow: var(--shadow);
      }

      .dashboard-card-strong {
        border: 1px solid var(--line-strong);
        border-radius: var(--radius-xl);
        background: linear-gradient(180deg, rgba(255, 253, 249, 0.98), rgba(248, 243, 235, 0.94));
        box-shadow: var(--shadow);
      }

      .metric-card {
        position: relative;
        overflow: hidden;
      }

      .metric-card::after {
        content: "";
        position: absolute;
        inset: auto -32px -42px auto;
        width: 110px;
        height: 110px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.5);
        pointer-events: none;
      }

      .section-title {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .section-icon,
      .inline-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .section-icon svg,
      .inline-icon svg {
        width: 100%;
        height: 100%;
      }

      .section-icon {
        width: 2.6rem;
        height: 2.6rem;
        border-radius: 14px;
        background: var(--brand-soft);
        color: var(--brand);
      }

      .inline-icon {
        width: 1.05rem;
        height: 1.05rem;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 0.8rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        color: var(--brand);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.42rem 0.7rem;
        border-radius: 999px;
        border: 1px solid transparent;
        font-size: 0.78rem;
        font-weight: 600;
        white-space: nowrap;
      }

      .pill-neutral {
        background: rgba(22, 37, 43, 0.06);
        border-color: rgba(22, 37, 43, 0.08);
        color: var(--text);
      }

      .pill-brand {
        background: var(--brand-soft);
        border-color: rgba(22, 96, 110, 0.12);
        color: var(--brand);
      }

      .pill-success {
        background: var(--success-soft);
        border-color: rgba(22, 122, 98, 0.14);
        color: var(--success);
      }

      .pill-warning {
        background: var(--warning-soft);
        border-color: rgba(178, 104, 31, 0.18);
        color: var(--warning);
      }

      .pill-danger {
        background: var(--danger-soft);
        border-color: rgba(178, 71, 63, 0.2);
        color: var(--danger);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.65rem;
        border-radius: 999px;
        border: 1px solid transparent;
        padding: 0.9rem 1.25rem;
        font-size: 0.95rem;
        font-weight: 700;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          border-color 0.18s ease,
          background-color 0.18s ease,
          color 0.18s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn:focus-visible,
      .input-field:focus-visible,
      .tab-button:focus-visible,
      .segment-button:focus-visible,
      .lang-toggle:focus-visible,
      summary:focus-visible,
      .switch-input:focus-visible + .switch-track {
        outline: 3px solid rgba(22, 96, 110, 0.24);
        outline-offset: 3px;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--brand), var(--brand-strong));
        color: #f7fbfc;
        box-shadow: 0 12px 24px rgba(15, 75, 86, 0.18);
      }

      .btn-primary:hover {
        box-shadow: 0 16px 28px rgba(15, 75, 86, 0.24);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.7);
        border-color: var(--line);
        color: var(--text);
      }

      .btn-secondary:hover {
        border-color: var(--line-strong);
        background: rgba(255, 255, 255, 0.95);
      }

      .lang-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 84px;
        padding: 0.78rem 1rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.72);
        color: var(--text);
        font-size: 0.88rem;
        font-weight: 700;
        transition: transform 0.18s ease, border-color 0.18s ease, background-color 0.18s ease;
      }

      .lang-toggle:hover {
        transform: translateY(-1px);
        border-color: var(--line-strong);
      }

      .input-field {
        width: 100%;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.78);
        padding: 1rem 1.1rem;
        font-size: 0.97rem;
        color: var(--text);
        transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
      }

      .input-field:hover {
        border-color: var(--line-strong);
      }

      .input-field::placeholder {
        color: rgba(94, 109, 114, 0.9);
      }

      .helper-text {
        font-size: 0.82rem;
        color: var(--muted);
      }

      .status-dot {
        width: 0.7rem;
        height: 0.7rem;
        border-radius: 999px;
        display: inline-block;
      }

      .status-loading {
        background: var(--warning);
        box-shadow: 0 0 0 8px rgba(178, 104, 31, 0.12);
      }

      .status-success {
        background: var(--success);
        box-shadow: 0 0 0 8px rgba(22, 122, 98, 0.12);
      }

      .status-error {
        background: var(--danger);
        box-shadow: 0 0 0 8px rgba(178, 71, 63, 0.12);
      }

      .status-idle {
        background: rgba(94, 109, 114, 0.75);
        box-shadow: 0 0 0 8px rgba(94, 109, 114, 0.1);
      }

      .progress-track {
        width: 100%;
        height: 0.72rem;
        border-radius: 999px;
        background: rgba(22, 37, 43, 0.08);
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        border-radius: inherit;
        transition: width 0.35s ease;
      }

      .progress-fill-brand {
        background: linear-gradient(90deg, #208193, #16606e);
      }

      .progress-fill-success {
        background: linear-gradient(90deg, #2a9b78, #167a62);
      }

      .progress-fill-warning {
        background: linear-gradient(90deg, #d58b3f, #b2681f);
      }

      .progress-fill-danger {
        background: linear-gradient(90deg, #d76a63, #b2473f);
      }

      .mono {
        font-family: "JetBrains Mono", monospace;
      }

      .banner {
        border-radius: 20px;
        border: 1px solid var(--line);
        padding: 1rem 1.15rem;
      }

      .banner-info {
        background: rgba(22, 96, 110, 0.08);
        border-color: rgba(22, 96, 110, 0.16);
      }

      .banner-error {
        background: rgba(178, 71, 63, 0.1);
        border-color: rgba(178, 71, 63, 0.2);
      }

      .switch {
        display: inline-flex;
        align-items: center;
        gap: 0.85rem;
      }

      .switch-input {
        position: absolute;
        opacity: 0;
        width: 1px;
        height: 1px;
        pointer-events: none;
      }

      .switch-track {
        position: relative;
        width: 3.2rem;
        height: 1.8rem;
        border-radius: 999px;
        background: rgba(22, 37, 43, 0.14);
        transition: background-color 0.18s ease;
      }

      .switch-track::after {
        content: "";
        position: absolute;
        top: 0.2rem;
        left: 0.22rem;
        width: 1.4rem;
        height: 1.4rem;
        border-radius: 999px;
        background: #ffffff;
        box-shadow: 0 6px 14px rgba(15, 30, 35, 0.12);
        transition: transform 0.2s ease;
      }

      .switch-input:checked + .switch-track {
        background: linear-gradient(135deg, var(--brand), var(--brand-strong));
      }

      .switch-input:checked + .switch-track::after {
        transform: translateX(1.38rem);
      }

      .auto-refresh-controls {
        display: grid;
        gap: 0.9rem;
      }

      .auto-refresh-header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .auto-refresh-summary {
        min-height: 2.4rem;
      }

      .refresh-preset-group {
        display: grid;
        gap: 0.5rem;
      }

      .refresh-preset-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.65rem;
      }

      .segment-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 3rem;
        padding: 0.7rem 0.9rem;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.72);
        color: var(--muted);
        font-size: 0.84rem;
        font-weight: 700;
        line-height: 1.2;
        text-align: center;
        transition:
          transform 0.18s ease,
          border-color 0.18s ease,
          background-color 0.18s ease,
          color 0.18s ease,
          box-shadow 0.18s ease;
      }

      .segment-button:hover {
        transform: translateY(-1px);
        border-color: var(--line-strong);
        background: rgba(255, 255, 255, 0.94);
        color: var(--text);
      }

      .segment-button.is-active {
        border-color: rgba(22, 96, 110, 0.3);
        background: linear-gradient(135deg, rgba(22, 96, 110, 0.18), rgba(22, 96, 110, 0.06)), rgba(255, 255, 255, 0.98);
        color: var(--brand-strong);
        box-shadow: 0 12px 22px rgba(15, 30, 35, 0.08);
      }

      .refresh-custom-field {
        display: grid;
        gap: 0.55rem;
        padding: 0.9rem 1rem;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.52);
      }

      .refresh-custom-field .input-field {
        max-width: none;
        min-height: 3rem;
        padding: 0.85rem 1rem;
      }

      .tab-button {
        border-radius: 999px;
        border: 1px solid transparent;
        padding: 0.65rem 0.95rem;
        font-size: 0.88rem;
        font-weight: 700;
        color: var(--muted);
        transition: border-color 0.18s ease, background-color 0.18s ease, color 0.18s ease;
      }

      .tab-button.is-active {
        background: rgba(255, 255, 255, 0.92);
        border-color: var(--line);
        color: var(--text);
      }

      .tab-panel {
        display: none;
      }

      .tab-panel.is-active {
        display: block;
      }

      .code-panel {
        border-radius: 20px;
        border: 1px solid var(--line);
        background: #182428;
        color: #eef4f5;
        max-height: 24rem;
        overflow: auto;
      }

      .code-panel pre {
        margin: 0;
        padding: 1.1rem 1.15rem;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.82rem;
        line-height: 1.65;
      }

      .details-panel[open] summary {
        margin-bottom: 1rem;
      }

      summary {
        list-style: none;
        cursor: pointer;
      }

      summary::-webkit-details-marker {
        display: none;
      }

      .details-chevron {
        transition: transform 0.18s ease;
      }

      .details-panel[open] .details-chevron {
        transform: rotate(180deg);
      }

      .empty-illustration {
        width: 4rem;
        height: 4rem;
        border-radius: 20px;
        background: rgba(22, 96, 110, 0.08);
        color: var(--brand);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .loading-bar {
        position: relative;
        overflow: hidden;
      }

      .loading-bar::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.68), transparent);
        transform: translateX(-100%);
        animation: shimmer 1.3s infinite;
      }

      @keyframes shimmer {
        100% {
          transform: translateX(100%);
        }
      }

      @media (min-width: 640px) {
        .refresh-preset-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      @media (max-width: 768px) {
        .dashboard-card-strong,
        .dashboard-card {
          border-radius: 22px;
        }
      }

      /* ── Main Tab Navigation ── */
      .main-tab-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        padding: 0.35rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid var(--line);
        backdrop-filter: blur(10px);
      }

      .main-tab-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.7rem 1.2rem;
        border-radius: 999px;
        border: 1px solid transparent;
        background: transparent;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        transition: background-color 0.18s ease, color 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        white-space: nowrap;
      }

      .main-tab-btn:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.7);
      }

      .main-tab-btn.is-active {
        background: rgba(255, 255, 255, 0.95);
        border-color: var(--line);
        color: var(--brand);
        box-shadow: 0 4px 12px rgba(15, 30, 35, 0.06);
      }

      .main-tab-section {
        display: none;
      }

      .main-tab-section.is-active {
        display: block;
      }

      /* ── Modal / Dialog ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(22, 37, 43, 0.45);
        backdrop-filter: blur(6px);
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s ease, visibility 0.2s ease;
      }

      .modal-overlay.is-open {
        opacity: 1;
        visibility: visible;
      }

      .modal-dialog {
        width: 92%;
        max-width: 480px;
        border-radius: var(--radius-xl);
        background: var(--surface-strong);
        border: 1px solid var(--line);
        box-shadow: 0 32px 80px rgba(16, 39, 45, 0.18);
        padding: 2rem;
        transform: translateY(12px) scale(0.97);
        transition: transform 0.2s ease;
      }

      .modal-overlay.is-open .modal-dialog {
        transform: translateY(0) scale(1);
      }

      .modal-title {
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--text);
        letter-spacing: -0.02em;
      }

      .modal-close {
        position: absolute;
        top: 1.2rem;
        right: 1.2rem;
        width: 2rem;
        height: 2rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: border-color 0.18s ease, background-color 0.18s ease;
      }

      .modal-close:hover {
        border-color: var(--line-strong);
        background: rgba(255, 255, 255, 0.95);
        color: var(--text);
      }

      /* ── Toast ── */
      .toast-container {
        position: fixed;
        top: 1.2rem;
        right: 1.2rem;
        z-index: 1100;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        pointer-events: none;
      }

      .toast {
        pointer-events: auto;
        display: flex;
        align-items: center;
        gap: 0.65rem;
        padding: 0.85rem 1.1rem;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
        box-shadow: 0 12px 32px rgba(16, 39, 45, 0.14);
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--text);
        animation: toast-in 0.25s ease;
        max-width: 360px;
      }

      .toast-success { border-color: rgba(22, 122, 98, 0.25); }
      .toast-error { border-color: rgba(178, 71, 63, 0.25); }

      @keyframes toast-in {
        from { opacity: 0; transform: translateX(20px); }
        to { opacity: 1; transform: translateX(0); }
      }

      /* ── Account Card ── */
      .account-card {
        display: grid;
        gap: 1rem;
        padding: 1.2rem;
        border-radius: var(--radius-lg);
        border: 1px solid var(--line);
        background: var(--surface);
        backdrop-filter: blur(14px);
        transition: border-color 0.18s ease, box-shadow 0.18s ease;
      }

      .account-card:hover {
        border-color: var(--line-strong);
        box-shadow: 0 8px 24px rgba(16, 39, 45, 0.06);
      }

      .account-avatar {
        width: 2.8rem;
        height: 2.8rem;
        border-radius: 999px;
        border: 2px solid var(--line);
        object-fit: cover;
        background: var(--panel);
      }

      .account-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
      }

      .btn-sm {
        padding: 0.45rem 0.85rem;
        font-size: 0.82rem;
        border-radius: 999px;
        font-weight: 600;
      }

      .btn-danger {
        background: var(--danger-soft);
        border-color: rgba(178, 71, 63, 0.2);
        color: var(--danger);
      }

      .btn-danger:hover {
        background: rgba(178, 71, 63, 0.2);
      }

      .btn-ghost {
        background: transparent;
        border-color: var(--line);
        color: var(--muted);
      }

      .btn-ghost:hover {
        background: rgba(255, 255, 255, 0.7);
        border-color: var(--line-strong);
        color: var(--text);
      }

      /* ── Admin Table ── */
      .admin-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 0.88rem;
      }

      .admin-table th {
        text-align: left;
        padding: 0.75rem 1rem;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        background: var(--panel);
        border-bottom: 1px solid var(--line);
      }

      .admin-table th:first-child { border-radius: 14px 0 0 0; }
      .admin-table th:last-child { border-radius: 0 14px 0 0; }

      .admin-table td {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--line);
        color: var(--text);
        vertical-align: middle;
      }

      .admin-table tr:last-child td {
        border-bottom: none;
      }

      .admin-table tbody tr:hover td {
        background: rgba(22, 96, 110, 0.03);
      }

      .admin-table .input-field {
        padding: 0.55rem 0.8rem;
        border-radius: 12px;
        font-size: 0.85rem;
        min-width: 120px;
      }

      /* ── Stats Chart (pure CSS) ── */
      .stat-bar-group {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
      }

      .stat-bar-row {
        display: grid;
        grid-template-columns: 100px 1fr auto;
        gap: 0.75rem;
        align-items: center;
      }

      .stat-bar-label {
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text);
        text-align: right;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .stat-bar-track {
        height: 1.5rem;
        border-radius: 999px;
        background: var(--panel);
        overflow: hidden;
        position: relative;
      }

      .stat-bar-fill {
        height: 100%;
        border-radius: inherit;
        transition: width 0.4s ease;
        min-width: 2px;
      }

      .stat-bar-value {

      /* ── Form Select ── */
      .input-select {
        width: 100%;

        padding: 1rem 1.1rem;

        justify-content: flex-end;
        margin-top: 1.5rem;
      }

            <!-- Step 1: Initial form -->

                    <span id="modal-copy-code-text"></span>
                  </button>

                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                  <span id="modal-gh-link-text"></span>
                </a>
                <button type="button" id="modal-copy-link-btn" class="btn btn-secondary w-full" style="display:inline-flex;align-items:center;justify-content:center;gap:0.5rem;">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>

              </button>

                <h3 class="modal-title" id="modal-success-title" style="margin-bottom:0.5rem;"></h3>

        const STORAGE_KEYS = {
          language: "dashboard-language",
          autoRefresh: "dashboard-auto-refresh",
          refreshPreset: "dashboard-refresh-preset",
          customRefreshSeconds: "dashboard-refresh-custom-seconds",
        };

        const REFRESH_PRESETS = ["30", "60", "120", "custom"];

        function readStoredValue(key, fallback = "") {
          try {
            const value = localStorage.getItem(key);
            return value === null ? fallback : value;
          } catch {
            return fallback;
          }
        }

        function readStoredNumber(key, fallback) {
          const value = Number(readStoredValue(key, String(fallback)));
          return Number.isFinite(value) ? value : fallback;
        }

        function getValidLanguage(value) {
          return value === "en" ? "en" : "zh";
        }

        function getValidRefreshPreset(value) {
          return REFRESH_PRESETS.includes(value) ? value : DEFAULT_REFRESH_PRESET;
        }

        function readQueryParams() {
          try {
            return new URLSearchParams(window.location.search);
          } catch {
            return null;
          }
        }

        function readQueryValue(params, key) {
          if (!params) return null;
          const value = params.get(key);
          return value === null ? null : value.trim();
        }

        function readQueryBoolean(params, key) {
          const value = readQueryValue(params, key);
          if (value === null) return null;
          const normalized = value.toLowerCase();
          if (["1", "true", "yes", "on"].includes(normalized)) return true;
          if (["0", "false", "no", "off"].includes(normalized)) return false;
          return null;
        }

        const queryParams = readQueryParams();
        const queryLanguage = (() => {
          const value = readQueryValue(queryParams, "lang");
          return value === "zh" || value === "en" ? value : null;
        })();
        const queryEndpoint = (() => {
          const value = readQueryValue(queryParams, "endpoint");
          return value ? getNormalizedEndpoint(value) : "";
        })();
        const queryRefreshPreset = (() => {
          const value = readQueryValue(queryParams, "refreshPreset");
          return value !== null && REFRESH_PRESETS.includes(value) ? value : null;
        })();
        const queryCustomRefreshSeconds = (() => {
          const value = readQueryValue(queryParams, "customRefreshSeconds");
          if (value === null || value === "") return null;
          const parsed = Number(value);
          return Number.isFinite(parsed) ? clampCustomRefreshSeconds(parsed) : null;
        })();
        const queryAutoRefresh = readQueryBoolean(queryParams, "autoRefresh");

        // Extract apiKey from URL, persist to localStorage, then strip from URL
        (() => {
          const qKey = readQueryValue(queryParams, "apiKey");
          if (qKey) {
            try { localStorage.setItem("dashboard-api-key", qKey); } catch {}
            try {
              const url = new URL(window.location.href);
              url.searchParams.delete("apiKey");
              window.history.replaceState({}, "", url.toString());
            } catch {}
          }
        })();

        const state = {
          language: getValidLanguage(queryLanguage || readStoredValue(STORAGE_KEYS.language, "zh")),
          endpoint: queryEndpoint || DEFAULT_ENDPOINT,
          status: "idle",
          data: null,
          error: null,
          lastUpdated: null,
          autoRefresh: queryAutoRefresh === null ? false : queryAutoRefresh,
          refreshIntervalPreset:
            queryRefreshPreset ||

        function text(key, replacements = {}) {
          const dictionary = I18N[state.language] || I18N.zh;
          const template = dictionary[key] || I18N.en[key] || key;
          return Object.entries(replacements).reduce(
            (value, [token, replacement]) => value.replaceAll(`{${token}}`, replacement),
            template,
          );
        }

        function icon(name, className = "h-4 w-4") {
          return `<span class="inline-icon ${className}" aria-hidden="true">${ICONS[name] || ""}</span>`;
        }

        function escapeHtml(value) {
          return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        }

        function formatDateTime(value) {
          if (!value) return text("neverUpdated");
          const date = new Date(value);
          if (Number.isNaN(date.getTime())) return String(value);
          return new Intl.DateTimeFormat(state.language === "zh" ? "zh-CN" : "en-US", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          }).format(date);
        }

        function formatNumber(value) {
          if (value === null || value === undefined || Number.isNaN(Number(value))) {
            return text("noValue");
          }
          return new Intl.NumberFormat(state.language === "zh" ? "zh-CN" : "en-US").format(
            Number(value),
          );
        }

        function formatPercent(value) {
          if (value === null || value === undefined || Number.isNaN(Number(value))) {
            return text("noValue");
          }
          return `${Math.round(Number(value))}%`;
        }

        function getMode(data) {
          if (!data || typeof data !== "object") return "copilot";
          if (data.quota_snapshots) return "copilot";
          return "copilot";
        }

        function getModeLabel(mode) {
          return (modeLabels[mode] || modeLabels.unknown)();
        }

        function getConnectionState() {
          if (state.status === "loading") {
            return {
              label: text("statusConnecting"),
              dotClass: "status-loading",
              pillClass: "pill-warning",
            };
          }
          if (state.status === "success") {
            return {
              label: text("statusConnected"),
              dotClass: "status-success",
              pillClass: "pill-success",
            };
          }
          if (state.status === "error") {
            return {
              label: text("statusFailed"),
              dotClass: "status-error",
              pillClass: "pill-danger",
            };
          }
          return {
            label: text("statusIdle"),
            dotClass: "status-idle",
            pillClass: "pill-neutral",
          };
        }

        function getProgressTone(percentUsed, unlimited = false) {
          if (unlimited) return "progress-fill-brand";
          if (percentUsed >= 90) return "progress-fill-danger";
          if (percentUsed >= 75) return "progress-fill-warning";
          if (percentUsed >= 45) return "progress-fill-brand";
          return "progress-fill-success";
        }

        function getHealthLabel(percentRemaining) {
          const number = Number(percentRemaining);
          if (number <= 15) return { text: text("modelCritical"), className: "pill-danger" };
          if (number <= 40) return { text: text("modelWarning"), className: "pill-warning" };
          return { text: text("modelHealthy"), className: "pill-success" };
        }

        function getNormalizedEndpoint(value) {
          const trimmed = value.trim();
          if (!trimmed) return "";
          try {
            return new URL(trimmed).toString();
          } catch {
            return "";
          }
        }

        function updateUrl(endpoint) {
          try {
            const url = new URL(window.location.href);
            url.searchParams.set("endpoint", endpoint);
            window.history.replaceState({}, "", url);
          } catch (error) {
            console.warn("Failed to update URL", error);
          }
        }

        function getExportBaseUrl(endpoint) {
          const normalized = getNormalizedEndpoint(endpoint);
          if (!normalized) return "";

          try {
            const url = new URL(normalized);
            const pathname = url.pathname.replace(/\/usage\/?$/, "");
            return `${url.origin}${pathname === "/" ? "" : pathname}`;
          } catch {
            return normalized.replace(/[?#].*$/, "").replace(/\/usage\/?$/, "");
          }
        }

        function getApiBaseUrl() {
          try {
            const endpoint = new URL(state.endpoint);
            const pathname = endpoint.pathname.replace(/\/usage\/?$/, "");
            return `${endpoint.origin}${pathname === "/" ? "" : pathname}`;
          } catch {
            return state.endpoint.replace(/\/usage\/?$/, "");
          }
        }

        function getApiHeaders() {
          const headers = { "Content-Type": "application/json" };
          try {
            const apiKey = localStorage.getItem("dashboard-api-key");
            if (apiKey) headers["Authorization"] = `Bearer ${apiKey}`;
          } catch {}
          const params = readQueryParams();
          const qKey = readQueryValue(params, "apiKey");
          if (qKey) headers["Authorization"] = `Bearer ${qKey}`;
          return headers;
        }

        function buildExportConfigJson(mainModel, smallModel, authToken) {
          const baseUrl = getExportBaseUrl(state.endpoint) || state.endpoint;
          if (!authToken) {
            authToken = "dummy";
            try {
              const savedKey = localStorage.getItem("dashboard-api-key");
              if (savedKey) authToken = savedKey;
            } catch {}
            const params = readQueryParams();
            const qKey = readQueryValue(params, "apiKey");
            if (qKey) authToken = qKey;
          }

          return JSON.stringify(
            {
              env: {
                ANTHROPIC_BASE_URL: baseUrl,
                ANTHROPIC_AUTH_TOKEN: authToken,
                ANTHROPIC_MODEL: mainModel,
                ANTHROPIC_DEFAULT_SONNET_MODEL: mainModel,
                ANTHROPIC_DEFAULT_OPUS_MODEL: mainModel,
                ANTHROPIC_REASONING_MODEL: mainModel,
                ANTHROPIC_SMALL_FAST_MODEL: smallModel,
                ANTHROPIC_DEFAULT_HAIKU_MODEL: smallModel,
                DISABLE_NON_ESSENTIAL_MODEL_CALLS: "1",
                CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1",
              },
            },
            null,
            2,
          );
        }

        function copyTextWithExecCommand(value) {
          const textArea = document.createElement("textarea");
          textArea.value = value;
          textArea.setAttribute("readonly", "readonly");
          textArea.style.position = "fixed";
          textArea.style.opacity = "0";
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          textArea.setSelectionRange(0, textArea.value.length);

          try {
            return document.execCommand("copy");
          } catch {
            return false;
          } finally {
            textArea.remove();
          }
        }

        async function copyTextToClipboard(value) {
          if (navigator.clipboard?.writeText) {
            try {
              await navigator.clipboard.writeText(value);
              return true;
            } catch (error) {
              console.warn("Failed to copy with navigator.clipboard", error);
            }
          }
          return copyTextWithExecCommand(value);
        }

        function setExportFeedback(labelKey) {
          refs.exportButtonText.textContent = text(labelKey);
          if (exportFeedbackTimer) {
            window.clearTimeout(exportFeedbackTimer);
          }
          exportFeedbackTimer = window.setTimeout(() => {
            refs.exportButtonText.textContent = text("exportConfig");
            exportFeedbackTimer = null;
          }, 1800);
        }

        function clampCustomRefreshSeconds(value) {
          const parsed = Number(value);
          if (!Number.isFinite(parsed)) return 60;
          return Math.max(MIN_CUSTOM_REFRESH_SECONDS, Math.round(parsed));
        }

        function getRefreshIntervalSeconds() {
          if (state.refreshIntervalPreset === "custom") {
            return clampCustomRefreshSeconds(state.customRefreshSeconds);
          }
          const presetValue = Number(state.refreshIntervalPreset);
          return Number.isFinite(presetValue) ? presetValue : Number(DEFAULT_REFRESH_PRESET);
        }

        function getRefreshIntervalLabel(seconds = getRefreshIntervalSeconds()) {
          return state.language === "zh" ? `${seconds} 秒` : `${seconds}s`;
        }

        function persistPreferences() {
          try {
            localStorage.setItem(STORAGE_KEYS.language, state.language);
            localStorage.setItem(STORAGE_KEYS.autoRefresh, String(Boolean(state.autoRefresh)));
            localStorage.setItem(STORAGE_KEYS.refreshPreset, state.refreshIntervalPreset);
            localStorage.setItem(
              STORAGE_KEYS.customRefreshSeconds,
              String(clampCustomRefreshSeconds(state.customRefreshSeconds)),
            );
          } catch (error) {
            console.warn("Failed to persist dashboard preferences", error);
          }
        }

        function syncAutoRefresh() {
          if (autoRefreshTimer) {
            window.clearInterval(autoRefreshTimer);
            autoRefreshTimer = null;
          }
          if (!state.autoRefresh) return;

            fetchData({ preserveContent: true, endpointOverride: state.endpoint });

        async function readJsonResponse(response) {
          const contentType = response.headers.get("content-type") || "";
          const body = await response.text();
          if (!contentType.toLowerCase().includes("application/json")) {
            const bodyType = body.trimStart().startsWith("<!DOCTYPE") || body.trimStart().startsWith("<html")
              ? "HTML"
              : contentType || "non-JSON response";
            throw new Error(text("nonJsonResponse", { type: bodyType }));
          }
          try {
            return JSON.parse(body);
          } catch (error) {
            throw new Error(error instanceof Error && error.message ? error.message : text("networkErrorFallback"));
          }
        }

          refs.contentArea.querySelectorAll("[data-action='default']").forEach((button) => {

        function renderAll() {
          renderStaticTexts();
          renderTabBar();
          // Skip overview rebuild if user has focus inside it (prevents input destruction)
          const overviewHasFocus = refs.overviewGrid && refs.overviewGrid.contains(document.activeElement);
          if (!overviewHasFocus) renderOverview();
          renderStatusBanner();
          renderContent();
          refs.modeChip.textContent = state.data ? getModeLabel(getMode(state.data)) : text("modeChipLabel");
        }

        async function fetchData({ preserveContent = true, endpointOverride } = {}) {
          const endpointSource =
            typeof endpointOverride === "string" ? endpointOverride : refs.endpointInput.value;
          const endpoint = getNormalizedEndpoint(endpointSource);
          if (!endpoint) {
            cancelActiveRequest();
            state.status = "error";
            state.error = text("invalidEndpoint");
            if (!preserveContent) {
              state.data = null;
              state.lastUpdated = null;
            }
            renderAll();
            return;
          }

          const requestId = latestRequestId + 1;
          if (activeRequestController) {
            activeRequestController.abort();
          }
          latestRequestId = requestId;
          const controller = new AbortController();
          activeRequestController = controller;

          setEndpoint(endpoint);
          updateUrl(endpoint);
          state.status = "loading";
          state.error = null;
          renderAll();

          try {
            const response = await fetch(endpoint, { signal: controller.signal });
            if (!response.ok) {
              throw new Error(`HTTP ${response.status} ${response.statusText}`);
            }
            const data = await readJsonResponse(response);
            if (requestId !== latestRequestId) {
              return;
            }
            state.data = data;
            state.status = "success";
            state.error = null;
            state.lastUpdated = new Date().toISOString();
          } catch (error) {
            if (controller.signal.aborted || requestId !== latestRequestId) {
              return;
            }
            console.error("Failed to fetch usage data", error);
            state.status = "error";
            state.error = error instanceof Error && error.message ? error.message : text("networkErrorFallback");
            if (!preserveContent) {
              state.data = null;
            }
          } finally {
            if (requestId === latestRequestId && activeRequestController === controller) {
              activeRequestController = null;
            }
          }

          if (requestId === latestRequestId) {
            renderAll();
          }
        }

        function handleSubmit(event) {
          event.preventDefault();
          fetchData({ preserveContent: Boolean(state.data) });
        }

        function handleReset() {
          state.activeDetailsTab = "summary";
          setEndpoint(DEFAULT_ENDPOINT);
          updateUrl(DEFAULT_ENDPOINT);
          fetchData({ preserveContent: Boolean(state.data) });
        }

        async function handleExportConfig() {
          // Fetch current config from server (selected models + API key)
          let mainModel = "claude-sonnet-4";
          let smallModel = "gpt-4.1";
          let authToken = "dummy";
          try {
            const apiBase = getApiBaseUrl();
            const res = await fetch(apiBase + "/api/config", { headers: getApiHeaders() });
            if (res.ok) {
              const cfg = await res.json();
              if (cfg.selectedModel) mainModel = cfg.selectedModel;
              if (cfg.selectedSmallModel) smallModel = cfg.selectedSmallModel;
              if (cfg.apiKey) authToken = cfg.apiKey;
            }
          } catch {}

          const configJson = buildExportConfigJson(mainModel, smallModel, authToken);
          const copied = await copyTextToClipboard(configJson);

          if (copied) {
            setExportFeedback("exportCopied");
            return;
          }

          setExportFeedback("exportPrompted");
          window.prompt(text("exportManualCopy"), configJson);
        }

        // ═══════════════════════════════════════
        //  Toast Notification System
        // ═══════════════════════════════════════
        function showToast(message, type = "success") {
          const container = document.getElementById("toast-container");
          if (!container) return;
          const toast = document.createElement("div");
          toast.className = `toast toast-${type}`;
          const iconName = type === "error" ? "warning" : "check";
          toast.innerHTML = `${icon(iconName)}${escapeHtml(message)}`;
          container.appendChild(toast);
          setTimeout(() => {
            toast.style.opacity = "0";
            toast.style.transition = "opacity 0.2s ease";
            setTimeout(() => toast.remove(), 200);
          }, 3000);
        }

        // ═══════════════════════════════════════
        function renderTabBar() {
          const tabs = document.querySelectorAll(".main-tab-btn");
          const sections = document.querySelectorAll(".main-tab-section");
          tabs.forEach((t) => {
            const key = t.getAttribute("data-main-tab");
            t.classList.toggle("is-active", key === state.activeMainTab);

        function switchMainTab(tabKey) {

          renderTabBar();
          // Load data for tab on switch
          if (tabKey === "accounts") loadAccounts();
          if (tabKey === "models") { loadAvailableModels(); loadModelMapping(); loadModelConcurrency(); }
          if (tabKey === "statistics") { loadStats(); startStatsAutoRefresh(); }
          if (tabKey !== "statistics") stopStatsAutoRefresh();

        // ═══════════════════════════════════════
        //  Admin API Helpers
        // ═══════════════════════════════════════
        async function adminFetch(path, options = {}) {
          const base = getApiBaseUrl();
          const url = `${base}${path}`;
          const headers = getApiHeaders();
          try {
            const response = await fetch(url, { ...options, headers: { ...headers, ...options.headers } });
            if (!response.ok) {
              const errText = await response.text().catch(() => "");
              throw new Error(`HTTP ${response.status}: ${errText || response.statusText}`);
            }
            const ct = response.headers.get("content-type") || "";
            if (ct.includes("application/json")) return await response.json();
            return null;
          } catch (err) {
            console.error(`Admin API error [${path}]:`, err);
            throw err;
          }
        }

        // ═══════════════════════════════════════
        //  Modal Management (Device Code Flow)
        // ═══════════════════════════════════════
        let deviceCodePollTimer = null;

        function showModalStep(stepId) {
          ["modal-step-1", "modal-step-2", "modal-step-3", "modal-step-error"].forEach((id) => {
            const el = document.getElementById(id);
            if (el) el.style.display = id === stepId ? "" : "none";
          });
        }

        function openModal() {
          showModalStep("modal-step-1");
          const overlay = document.getElementById("add-account-modal");
          if (overlay) overlay.classList.add("is-open");
        }

        function closeModal() {
          // Stop any active polling
          if (deviceCodePollTimer) {
            clearInterval(deviceCodePollTimer);
            deviceCodePollTimer = null;
          }
          const overlay = document.getElementById("add-account-modal");
          if (overlay) overlay.classList.remove("is-open");
          // Clear inputs
          const labelInput = document.getElementById("modal-label");
          const typeInput = document.getElementById("modal-type");
          if (labelInput) labelInput.value = "";
          if (typeInput) typeInput.value = "individual";
          // Reset to step 1
          showModalStep("modal-step-1");
        }

        async function startDeviceCodeAuth() {
          const startBtn = document.getElementById("modal-start-auth-btn");
          if (startBtn) startBtn.disabled = true;

          try {
            const response = await adminFetch("/api/accounts/auth/start", { method: "POST" });
            if (!response) {
              showToast(text("modalDeviceCodeError"), "error");
              if (startBtn) startBtn.disabled = false;
              return;
            }

            // Show step 2
            showModalStep("modal-step-2");
            if (startBtn) startBtn.disabled = false;

            // Populate user code
            const userCodeEl = document.getElementById("modal-user-code");
            if (userCodeEl) userCodeEl.textContent = response.user_code;

            // Set verification link
            const ghLink = document.getElementById("modal-gh-link");
            if (ghLink) ghLink.href = response.verification_uri;

            // Reset copy button text
            const copyText = document.getElementById("modal-copy-code-text");
            if (copyText) copyText.textContent = text("modalDeviceCodeCopy");

            // Start polling
            const pollInterval = (response.interval || 5) * 1000;
            deviceCodePollTimer = setInterval(async () => {
              try {
                const pollResponse = await adminFetch("/api/accounts/auth/poll", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    device_code: response.device_code,
                    label: document.getElementById("modal-label")?.value?.trim() || "",
                    account_type: document.getElementById("modal-type")?.value || "individual",
                  }),
                });

                if (!pollResponse) return;

                if (pollResponse.status === "complete") {
                  clearInterval(deviceCodePollTimer);
                  deviceCodePollTimer = null;
                  showAuthSuccess(pollResponse.account);
                } else if (pollResponse.status === "expired") {
                  clearInterval(deviceCodePollTimer);
                  deviceCodePollTimer = null;
                  showAuthError(text("modalDeviceCodeExpired"));
                } else if (pollResponse.status === "denied") {
                  clearInterval(deviceCodePollTimer);
                  deviceCodePollTimer = null;
                  showAuthError(text("modalDeviceCodeDenied"));
                } else if (pollResponse.status === "error") {
                  clearInterval(deviceCodePollTimer);
                  deviceCodePollTimer = null;
                  showAuthError(pollResponse.message || text("modalDeviceCodeError"));
                }
                // "pending" → keep polling
              } catch (err) {
                // Network error during poll — keep trying
                console.error("Poll error:", err);
              }
            }, pollInterval);
          } catch (err) {
            showToast(text("modalDeviceCodeError") + ": " + err.message, "error");
            if (startBtn) startBtn.disabled = false;
          }
        }

        function showAuthSuccess(account) {
          showModalStep("modal-step-3");
          const accountInfo = document.getElementById("modal-success-account");
          if (accountInfo && account) {
            const displayName = account.githubLogin || account.label || account.id;
            accountInfo.textContent = displayName;
          }
        }

        function showAuthError(message) {
          showModalStep("modal-step-error");
          const errorMsg = document.getElementById("modal-error-message");
          if (errorMsg) errorMsg.textContent = message;
        }

        async function handleCopyCode() {
          const userCodeEl = document.getElementById("modal-user-code");
          if (!userCodeEl) return;
          const code = userCodeEl.textContent;
          const copied = await copyTextToClipboard(code);
          if (copied) {
            const copyText = document.getElementById("modal-copy-code-text");
            if (copyText) {
              copyText.textContent = text("modalDeviceCodeCopied");
              setTimeout(() => { copyText.textContent = text("modalDeviceCodeCopy"); }, 2000);

            showToast(text("exportManualCopy"), "error");

        async function handleCopyLink() {
          const ghLink = document.getElementById("modal-gh-link");

          const copied = await copyTextToClipboard(ghLink.href);
          const linkText = document.getElementById("modal-copy-link-text");

          showModalStep("modal-step-1");

        // ═══════════════════════════════════════
        //  Confirm Dialog
        // ═══════════════════════════════════════
        function showConfirm(title, message) {
          return new Promise((resolve) => {
            const overlay = document.createElement("div");
            overlay.className = "modal-overlay is-open";
            overlay.innerHTML = `
              <div class="modal-dialog" style="position:relative;max-width:400px;">
                <h3 class="modal-title">${escapeHtml(title)}</h3>
                <p class="mt-3 text-sm leading-6 text-[var(--muted)]">${escapeHtml(message)}</p>
                <div class="confirm-actions">
                  <button type="button" class="btn btn-secondary btn-sm" data-confirm="cancel">${escapeHtml(text("confirmCancel"))}</button>
                  <button type="button" class="btn btn-primary btn-sm" style="background:linear-gradient(135deg,var(--danger),#8b2e28);box-shadow:0 8px 18px rgba(178,71,63,0.18);" data-confirm="yes">${escapeHtml(text("confirmYes"))}</button>
                </div>
              </div>
            `;
            document.body.appendChild(overlay);
            overlay.querySelector('[data-confirm="cancel"]').addEventListener("click", () => {
              overlay.remove();
              resolve(false);
            });
            overlay.querySelector('[data-confirm="yes"]').addEventListener("click", () => {
              overlay.remove();
              resolve(true);
            });
            overlay.addEventListener("click", (e) => {
              if (e.target === overlay) { overlay.remove(); resolve(false); }
            });
          });
        }

        // ═══════════════════════════════════════
        //  Account Management
        // ═══════════════════════════════════════
        let accountsData = [];

        function getStatusPill(status) {
          const map = {
            active: { label: "accountStatusActive", cls: "pill-success" },
            exhausted: { label: "accountStatusExhausted", cls: "pill-warning" },
            rate_limited: { label: "accountStatusRateLimited", cls: "pill-warning" },
            banned: { label: "accountStatusBanned", cls: "pill-danger" },
            error: { label: "accountStatusError", cls: "pill-danger" },
            disabled: { label: "accountStatusDisabled", cls: "pill-neutral" },
          };
          const entry = map[status] || { label: "accountStatusUnknown", cls: "pill-neutral" };
          return `<span class="pill ${entry.cls}">${escapeHtml(text(entry.label))}</span>`;
        }

        async function loadAccounts() {
          const statsEl = document.getElementById("accounts-stats");
          const listEl = document.getElementById("accounts-list");
          if (!statsEl || !listEl) return;
          // Show loading
          listEl.innerHTML = `<div class="dashboard-card p-6 text-center col-span-full"><span class="loading-spinner"></span> <span class="text-sm text-[var(--muted)] ml-2">${escapeHtml(text("loading"))}</span></div>`;
          try {
            const data = await adminFetch("/api/accounts");
            accountsData = Array.isArray(data) ? data : (data && data.accounts ? data.accounts : []);
          } catch (err) {
            accountsData = [];
            listEl.innerHTML = renderAccountsEmpty();
            statsEl.innerHTML = renderAccountsStats(0, 0, 0);
            showToast(text("apiError") + ": " + err.message, "error");
            return;
          }
          const totalAccounts = accountsData.length;
          const activeAccounts = accountsData.filter((a) => a.status === "active").length;
          const premiumRemaining = accountsData.reduce((sum, a) => {
            return sum + Number(a.usage?.premium_remaining || 0);
          }, 0);
          statsEl.innerHTML = renderAccountsStats(totalAccounts, activeAccounts, premiumRemaining);
          if (accountsData.length === 0) {
            listEl.innerHTML = renderAccountsEmpty();
            return;
          }
          listEl.innerHTML = accountsData.map((acct) => renderAccountCard(acct)).join("");
          bindAccountActions();
          updateAccountSwitcher(accountsData);
        }

        function updateAccountSwitcher(accounts) {
          const row = document.getElementById("account-switcher-row");
          const select = document.getElementById("account-switcher-select");
          if (!row || !select) return;
          if (accounts.length === 0) {
            row.style.display = "none";
            return;
          }
          row.style.removeProperty("display");
          const currentVal = select.value;
          select.innerHTML = `<option value="">${escapeHtml(text("accountSwitcherAll"))}</option>` +
            accounts.map((a) => `<option value="${escapeHtml(a.id || a.label || a.github_user || "")}">${escapeHtml(a.label || a.github_user || a.id || "Account")}</option>`).join("");
          if (currentVal) select.value = currentVal;
          const applyBtn = document.getElementById("account-switcher-apply");
          if (applyBtn) {
            applyBtn.onclick = () => {
              const selectedId = select.value;
              const baseEndpoint = state.endpoint.replace("/usage", "");
              let newEndpoint;
              if (selectedId) {
                newEndpoint = `${baseEndpoint}/usage?account=${encodeURIComponent(selectedId)}`;
              } else {
                newEndpoint = `${baseEndpoint}/usage`;
              }
              state.endpoint = newEndpoint;
              const endpointInput = document.getElementById("endpoint-input");
              if (endpointInput) endpointInput.value = newEndpoint;
              fetchData();
            };
          }
        }

        function renderAccountsStats(total, active, premium) {
          return [
            { title: text("accountsTotal"), value: formatNumber(total), icon: "users", pill: "pill-brand" },
            { title: text("accountsActive"), value: formatNumber(active), icon: "check", pill: "pill-success" },

              <div class="mt-3 text-2xl font-bold text-[var(--text)] mono">${escapeHtml(String(c.value))}</div>
            </article>
          `).join("");

        function renderAccountCard(acct) {
          const login = acct.githubLogin || "unknown";
          const avatarUrl = `https://github.com/${login}.png?size=64`;
          const label = acct.label || "";
          const status = acct.status || "unknown";
          const isDisabled = status === "disabled";
          const lastUsed = acct.lastUsedAt ? formatDateTime(acct.lastUsedAt) : text("accountNeverUsed");

          // Quota progress
          const entitlement = acct.usage?.premium_total || 0;
          const remaining = acct.usage?.premium_remaining || 0;
          const unlimited = false;
          const percentUsed = !entitlement ? 0 : Math.max(0, ((entitlement - remaining) / entitlement) * 100);
          const tone = getProgressTone(percentUsed, unlimited);

          return `
            <div class="account-card" data-account-id="${escapeHtml(String(acct.id || login))}">
              <div class="flex items-center gap-3">
                <img class="account-avatar" src="${escapeHtml(avatarUrl)}" alt="${escapeHtml(login)}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect fill=%22%23e8e3db%22 width=%2264%22 height=%2264%22/><text x=%2232%22 y=%2238%22 text-anchor=%22middle%22 fill=%22%2316606e%22 font-size=%2224%22>?</text></svg>'" />
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="font-bold text-[var(--text)] truncate">${escapeHtml(login)}</span>
                    ${label ? `<span class="pill pill-neutral text-xs">${escapeHtml(label)}</span>` : ""}
                  </div>
                  <div class="flex items-center gap-2 mt-1">
                    ${getStatusPill(status)}
                    <span class="text-xs text-[var(--muted)]">${escapeHtml(text("accountLastUsed"))}: ${escapeHtml(lastUsed)}</span>
                  </div>
                </div>
              </div>
              ${entitlement || unlimited ? `
                <div class="space-y-1.5">
                  <div class="flex justify-between text-xs text-[var(--muted)]">
                    <span>${escapeHtml(text("modelsColPremium"))}</span>
                    <span class="mono">${unlimited ? escapeHtml(text("unlimited")) : `${escapeHtml(formatNumber(remaining))} / ${escapeHtml(formatNumber(entitlement))}`}</span>
                  </div>
                  <div class="progress-track">
                    <div class="progress-fill ${tone}" style="width: ${unlimited ? 100 : Math.min(percentUsed, 100)}%"></div>
                  </div>
                </div>
              ` : ""}
              <div class="account-actions">
                <button type="button" class="btn btn-ghost btn-sm" data-acct-action="${isDisabled ? "enable" : "disable"}" data-acct-id="${escapeHtml(String(acct.id || login))}">
                  ${icon("power")}${escapeHtml(isDisabled ? text("accountEnable") : text("accountDisable"))}
                </button>
                <button type="button" class="btn btn-ghost btn-sm" data-acct-action="refresh" data-acct-id="${escapeHtml(String(acct.id || login))}">
                  ${icon("refresh")}${escapeHtml(text("accountRefresh"))}
                </button>
                <button type="button" class="btn btn-danger btn-sm" data-acct-action="delete" data-acct-id="${escapeHtml(String(acct.id || login))}">
                  ${icon("trash")}${escapeHtml(text("accountDelete"))}
                </button>
              </div>
            </div>
          `;
        }

        function bindAccountActions() {
          document.querySelectorAll("[data-acct-action]").forEach((btn) => {
            btn.addEventListener("click", async () => {
              const action = btn.getAttribute("data-acct-action");
              const id = btn.getAttribute("data-acct-id");
              btn.disabled = true;
              const origHTML = btn.innerHTML;
              btn.innerHTML = icon("refresh") + " ...";
              try {
                if (action === "delete") {
                  const confirmed = await showConfirm(text("accountDeleteConfirmTitle"), text("accountDeleteConfirm"));
                  if (!confirmed) { btn.disabled = false; btn.innerHTML = origHTML; return; }
                  await adminFetch(`/api/accounts/${encodeURIComponent(id)}`, { method: "DELETE" });
                  showToast(text("apiSuccess"));
                } else if (action === "enable" || action === "disable") {
                  await adminFetch(`/api/accounts/${encodeURIComponent(id)}/status`, {
                    method: "PUT",
                    body: JSON.stringify({ status: action === "enable" ? "active" : "disabled" }),
                  });
                  showToast(text("apiSuccess"));
                } else if (action === "refresh") {
                  await adminFetch(`/api/accounts/${encodeURIComponent(id)}/refresh`, { method: "POST" });
                  showToast(text("apiSuccess"));
                }
              } catch (err) {
                showToast(text("apiError") + ": " + err.message, "error");
              } finally {
                btn.disabled = false;
                btn.innerHTML = origHTML;
              }
              loadAccounts();
            });
          });
        }

        function renderModelMappingTable() {
          const body = document.getElementById("models-mapping-body");
          if (!body) return;
          const entries = Object.entries(modelMappingData);
          if (entries.length === 0) {
            body.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-sm text-[var(--muted)]">${escapeHtml(text("modelNoMappings"))}</td></tr>`;
          } else {
            body.innerHTML = entries.map(([from, to], i) => `
              <tr>
                <td><input class="input-field mono" type="text" value="${escapeHtml(from)}" data-map-idx="${i}" data-map-field="from" /></td>
                <td class="text-center text-[var(--muted)]">${icon("arrowRight")}</td>
                <td><input class="input-field mono" type="text" value="${escapeHtml(to)}" data-map-idx="${i}" data-map-field="to" /></td>
                <td><button type="button" class="btn btn-danger btn-sm" data-map-delete="${i}">${icon("trash")}</button></td>
              </tr>
            `).join("");
          }
          // Add row
          body.innerHTML += `
            <tr>
              <td><input class="input-field mono" type="text" placeholder="gpt-4" id="new-map-from" /></td>
              <td class="text-center text-[var(--muted)]">${icon("arrowRight")}</td>
              <td><input class="input-field mono" type="text" placeholder="gpt-4o" id="new-map-to" /></td>
              <td><button type="button" class="btn btn-ghost btn-sm" id="add-mapping-row">${icon("plus")}${escapeHtml(text("modelMappingAdd"))}</button></td>
            </tr>
          `;
          // Bind
          body.querySelectorAll("[data-map-delete]").forEach((btn) => {
            btn.addEventListener("click", () => {
              const entries = Object.entries(modelMappingData);
              const idx = Number(btn.getAttribute("data-map-delete"));
              if (entries[idx]) {
                delete modelMappingData[entries[idx][0]];
                renderModelMappingTable();
              }
            });
          });
          body.querySelectorAll("[data-map-field]").forEach((input) => {
            input.addEventListener("change", () => {
              // Rebuild from inputs
              const rows = body.querySelectorAll("tr");
              const newMap = {};
              rows.forEach((row) => {
                const fromInput = row.querySelector('[data-map-field="from"]');
                const toInput = row.querySelector('[data-map-field="to"]');
                if (fromInput && toInput && fromInput.value.trim()) {
                  newMap[fromInput.value.trim()] = toInput.value.trim();
                }
              });
              modelMappingData = newMap;
            });
          });
          const addBtn = document.getElementById("add-mapping-row");
          if (addBtn) {
            addBtn.addEventListener("click", () => {
              const from = document.getElementById("new-map-from")?.value?.trim();
              const to = document.getElementById("new-map-to")?.value?.trim();
              if (from && to) {
                modelMappingData[from] = to;
                renderModelMappingTable();
              }
            });
          }
        }

        let statsRefreshTimer = null;

        function startStatsAutoRefresh() {
          stopStatsAutoRefresh();
          statsRefreshTimer = setInterval(loadStats, 5000);
        }

        function stopStatsAutoRefresh() {
          if (statsRefreshTimer) {
            clearInterval(statsRefreshTimer);
            statsRefreshTimer = null;
          }
        }

        async function clearStats() {
          await adminFetch("/api/stats", { method: "DELETE" });
          loadStats();
        }

        async function loadStats() {
          const uptimeCard = document.getElementById("stats-uptime-card");
          const reqContent = document.getElementById("stats-requests-content");
          const acctContent = document.getElementById("stats-accounts-content");
          if (!uptimeCard || !reqContent || !acctContent) return;

          try {
            const data = await adminFetch("/api/stats");
            if (!data) throw new Error("Empty response");

            // Uptime
            const uptimeSeconds = data.uptime || 0;
            const hours = Math.floor(uptimeSeconds / 3600);
            const minutes = Math.floor((uptimeSeconds % 3600) / 60);
            const seconds = Math.floor(uptimeSeconds % 60);
            const uptimeStr = `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;

            uptimeCard.innerHTML = `
              <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                <div>
                  <div class="section-title text-xl text-[var(--text)]">
                    <span class="section-icon">${ICONS.server}</span>
                    <span>${escapeHtml(text("statsUptime"))}</span>
                  </div>
                  <p class="mt-2 text-sm text-[var(--muted)]">${escapeHtml(text("statsAutoRefresh"))}</p>
                </div>
                <div class="text-3xl font-bold mono text-[var(--brand)]">${escapeHtml(uptimeStr)}</div>
              </div>
            `;

            // Per-model requests
            const models = data.models || data.model_stats || {};
            const modelEntries = Object.entries(models);
            if (modelEntries.length === 0) {
              reqContent.innerHTML = `<p class="text-sm text-[var(--muted)]">${escapeHtml(text("statsNoData"))}</p>`;
            } else {
              const maxVal = Math.max(1, ...modelEntries.map(([, v]) => v.totalRequests || (v.active || 0) + (v.queued || 0)));
              reqContent.innerHTML = `
                <div class="stat-bar-group">
                  ${modelEntries.map(([model, v]) => {
                    const total = v.totalRequests || 0;
                    const active = v.active || 0;
                    const queued = v.queued || 0;
                    const pct = Math.min((total / maxVal) * 100, 100);
                    return `
                      <div class="stat-bar-row">
                        <span class="stat-bar-label" title="${escapeHtml(model)}">${escapeHtml(model)}</span>
                        <div class="stat-bar-track">
                          <div class="stat-bar-fill progress-fill-brand" style="width:${pct}%"></div>
                        </div>
                        <span class="stat-bar-value">${total}<span class="text-[var(--muted)] text-xs"> (${active}活跃/${queued}排队)</span></span>
                      </div>
                    `;
                  }).join("")}
                </div>
                <div class="mt-3 flex items-center justify-between">
                  <div class="flex gap-4 text-xs text-[var(--muted)]">
                    <span>${icon("activity")} 累计请求数 (活跃/排队)</span>
                  </div>
                  <button type="button" class="btn btn-secondary btn-sm" data-action="clear-stats">${icon("trash")} 清空统计</button>
                </div>
              `;
            }

            // Account status distribution — always fetch fresh data
            try {
              const acctResp = await adminFetch("/api/accounts");
              accountsData = Array.isArray(acctResp) ? acctResp : (acctResp && acctResp.accounts ? acctResp.accounts : []);
            } catch {}
            const acctStats = {};
            accountsData.forEach((a) => { acctStats[a.status || "unknown"] = (acctStats[a.status || "unknown"] || 0) + 1; });
            const statusEntries = Object.entries(acctStats);
            if (statusEntries.length === 0) {
              acctContent.innerHTML = `<p class="text-sm text-[var(--muted)]">${escapeHtml(text("statsNoData"))}</p>`;
            } else {
              const totalAcct = statusEntries.reduce((sum, [, count]) => sum + (Number(count) || 0), 0) || 1;
              const statusColorMap = { active: "progress-fill-success", exhausted: "progress-fill-warning", rate_limited: "progress-fill-warning", banned: "progress-fill-danger", error: "progress-fill-danger", disabled: "" };
              // Stacked bar
              acctContent.innerHTML = `
                <div class="space-y-3">
                  <div class="progress-track" style="height:1.8rem">
                    <div class="flex h-full">
                      ${statusEntries.map(([status, count]) => {
                        const pct = (Number(count) / totalAcct) * 100;
                        const colorCls = statusColorMap[status] || "progress-fill-brand";
                        const bgFallback = colorCls ? "" : "background:var(--panel);";
                        return `<div class="${colorCls}" style="width:${pct}%;${bgFallback}" title="${escapeHtml(status)}: ${count}"></div>`;
                      }).join("")}
                    </div>
                  </div>
                  <div class="flex flex-wrap gap-3">
                    ${statusEntries.map(([status, count]) => `
                      <div class="flex items-center gap-2 text-sm">
                        ${getStatusPill(status)}
                        <span class="mono font-bold">${count}</span>
                      </div>
                    `).join("")}
                  </div>
                </div>
              `;
            }
          } catch (err) {
            uptimeCard.innerHTML = `
              <div class="text-center py-4 space-y-2">
                <div class="empty-illustration mx-auto">${ICONS.activity}</div>
                <p class="text-sm text-[var(--muted)]">${escapeHtml(text("statsNoDataDesc"))}</p>
              </div>
            `;
            reqContent.innerHTML = `<p class="text-sm text-[var(--muted)]">${escapeHtml(text("statsNoData"))}</p>`;
            acctContent.innerHTML = `<p class="text-sm text-[var(--muted)]">${escapeHtml(text("statsNoData"))}</p>`;
          }
        }

        function initialize() {
          refs.endpointForm.addEventListener("submit", handleSubmit);
          refs.resetButton.addEventListener("click", handleReset);
          refs.exportButton.addEventListener("click", handleExportConfig);

          // ── Collapsible available models ──
          const modelsToggle = document.getElementById("models-avail-toggle");
          if (modelsToggle) {
            modelsToggle.addEventListener("click", () => {
              const content = document.getElementById("models-avail-content");
              const arrow = document.getElementById("models-avail-arrow");
              if (!content) return;
              const isHidden = content.style.display === "none";
              content.style.display = isHidden ? "" : "none";
              if (arrow) arrow.textContent = isHidden ? "▼" : "▶";
            });
          }

          refs.langToggle.addEventListener("click", () => {
            state.language = state.language === "zh" ? "en" : "zh";
            persistPreferences();
            renderAll();
          });

          // ── Main tab switching ──
          document.querySelectorAll(".main-tab-btn").forEach((btn) => {
            btn.addEventListener("click", () => {
              const tabKey = btn.getAttribute("data-main-tab");
              if (tabKey) switchMainTab(tabKey);
            });
          });

          // Delegate clicks on data-switch-tab buttons (rendered inside cards)
          document.addEventListener("click", (e) => {
            const btn = e.target.closest("[data-switch-tab]");
            if (btn) switchMainTab(btn.getAttribute("data-switch-tab"));
            const actionBtn = e.target.closest("[data-action]");
            if (actionBtn?.getAttribute("data-action") === "clear-stats") clearStats();
          });

          // ── Restore tab from URL hash on load / back-forward ──
          const validTabs = ["overview", "accounts", "models", "statistics"];
          const hashTab = location.hash.replace("#", "");
          if (validTabs.includes(hashTab)) switchMainTab(hashTab);
          window.addEventListener("hashchange", () => {
            const t = location.hash.replace("#", "");
            if (validTabs.includes(t)) switchMainTab(t);
          });

          // ── Add Account modal (Device Code flow) ──
          const addAccountBtn = document.getElementById("add-account-btn");
          if (addAccountBtn) addAccountBtn.addEventListener("click", openModal);
          const modalCloseBtn = document.getElementById("modal-close-btn");
          if (modalCloseBtn) modalCloseBtn.addEventListener("click", closeModal);
          const modalOverlay = document.getElementById("add-account-modal");
          if (modalOverlay) modalOverlay.addEventListener("click", (e) => { if (e.target === modalOverlay) closeModal(); });
          const modalStartAuthBtn = document.getElementById("modal-start-auth-btn");
          if (modalStartAuthBtn) modalStartAuthBtn.addEventListener("click", startDeviceCodeAuth);
          const modalCopyCodeBtn = document.getElementById("modal-copy-code-btn");
          if (modalCopyCodeBtn) modalCopyCodeBtn.addEventListener("click", handleCopyCode);
          const modalCopyLinkBtn = document.getElementById("modal-copy-link-btn");
          if (modalCopyLinkBtn) modalCopyLinkBtn.addEventListener("click", handleCopyLink);
          const modalCancelAuthBtn = document.getElementById("modal-cancel-auth-btn");
          if (modalCancelAuthBtn) modalCancelAuthBtn.addEventListener("click", closeModal);
          const modalDoneBtn = document.getElementById("modal-done-btn");
          if (modalDoneBtn) modalDoneBtn.addEventListener("click", handleAuthDone);
          const modalRetryBtn = document.getElementById("modal-retry-btn");
          if (modalRetryBtn) modalRetryBtn.addEventListener("click", handleAuthRetry);

          // ── Model management save buttons ──
          const saveMappingBtn = document.getElementById("save-mapping-btn");
          if (saveMappingBtn) saveMappingBtn.addEventListener("click", saveModelMapping);
          const saveConcurrencyBtn = document.getElementById("save-concurrency-btn");
          if (saveConcurrencyBtn) saveConcurrencyBtn.addEventListener("click", saveModelConcurrency);

          // ── Keyboard: Escape closes modal (only if not actively polling) ──
          document.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && !deviceCodePollTimer) closeModal();
          });

          setEndpoint(state.endpoint);
          renderAll();
          syncAutoRefresh();
          fetchData({ preserveContent: false });
        }

        initialize();
      });
    </script>
  </body>
</html>
