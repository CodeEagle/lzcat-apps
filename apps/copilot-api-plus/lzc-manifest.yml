application:
  public_path:
    - /
  subdomain: copilot-api-plus
  upstreams:
    -
      backend: http://copilot-api-plus:4141/
      location: /
author: imbuxiangnan-cyber
description: Convert GitHub Copilot subscription into OpenAI & Anthropic compatible API proxy with multi-account management and usage dashboard.
homepage: https://github.com/imbuxiangnan-cyber/copilot-api-plus
license: MIT
locales:
  en:
    description: Convert GitHub Copilot into OpenAI/Anthropic API proxy with multi-account support and usage monitoring dashboard.
    name: Copilot API Plus
  zh:
    description: 将 GitHub Copilot 订阅转换为 OpenAI/Anthropic 兼容 API 代理，支持多账号管理和用量监控面板。
    name: Copilot API Plus
lzc-sdk-version: '0.1'
min_os_version: 1.3.8
name: Copilot API Plus
package: fun.selfstudio.app.migration.copilot-api-plus
services:
  copilot-api-plus:
    image: registry.lazycat.cloud/placeholder/copilot-api-plus:latest
    environment:
      - COPILOT_API_DATA_DIR=/lzcapp/var/data
      - PORT=4141
    binds:
      - /lzcapp/var/data:/lzcapp/var/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4141/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
version: 1.2.25
