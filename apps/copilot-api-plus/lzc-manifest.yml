lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.copilot-api-plus
version: 1.2.14
min_os_version: 1.3.8
name: copilot-api-plus
description: Turn GitHub Copilot into OpenAI/Anthropic API compatible server
license: MIT
homepage: https://github.com/CodeEagle/copilot-api-plus
author: CodeEagle
application:
  subdomain: copilot-api-plus
  public_path:
    - /
  upstreams:
    -
      location: /
      backend: http://copilot-api-plus:4141/
services:
  copilot-api-plus:
    image: registry.lazycat.cloud/placeholder/copilot-api-plus:bootstrap
    environment:
      - PORT=4141
      - COPILOT_API_DATA_DIR=/lzcapp/var/data/copilot-api-plus
    binds:
      - /lzcapp/var/data/copilot-api-plus:/lzcapp/var/data/copilot-api-plus
    healthcheck:
      test:
        - CMD-SHELL
        - wget --spider -q http://localhost:4141/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
locales:
  en:
    name: copilot-api-plus
    description: Turn GitHub Copilot into OpenAI/Anthropic API compatible server
  zh:
    name: copilot-api-plus
    description: 将 GitHub Copilot 转换为 OpenAI/Anthropic 兼容 API 的代理服务
