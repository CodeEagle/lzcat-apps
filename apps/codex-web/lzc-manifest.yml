application:
  public_path:
    - /
  subdomain: codex-web
  upstreams:
    -
      backend: http://codex-web:8214/
      location: /
author: "0xcaff"
description: Browser workspace for Codex CLI on your LazyCat Microserver, with chat, projects, plugins, and persistent session data.
homepage: https://github.com/0xcaff/codex-web
license: MIT
locales:
  en:
    description: Browser workspace for Codex CLI on your LazyCat Microserver, with chat, projects, plugins, and persistent session data.
    name: Codex Web
    usage: Sign in to Codex CLI inside the service container with `codex login --device-auth` before starting real sessions. The app trusts users who can reach its LazyCat route, so keep the entry protected by LazyCat access control.
  zh:
    description: 在懒猫微服上运行 Codex CLI 的浏览器工作台，支持聊天、项目工作区、插件管理和会话状态持久化。
    name: Codex Web
    usage: 首次使用前，请进入服务容器执行 `codex login --device-auth` 完成 Codex CLI 登录。应用默认信任能访问懒猫入口的用户，请保持入口受懒猫访问控制保护。
lzc-sdk-version: '0.1'
min_os_version: 1.3.8
name: Codex Web
package: fun.selfstudio.app.migration.codex-web
usage: 首次使用前，请进入服务容器执行 `codex login --device-auth` 完成 Codex CLI 登录。应用默认信任能访问懒猫入口的用户，请保持入口受懒猫访问控制保护。
services:
  codex-web:
    binds:
      - /lzcapp/var/data/codex-web:/data
      - /lzcapp/var/data/codex-web/workspace:/workspace
    environment:
      - NODE_ENV=production
      - HOME=/data/home
      - CODEX_HOME=/data/home/.codex
      - XDG_CACHE_HOME=/data/cache
      - XDG_CONFIG_HOME=/data/config
      - XDG_DATA_HOME=/data/share
      - TMPDIR=/data/tmp
      - CODEX_CLI_PATH=/usr/local/bin/codex
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8214/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    image: registry.lazycat.cloud/placeholder/codex-web:bootstrap
version: 0.1.2
