application:
  public_path:
    - /
  subdomain: codex-web
  upstreams:
    -
      backend: http://codex-web:8214/
      location: /
author: "0xcaff"
description: a browser frontend for codex desktop, running on a machine you control
homepage: https://github.com/0xcaff/codex-web
license: MIT
locales:
  en:
    description: a browser frontend for codex desktop, running on a machine you control
    name: Codex Web
  zh:
    description: 在浏览器中访问运行于懒猫微服内的 Codex 桌面桥接服务
    name: Codex Web
lzc-sdk-version: '0.1'
min_os_version: 1.3.8
name: Codex Web
package: fun.selfstudio.app.migration.codex-web
services:
  codex-web:
    binds:
      - /lzcapp/var/data/codex-web:/data
      - /lzcapp/var/data/codex-web/workspace:/workspace
    environment:
      - NODE_ENV=production
      - HOME=/data/home
      - CODEX_HOME=/data/home/.codex
      - XDG_CACHE_HOME=/data/cache
      - XDG_CONFIG_HOME=/data/config
      - XDG_DATA_HOME=/data/share
      - TMPDIR=/data/tmp
      - CODEX_CLI_PATH=/usr/local/bin/codex
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8214/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    image: registry.lazycat.cloud/placeholder/codex-web:bootstrap
version: 0.1.1
