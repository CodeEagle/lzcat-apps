application:
  public_path:
    - /
  subdomain: mercury-agent
  upstreams:
    -
      backend: http://mercury-agent:80/
      location: /
author: Cosmic Stack
description: Soul-driven AI agent (mercury-agent) wrapped with web terminal entry and floatball file explorer.
homepage: https://github.com/cosmicstack-labs/mercury-agent
license: MIT
locales:
  en:
    description: Soul-driven AI agent with permission-hardened tools, token budgets, and multi-channel access. Web terminal as primary entry; floatball provides a file explorer for /data.
    name: Mercury Agent
  zh:
    description: 基于灵魂驱动的 AI agent，权限受控工具、Token 预算与多通道接入。Web 终端作为主入口；悬浮球仅提供 /data 文件浏览器。
    name: Mercury Agent
lzc-sdk-version: '0.1'
min_os_version: 1.3.8
name: Mercury Agent
package: fun.selfstudio.app.migration.mercury-agent
services:
  mercury-agent:
    binds:
      - /lzcapp/var/data/mercury-agent:/data
      - /lzcapp/var/data/mercury-agent/workspace:/root/workspace
    environment:
      - MERCURY_HOME=/data
      - DEFAULT_PROVIDER=deepseek
      - HEARTBEAT_INTERVAL_MINUTES=60
      - DAILY_TOKEN_BUDGET=50000
      - OPENAI_API_KEY
      - OPENAI_BASE_URL
      - OPENAI_MODEL
      - ANTHROPIC_API_KEY
      - ANTHROPIC_MODEL
      - DEEPSEEK_API_KEY
      - DEEPSEEK_BASE_URL
      - DEEPSEEK_MODEL
      - GROK_API_KEY
      - GROK_BASE_URL
      - GROK_MODEL
      - OLLAMA_CLOUD_API_KEY
      - OLLAMA_CLOUD_BASE_URL
      - OLLAMA_CLOUD_MODEL
      - OLLAMA_LOCAL_BASE_URL
      - OLLAMA_LOCAL_MODEL
      - OLLAMA_LOCAL_ENABLED
      - TELEGRAM_BOT_TOKEN
      - GITHUB_TOKEN
      - GITHUB_USERNAME
      - GITHUB_EMAIL
      - GITHUB_DEFAULT_OWNER
      - GITHUB_DEFAULT_REPO
      - MERCURY_NAME
      - MERCURY_OWNER
    image: registry.lazycat.cloud/placeholder/mercury-agent:mercury-agent
version: 0.1.0
