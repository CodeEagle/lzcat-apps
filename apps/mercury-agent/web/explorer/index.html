<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>File Explorer</title>
<style>
html,body{margin:0;padding:0;height:100%;background:#101015;color:#e6e6ee;font:13px/1.4 ui-monospace,Menlo,monospace}
#bar{position:fixed;top:0;left:0;right:0;height:34px;display:flex;align-items:center;gap:8px;padding:0 12px;background:#1a1a22;border-bottom:1px solid #2a2a33}
#bar select{background:#252531;color:#eee;border:1px solid #3a3a48;padding:3px 6px;border-radius:4px}
#bar button{background:#252531;color:#eee;border:1px solid #3a3a48;padding:4px 10px;border-radius:4px;cursor:pointer}
#bar button:hover{background:#2f2f3e}
#path{margin-left:4px;color:#9aa;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#wrap{position:fixed;top:34px;left:0;right:0;bottom:0;display:flex}
#list{width:42%;border-right:1px solid #2a2a33;overflow:auto}
#viewer{flex:1;display:flex;flex-direction:column;min-width:0}
#vbar{padding:6px 12px;color:#9aa;border-bottom:1px solid #2a2a33;display:flex;align-items:center;gap:8px}
#content{flex:1;overflow:auto;white-space:pre;padding:12px;margin:0}
.row{padding:6px 12px;cursor:pointer;border-bottom:1px solid #1a1a22}
.row:hover{background:#1c1c25}
.row.dir{color:#7ec0ff}
.muted{color:#666}
</style></head>
<body>
<div id="bar">
  <select id="root">
    <option value="data">/data</option>
    <option value="workspace">/root/workspace</option>
  </select>
  <button id="up">↑ Up</button>
  <button id="reload">⟳</button>
  <span id="path">/</span>
</div>
<div id="wrap">
  <div id="list"></div>
  <div id="viewer">
    <div id="vbar"><span id="vpath" class="muted">No file selected</span></div>
    <pre id="content"></pre>
  </div>
</div>
<script>
const ROOTS = {
  data:      { listBase: '/api/files/list/',           rawBase: '/api/files/raw/',           label: '/data' },
  workspace: { listBase: '/api/files/list-workspace/', rawBase: '/api/files/raw-workspace/', label: '/root/workspace' }
};
let curRoot = 'data';
let curRel = '';

function rootInfo(){ return ROOTS[curRoot]; }

async function browse(rel){
  curRel = rel.replace(/^\/+/, '').replace(/\/+$/, '');
  const { listBase, label } = rootInfo();
  const url = listBase + (curRel ? curRel + '/' : '');
  document.getElementById('path').textContent = label + '/' + curRel;
  let entries = [];
  try{
    const r = await fetch(url, { headers: { Accept: 'application/json' } });
    if(!r.ok){ throw new Error('HTTP ' + r.status); }
    entries = await r.json();
  }catch(e){
    document.getElementById('list').innerHTML =
      '<div class="row muted">Failed to list: ' + (e.message || e) + '</div>';
    return;
  }
  entries.sort((a,b) => (b.type==='directory') - (a.type==='directory') || a.name.localeCompare(b.name));
  const list = document.getElementById('list');
  list.innerHTML = '';
  for(const e of entries){
    const isDir = e.type === 'directory';
    const row = document.createElement('div');
    row.className = 'row' + (isDir ? ' dir' : '');
    row.textContent = (isDir ? '📁 ' : '📄 ') + e.name + (isDir ? '/' : '');
    row.onclick = () => {
      const next = (curRel ? curRel + '/' : '') + e.name;
      if(isDir){ browse(next); } else { view(next); }
    };
    list.appendChild(row);
  }
  if(entries.length === 0){
    list.innerHTML = '<div class="row muted">(empty)</div>';
  }
}

async function view(rel){
  const { rawBase, label } = rootInfo();
  document.getElementById('vpath').textContent = label + '/' + rel;
  document.getElementById('vpath').classList.remove('muted');
  document.getElementById('content').textContent = 'Loading…';
  try{
    // Cap transfer at 2 MB via Range; nginx replies 206 partial from sendfile,
    // so even GB-scale logs only stream the first 2 MB to the browser.
    const r = await fetch(rawBase + rel, { headers: { Range: 'bytes=0-2097151' } });
    if(r.status !== 200 && r.status !== 206) throw new Error('HTTP ' + r.status);
    const text = await r.text();
    const total = parseInt((r.headers.get('Content-Range') || '').split('/').pop(), 10);
    const truncated = r.status === 206 && (Number.isFinite(total) ? total > text.length : true);
    document.getElementById('content').textContent =
      truncated ? text + '\n\n[truncated — first 2 MB only' + (Number.isFinite(total) ? '; full size ' + total + ' bytes' : '') + ']' : text;
  }catch(e){
    document.getElementById('content').textContent = 'Error: ' + (e.message || e);
  }
}

document.getElementById('up').onclick = () => {
  if(!curRel){ return; }
  const parent = curRel.split('/').slice(0, -1).join('/');
  browse(parent);
};
document.getElementById('reload').onclick = () => browse(curRel);
document.getElementById('root').onchange = (e) => {
  curRoot = e.target.value;
  document.getElementById('content').textContent = '';
  document.getElementById('vpath').textContent = 'No file selected';
  document.getElementById('vpath').classList.add('muted');
  browse('');
};
browse('');
</script>
</body></html>
