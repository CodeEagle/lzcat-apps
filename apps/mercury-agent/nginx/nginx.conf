user root;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 64m;
    charset utf-8;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream ttyd_upstream {
        server 127.0.0.1:7681;
    }

    server {
        listen 80 default_server;
        server_name _;

        # Liveness for healthcheck
        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        # Static floatball widget assets
        location /widget/ {
            alias /app/web/widget/;
            expires 1h;
        }

        # File explorer (static page; talks to /api/files/* below)
        location /explorer/ {
            alias /app/web/explorer/;
            index index.html;
            try_files $uri $uri/ /explorer/index.html;
        }

        # JSON directory listings — read-only browse of allowed roots.
        # disable_symlinks blocks autoindex from following symlinks owned by
        # other users (e.g. /data/.local -> /root/.local) and from leaking
        # system paths via crafted symlinks.
        location /api/files/list/ {
            limit_except GET HEAD { deny all; }
            alias /data/;
            autoindex on;
            autoindex_format json;
            autoindex_exact_size off;
            autoindex_localtime on;
            disable_symlinks if_not_owner;
        }
        location /api/files/list-workspace/ {
            limit_except GET HEAD { deny all; }
            alias /root/workspace/;
            autoindex on;
            autoindex_format json;
            autoindex_exact_size off;
            autoindex_localtime on;
            disable_symlinks if_not_owner;
        }

        # Raw file read — text/plain inline. GET only, symlink-follow restricted.
        # Frontend uses Range: bytes=0-2097151 to cap transfer at 2 MB; nginx
        # serves a 206 partial response from sendfile, so large logs do not OOM
        # the browser.
        location /api/files/raw/ {
            limit_except GET HEAD { deny all; }
            alias /data/;
            add_header Content-Disposition 'inline';
            add_header Accept-Ranges bytes;
            default_type text/plain;
            charset utf-8;
            disable_symlinks if_not_owner;
        }
        location /api/files/raw-workspace/ {
            limit_except GET HEAD { deny all; }
            alias /root/workspace/;
            add_header Content-Disposition 'inline';
            add_header Accept-Ranges bytes;
            default_type text/plain;
            charset utf-8;
            disable_symlinks if_not_owner;
        }

        # ttyd WebSocket
        location /ws {
            proxy_pass http://ttyd_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ttyd auth-token endpoint
        location = /token {
            proxy_pass http://ttyd_upstream;
            proxy_set_header Host $host;
        }

        # Default: ttyd index + static assets, with floatball injected into HTML.
        # Force the upstream to send uncompressed responses so sub_filter can
        # rewrite <head>; nginx will gzip the rewritten body for the client if
        # gzip on; is set elsewhere.
        location / {
            proxy_pass http://ttyd_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            sub_filter_once on;
            sub_filter_types text/html;
            sub_filter '</head>'
                '<link rel="stylesheet" href="/widget/float-ball.css"><script src="/widget/float-ball.js" defer></script></head>';
        }
    }
}
