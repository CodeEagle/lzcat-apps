lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.tts-story
version: '0.1.1'
min_os_version: 1.3.8
name: TTS-Story
description: (LazyCat Auto-build) Multi-engine audiobook and story TTS studio with CPU-friendly defaults
license: Apache-2.0
homepage: https://github.com/Xerophayze/TTS-Story
author: Xerophayze
application:
  subdomain: tts-story
  public_path:
    - /
    - /api
    - /static
  upstreams:
    - location: /
      backend: http://tts-story:5000/
      disable_trim_location: true
  health_check:
    test_url: http://tts-story:5000/api/health
services:
  tts-story:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/tts-story:38de411619cdccdf
    environment:
      - PORT=5000
      - TTS_STORY_DATA_ROOT=/data
      - TTS_STORY_DEFAULT_ENGINE=pocket_tts_preset
      - TTS_STORY_DEFAULT_VOICE=alba
      - TTS_STORY_PARALLEL_CHUNKS=1
      - TTS_STORY_GROUP_CHUNKS_BY_SPEAKER=false
      - HF_HOME=/data/.cache/huggingface
      - TRANSFORMERS_CACHE=/data/.cache/huggingface/hub
      - XDG_CACHE_HOME=/data/.cache
      - TORCH_HOME=/data/.cache/torch
      - GEMINI_API_KEY
      - REPLICATE_API_KEY
      - CHATTERBOX_TURBO_REPLICATE_API_TOKEN
    binds:
      - /lzcapp/var/data/tts-story:/data
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:5000/api/health >/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
locales:
  en:
    name: TTS-Story
    description: (LazyCat Auto-build) Multi-engine audiobook and story TTS studio with CPU-friendly defaults
  zh:
    name: TTS-Story
    description: （懒猫微服自动构建）多引擎有声书与故事配音工作台，默认启用 CPU 友好模式
