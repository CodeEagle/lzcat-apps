lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.copilot-api-plus-test
version: 0.1.0
min_os_version: 1.3.8
name: Copilot Api Plus
description: copilot-api-plus on LazyCat
homepage: https://github.com/imbuxiangnan-cyber/copilot-api-plus
author: TODO
application:
  subdomain: copilot-api-plus
  public_path:
    - /
  upstreams:
    -
      location: /
      backend: http://copilot-api-plus:4141/
services:
  copilot-api-plus:
    image: registry.lazycat.cloud/placeholder/copilot-api-plus:bootstrap
    healthcheck:
      test:
        - CMD-SHELL
        - wget --spider -q http://localhost:4141/ || exit 1 COPY entrypoint.sh /entrypoint.sh RUN chmod +x /entrypoint.sh ENTRYPOINT ["/entrypoint.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
locales:
  en:
    name: Copilot Api Plus
    description: copilot-api-plus on LazyCat
  zh:
    name: Copilot Api Plus
    description: （迁移初稿）Copilot Api Plus 的懒猫微服版本
