lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.copilot-api-plus-test
version: 0.1.0
min_os_version: 1.3.8
name: Copilot Api Plus
description: copilot-api-plus-test on LazyCat
homepage: https://github.com/CodeEagle/copilot-api-plus-test
author: TODO
application:
  subdomain: copilot-api-plus-test
  public_path:
    - /
  upstreams:
    -
      location: /
      backend: http://copilot-api-plus-test:4141/
services:
  copilot-api-plus-test:
    image: registry.lazycat.cloud/placeholder/copilot-api-plus-test:bootstrap
    binds:
      - /lzcapp/var/data/copilot-api-plus-test:/root/.local/share/copilot-api-plus-test
    healthcheck:
      test:
        - CMD-SHELL
        - wget --spider -q http://localhost:4141/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
locales:
  en:
    name: Copilot Api Plus
    description: copilot-api-plus-test on LazyCat
  zh:
    name: Copilot Api Plus
    description: （迁移初稿）Copilot Api Plus 的懒猫微服版本
