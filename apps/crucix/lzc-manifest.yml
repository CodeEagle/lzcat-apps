lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.crucix
version: '2.0.2'
min_os_version: 1.3.8
name: Crucix
description: Local intelligence engine with a live OSINT dashboard, periodic sweeps, and optional LLM-powered alerts.
license: AGPL-3.0
homepage: https://github.com/calesthio/Crucix
author: Crucix
application:
  subdomain: crucix
  public_path:
    - /
  environment:
    - PORT=3117
    - REFRESH_INTERVAL_MINUTES=15
    - FRED_API_KEY=
    - FIRMS_MAP_KEY=
    - EIA_API_KEY=
    - AISSTREAM_API_KEY=
    - ACLED_EMAIL=
    - ACLED_PASSWORD=
    - CLOUDFLARE_API_TOKEN=
    - '{{ if and (index .U "llm.provider") (ne (index .U "llm.provider") "disabled") }}LLM_PROVIDER={{ index .U "llm.provider" }}{{ else }}LLM_PROVIDER={{ end }}'
    - '{{ if index .U "llm.api_key" }}LLM_API_KEY={{ index .U "llm.api_key" }}{{ else }}LLM_API_KEY={{ end }}'
    - '{{ if index .U "llm.model" }}LLM_MODEL={{ index .U "llm.model" }}{{ else }}LLM_MODEL={{ end }}'
    - '{{ if index .U "llm.base_url" }}OLLAMA_BASE_URL={{ index .U "llm.base_url" }}{{ else }}OLLAMA_BASE_URL={{ end }}'
    - TELEGRAM_BOT_TOKEN=
    - TELEGRAM_CHAT_ID=
    - TELEGRAM_CHANNELS=
    - TELEGRAM_POLL_INTERVAL=5000
    - DISCORD_BOT_TOKEN=
    - DISCORD_CHANNEL_ID=
    - DISCORD_GUILD_ID=
    - DISCORD_WEBHOOK_URL=
  upstreams:
    -
      location: /
      backend: http://crucix:3117/
services:
  crucix:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/crucix-crucix:b7e789c00eaca236
    command: sh -lc 'mkdir -p /crucix-state/config && cd /app && node /lzcapp/pkg/content/bootstrap.mjs'
    environment:
      - PORT=3117
      - REFRESH_INTERVAL_MINUTES=15
      - CRUCIX_STATE_DIR=/crucix-state
      - CRUCIX_CONFIG_DIR=/crucix-state/config
      - CRUCIX_CONFIG_PATH=/crucix-state/config/.env
      - '{{ if and (index .U "llm.provider") (ne (index .U "llm.provider") "disabled") }}LLM_PROVIDER={{ index .U "llm.provider" }}{{ else }}LLM_PROVIDER={{ end }}'
      - '{{ if index .U "llm.api_key" }}LLM_API_KEY={{ index .U "llm.api_key" }}{{ else }}LLM_API_KEY={{ end }}'
      - '{{ if index .U "llm.model" }}LLM_MODEL={{ index .U "llm.model" }}{{ else }}LLM_MODEL={{ end }}'
      - '{{ if index .U "llm.base_url" }}OLLAMA_BASE_URL={{ index .U "llm.base_url" }}{{ else }}OLLAMA_BASE_URL={{ end }}'
    binds:
      - /lzcapp/var/data/crucix/crucix/runs:/app/runs
      - /lzcapp/var/data/crucix/runtime:/crucix-state
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://127.0.0.1:3117/api/health
      interval: 60s
      timeout: 10s
      retries: 3
locales:
  en:
    name: Crucix
    description: Local intelligence engine with a live OSINT dashboard, periodic sweeps, and optional LLM-powered alerts.
  zh:
    name: Crucix
    description: 本地情报引擎，提供实时 OSINT 仪表盘、定时扫描与可选 LLM 告警。
