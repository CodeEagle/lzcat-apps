lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.localai
version: 4.1.3
min_os_version: 1.3.8
name: LocalAI
description: LocalAI is the open-source AI engine. Run any model - LLMs, vision, voice, image, video - on any hardware. No GPU required.
license: MIT
homepage: https://localai.io
author: mudler
application:
  subdomain: localai
  public_path:
    - /
  upstreams:
    -
      location: /
      backend: http://api:8080/
services:
  api:
    image: registry.lazycat.cloud/placeholder/localai:api
    command:
      - phi-2
    environment:
      - MODELS_PATH=/models
    binds:
      - /lzcapp/var/data/localai/api/models:/models
      - /lzcapp/var/data/localai/api/images:/tmp/generated/images/
      - /lzcapp/var/data/localai/api:/data
      - /lzcapp/var/data/localai/api/backends:/backends
      - /lzcapp/var/data/localai/api/configuration:/configuration
locales:
  en:
    name: LocalAI
    description: LocalAI is the open-source AI engine. Run any model - LLMs, vision, voice, image, video - on any hardware. No GPU required.
  zh:
    name: LocalAI
    description: （迁移初稿）Localai 的懒猫微服版本
