# Phase F8 — daily summary post.
#
# Runs `dashboard_daily_summary.py --publish-discord` once a day at 09:00 CST
# (01:00 UTC) so the rolling daily report lands in the team's Discord channel
# before standup. Outputs are also committed to registry/dashboard/daily/*
# (permanent retention per locked decision #4).

name: Auto-Dashboard

on:
  schedule:
    - cron: "0 1 * * *"   # 09:00 CST = 01:00 UTC
  workflow_dispatch:
    inputs:
      date:
        description: "Override report date (YYYY-MM-DD), defaults to today"
        type: string
        default: ""
      skip_publish:
        description: "Generate the report without posting to Discord"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: auto-dashboard
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  dashboard:
    name: dashboard-daily
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/codeeagle/lzcat-migration-runner:latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
      GH_PAT: ${{ secrets.GH_PAT }}
      LZCAT_DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: template
          fetch-depth: 1

      - name: Configure git identity
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate daily summary
        run: |
          set -euo pipefail
          ARGS=()
          if [ -n "${{ inputs.date }}" ]; then ARGS+=(--date "${{ inputs.date }}"); fi
          if [ "${{ inputs.skip_publish }}" != "true" ]; then ARGS+=(--publish-discord); fi
          python3 scripts/dashboard_daily_summary.py "${ARGS[@]}"

      - name: Commit dashboard outputs
        run: |
          set -euo pipefail
          if [ -d registry/dashboard/daily ]; then
            git add -f registry/dashboard/daily/
          fi
          if git diff --cached --quiet; then
            echo "auto-dashboard: no new dashboard outputs"
            exit 0
          fi
          git commit -m "chore(dashboard): daily summary $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3 4; do
            if git pull --rebase --autostash origin template && git push origin template; then
              exit 0
            fi
            sleep $((2 ** attempt))
          done
          exit 1
