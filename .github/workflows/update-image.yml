name: Update Image

on:
  workflow_call:
    inputs:
      artifact_repo:
        required: true
        type: string
      config_file:
        required: true
        type: string
      target_version:
        required: false
        type: string
        default: ""
      force_build:
        required: false
        type: boolean
        default: false
      publish_to_store:
        required: false
        type: boolean
        default: false
      check_only:
        required: false
        type: boolean
        default: false

jobs:
  update-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run build
        env:
          CONFIG_ROOT: ${{ github.workspace }}/registry
          LZCAT_APPS_ROOT: ${{ github.workspace }}
          CONFIG_FILE: ${{ inputs.config_file }}
          ARTIFACT_REPO: ${{ inputs.artifact_repo }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          APP_NAME="${CONFIG_FILE%.json}"
          if [ -n "${{ inputs.target_version }}" ]; then
            echo "version: ${{ inputs.target_version }}"
          fi
          if [ "${{ inputs.force_build }}" = "true" ]; then
            echo "force build"
          fi
          echo "done"
