# Phase F4 — pull Approved items off the GitHub Project and fan out workers.
#
# Initial gating: limit=1 slug per cycle so the first weeks of unattended
# operation don't pile up failures across many slugs. F7 raises this to 2.
#
# Cron is intentionally OFF for F4. Run via workflow_dispatch until the worker
# is verified end-to-end, then F7 turns the cron on.

name: Auto-Migrate Dispatcher

on:
  workflow_dispatch:
    inputs:
      max_concurrent:
        description: "Max slugs to fan out this cycle"
        type: number
        default: 2
  schedule:
    # F7: every 10 min — pick the oldest ≤2 Approved cards and fire workers.
    - cron: "*/10 * * * *"
  workflow_run:
    # Event-driven re-trigger: as soon as ANY worker / verify / publish run
    # finishes (success, failure, or cancellation), fire the dispatcher to
    # backfill the In-Progress slot with the next Approved candidate. Pairs
    # with the cron schedule so we hit the 2-parallel target without waiting
    # up to 10 minutes between migrations.
    workflows:
      - "Auto-Migrate Worker"
      - "Auto-Verify"
      - "Auto-Publish"
    types: [completed]

permissions:
  actions: write          # gh workflow run auto-migrate-worker.yml
  contents: read

concurrency:
  group: auto-migrate-dispatcher
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  pick-approved:
    name: pick-approved
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/codeeagle/lzcat-migration-runner:latest
    timeout-minutes: 5
    outputs:
      slugs: ${{ steps.pick.outputs.slugs }}
      count: ${{ steps.pick.outputs.count }}
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
      GH_PAT: ${{ secrets.GH_PAT }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: template
          fetch-depth: 1

      - name: Bootstrap project board (idempotent)
        run: python3 scripts/project_board.py bootstrap

      - id: pick
        name: Read approved slugs (capped to keep ≤max_concurrent in flight)
        run: |
          set -euo pipefail
          target="${{ inputs.max_concurrent || 2 }}"
          # Count slugs already mid-migration so we don't over-dispatch.
          # In-Progress = worker running, Browser-Test = verify running.
          inflight_slugs="$(python3 scripts/project_board.py list-by-status \
            --status 'In-Progress,Browser-Test' --format json)"
          inflight="$(python3 -c "import json,sys; print(len(json.loads(sys.argv[1])))" "$inflight_slugs")"
          remaining=$((target - inflight))
          echo "target=$target inflight=$inflight remaining=$remaining (slugs in flight: $inflight_slugs)"
          if [ "$remaining" -le 0 ]; then
            slugs="[]"
            count=0
          else
            slugs="$(python3 scripts/project_board.py list-approved --limit "$remaining" --format json)"
            count="$(python3 -c "import json,sys; print(len(json.loads(sys.argv[1])))" "$slugs")"
          fi
          echo "Approved slugs to dispatch: $slugs (count=$count)"
          {
            echo "slugs=$slugs"
            echo "count=$count"
          } >> "$GITHUB_OUTPUT"

  fan-out:
    name: dispatch-${{ matrix.slug }}
    needs: pick-approved
    if: needs.pick-approved.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        slug: ${{ fromJSON(needs.pick-approved.outputs.slugs) }}
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
    steps:
      - name: Trigger auto-migrate-worker for ${{ matrix.slug }}
        run: |
          set -euo pipefail
          gh workflow run auto-migrate-worker.yml \
            --repo "${{ github.repository }}" \
            --ref template \
            --field slug="${{ matrix.slug }}"
