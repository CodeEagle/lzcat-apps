name: Build Images

on:
  schedule:
    - cron: "0 4 * * 1"   # Mondays 04:00 UTC
  workflow_dispatch:
    inputs:
      target:
        description: "Which image(s) to rebuild"
        type: choice
        options: [both, runner, browser]
        default: both
  push:
    branches: [template]
    paths:
      - ".github/automation-images/**"
      - "scripts/requirements.txt"
      - "scripts/requirements-browser.txt"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: lzcat-migration-runner
            dockerfile: .github/automation-images/migration-runner.Dockerfile
            target_match: runner
          - name: lzcat-bb-browser
            dockerfile: .github/automation-images/bb-browser.Dockerfile
            target_match: browser

    steps:
      - name: Decide whether to build this image
        id: gate
        env:
          EVENT: ${{ github.event_name }}
          INPUT_TARGET: ${{ inputs.target }}
          MATCH: ${{ matrix.target_match }}
        run: |
          if [ "$EVENT" != "workflow_dispatch" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          elif [ "$INPUT_TARGET" = "both" ] || [ "$INPUT_TARGET" = "$MATCH" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.build == 'true'
        uses: actions/checkout@v4

      - if: steps.gate.outputs.build == 'true'
        uses: docker/setup-qemu-action@v3

      - if: steps.gate.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - if: steps.gate.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.gate.outputs.build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - if: steps.gate.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
