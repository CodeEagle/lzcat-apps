name: Build and push Memoh server (LocalRunner)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE: registry.lazycat.cloud/invokerlaw/memohai/server:local-runner-${{ github.sha }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone Memoh upstream
        run: |
          git clone https://github.com/memohai/memoh.git memoh

      - name: Copy LocalRunner patch files into memoh repo
        run: |
          cp -r ./tools/memoh-local-runner/* memoh/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: registry.lazycat.cloud
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        run: |
          docker build -t $IMAGE memoh
          docker push $IMAGE

      - name: Output image
        run: echo "Image pushed: $IMAGE"
