# Phase F4 — single-slug migration cycle. Idempotent — re-runs are safe.
#
# Reads migration/<slug> branch, advances queue state via auto_migration_service,
# updates the GitHub Project Status field based on the resulting queue state,
# and chains to auto-verify.yml when ready for browser checks.

name: Auto-Migrate Worker

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Migration slug (must already exist on Approved column)"
        required: true
        type: string
      max_codex_attempts:
        description: "Max claude repair attempts on build failure"
        type: number
        default: 3

permissions:
  contents: write
  packages: write
  actions: write   # to chain auto-verify

concurrency:
  group: migrate-${{ inputs.slug }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  migrate:
    name: migrate-${{ inputs.slug }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/codeeagle/lzcat-migration-runner:latest
      options: --privileged   # docker/podman builds need it
    timeout-minutes: 90
    env:
      SLUG: ${{ inputs.slug }}
      GH_TOKEN: ${{ secrets.GH_PAT }}
      GH_PAT: ${{ secrets.GH_PAT }}
      LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
      LZC_USR: ${{ secrets.LZC_USR }}
      LZC_PWD: ${{ secrets.LZC_PWD }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      LAZYCAT_BOX_DOMAIN: ${{ secrets.LAZYCAT_BOX_DOMAIN }}
      # Container runs as root; claude CLI refuses
      # --dangerously-skip-permissions under root unless IS_SANDBOX=1
      # is set. CI is a disposable runner behind GitHub's sandboxing —
      # safe to assert. Without this, codex_migration_worker
      # (planner + repair) silently exits rc=1 with stderr:
      #   "--dangerously-skip-permissions cannot be used with root/sudo
      #    privileges for security reasons"
      # which is what bricked every planner run for stellaclaw
      # (25491577249 → 25498098782, 8 consecutive runs). auto-discover.yml
      # already sets this for codex_discovery_reviewer; worker.yml had
      # been missing it ever since codex_migration_worker was added.
      IS_SANDBOX: "1"

    steps:
      - name: Validate slug
        run: |
          case "$SLUG" in
            ""|*[!a-zA-Z0-9._-]*)
              echo "::error::Invalid slug: '$SLUG'"
              exit 1
              ;;
          esac

      - name: Configure podman runtime (nftables + registries.conf)
        # Both fixes are baked into the runner image's Dockerfile (see
        # .github/automation-images/migration-runner.Dockerfile), but this
        # step covers the window between Dockerfile change being merged and
        # build-images.yml publishing the new :latest tag — workers
        # dispatched in that gap pull the previous (broken) image. Once
        # the new image rolls out, both branches become no-ops:
        #   - apt detects nftables already installed → ~0.3s
        #   - grep finds existing unqualified-search-registries → skip
        #
        # Origins of each branch:
        #   - nftables: netavark (podman network plugin) shells out to nft;
        #     missing it kills RUN steps with "netavark: nftables error:
        #     unable to execute nft" — heym run 25485629825 step 4/11.
        #   - unqualified-search-registries: podman refuses short FROM
        #     names without one — heym run 25484102037 4× build_failed.
        run: |
          set -euo pipefail
          if ! command -v nft >/dev/null 2>&1; then
            apt-get update -qq
            apt-get install -y --no-install-recommends nftables
            echo "installed nftables ($(nft --version 2>&1 | head -1))"
          else
            echo "nftables already present: $(nft --version 2>&1 | head -1)"
          fi
          conf=/etc/containers/registries.conf
          mkdir -p "$(dirname "$conf")"
          if [ -f "$conf" ] && grep -qE '^[[:space:]]*unqualified-search-registries[[:space:]]*=' "$conf"; then
            echo "registries.conf already declares unqualified-search-registries:"
            grep -E '^[[:space:]]*unqualified-search-registries[[:space:]]*=' "$conf"
          else
            printf '\n# added by auto-migrate-worker.yml\nunqualified-search-registries = ["docker.io"]\n' >> "$conf"
            echo "appended unqualified-search-registries=[\"docker.io\"] to $conf"
          fi

      - name: Ensure migration/${{ inputs.slug }} branch is up-to-date with template
        run: |
          set -euo pipefail
          ref="migration/${SLUG}"
          repo="${{ github.repository }}"
          template_sha=$(gh api "/repos/${repo}/branches/template" --jq .commit.sha)

          if ! gh api "/repos/${repo}/branches/${ref}" >/dev/null 2>&1; then
            # Branch missing — fork from template tip.
            gh api -X POST "/repos/${repo}/git/refs" \
              -f "ref=refs/heads/${ref}" \
              -f "sha=${template_sha}"
            echo "created ${ref} from template@${template_sha}"
            exit 0
          fi

          # Branch exists. If it has no slug-specific commits (i.e. it's a
          # stale fork of an older template tip), fast-forward to current
          # template HEAD so the worker runs the latest scripts. If it has
          # diverged commits (real WIP), leave it alone.
          # GitHub compare URL is /compare/{base}...{head}; .status describes
          # head's relationship to base. So compare/<ref>...template:
          #   ahead     → template has commits ref doesn't → safe to FF ref → template
          #   behind    → ref has commits template doesn't → real WIP, don't touch
          #   diverged  → both have unique commits → don't touch
          #   identical → no-op
          status=$(gh api "/repos/${repo}/compare/${ref}...template" --jq .status)
          echo "compare ${ref}...template: status=${status}"
          case "$status" in
            identical)
              echo "${ref} already at template@${template_sha}"
              ;;
            ahead)
              gh api -X PATCH "/repos/${repo}/git/refs/heads/${ref}" \
                -f "sha=${template_sha}" -F force=false
              echo "fast-forwarded ${ref} to template@${template_sha}"
              ;;
            behind|diverged)
              echo "::warning::${ref} has slug-specific commits (status=${status}); not auto-updating"
              ;;
            *)
              echo "::warning::unexpected compare status ${status}; leaving ${ref} alone"
              ;;
          esac

      - name: Checkout migration/${{ inputs.slug }}
        uses: actions/checkout@v4
        with:
          ref: migration/${{ inputs.slug }}
          fetch-depth: 0
          # Use GH_PAT (workflow scope) instead of the default GITHUB_TOKEN
          # so the post-cycle `git push migration/<slug>` is allowed to
          # update .github/workflows/trigger-build.yml (touched by
          # sync_trigger_build_options.py during cycle). Without this
          # the entire push is rejected by GitHub's GitHub-App push
          # protection ("refusing to allow a GitHub App to ... without
          # workflows permission") and every cycle local mod is dropped.
          # Observed in run 25484102037 (heym 2026-05-07T08:23).
          token: ${{ secrets.GH_PAT }}

      - name: Configure git identity
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bootstrap project board (idempotent)
        run: python3 scripts/project_board.py bootstrap

      - name: Mark Project In-Progress
        continue-on-error: true
        run: |
          python3 scripts/project_board.py update "$SLUG" --status=In-Progress

      - name: Resolve LazyCat CLI token (signin if missing/expired)
        run: |
          python3 scripts/lzc_token_refresh.py

      - name: Pre-flight LazyCat App Store recheck
        id: preempt
        continue-on-error: true   # never block on transient store API errors
        run: |
          set +e
          python3 scripts/store_preempt_check.py "$SLUG"
          rc=$?
          echo "rc=$rc"
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # rc=3 → preempted (someone else shipped this slug between Approved
          # and now). rc=0 → clear. rc=1 → could not determine; proceed.
          exit 0

      - name: Mark Project Filtered if preempted
        if: steps.preempt.outputs.rc == '3'
        run: |
          set -euo pipefail
          python3 scripts/project_board.py update "$SLUG" \
            --status=Filtered \
            --field="Failures=preempted: a LazyCat App Store entry now matches this slug; see ai-reviews.jsonl reviewer=preempt"
          echo "::notice::aborting migration of $SLUG — already published on LazyCat App Store"

      - name: Run one migration cycle
        if: steps.preempt.outputs.rc != '3'
        id: cycle
        run: |
          set -euo pipefail
          python3 scripts/auto_migration_service.py \
            --once \
            --target-slug "$SLUG" \
            --max-migrations-per-cycle 1 \
            --max-discovery-reviews-per-cycle 0 \
            --enable-build-install \
            --enable-codex-worker \
            --max-codex-attempts "${{ inputs.max_codex_attempts || 3 }}" \
            --resume \
            --commit-scaffold \
            --no-env-file \
            --disable-discord \
            --disable-local-agent

      - name: Push migration/${{ inputs.slug }}
        if: always() && steps.preempt.outputs.rc != '3'
        continue-on-error: true
        run: |
          set +e
          # WIP commit before push: persist what the cycle wrote into
          # apps/<slug>/ and the slug's registry/repos/<slug>.json so
          # claude's planner output + bootstrap_migration's scaffold +
          # codex repair edits survive even when the cycle ended in
          # build_failed and full_migrate's --commit-scaffold never
          # fired. Observed in stellaclaw runs 25491577249 / 25492174092.
          #
          # Scope is INTENTIONALLY narrow:
          #   * apps/<slug>/         — per-slug working tree (fine)
          #   * registry/repos/<slug>.json — per-slug build config (fine)
          #
          # We DELIBERATELY do NOT add queue.json / ai-reviews.jsonl /
          # state-history.jsonl / registry/candidates/. Those are
          # template-level globals owned by auto-discover.yml's commit
          # step. If a cycle's local mutations to those landed on a
          # migration/<slug> branch, the next worker pulling that branch
          # would see a stale snapshot of the global state — observed in
          # stellaclaw run 25496216697 where queue.state=build_failed got
          # captured into migration/stellaclaw, then locked the slug out
          # because the branch's queue.json never refreshed even after
          # template's queue.json was reset to ready.
          git add "apps/$SLUG/" "registry/repos/$SLUG.json" 2>/dev/null
          if ! git diff --cached --quiet; then
            git commit -m "wip(worker): cycle artifacts from run ${GITHUB_RUN_ID:-?} (${SLUG})" || true
          fi
          git push origin "migration/$SLUG" || true

      - name: Map queue state -> Project Status
        if: always() && steps.preempt.outputs.rc != '3'
        id: post
        env:
          # Hard cap so a slug stuck at scaffolded/ready (e.g. scaffold succeeds
          # but the build never converges) eventually transitions to Blocked
          # instead of bouncing Approved → In-Progress forever.
          MAX_RERUN_ATTEMPTS: "5"
        run: |
          set -euo pipefail
          read -r state attempts <<<"$(python3 - <<'PY'
          import json, os, pathlib, sys
          slug = os.environ["SLUG"]
          path = pathlib.Path("registry/auto-migration/queue.json")
          if not path.exists():
              print(""); sys.exit(0)
          for it in json.loads(path.read_text()).get("items", []):
              if it.get("slug") == slug:
                  print(it.get("state", ""), int(it.get("attempts") or 0)); sys.exit(0)
          print("")
          PY
          )"
          attempts="${attempts:-0}"
          # ready / scaffolded mean the cycle made partial progress but still
          # needs another worker pass. Putting them back to Approved lets the
          # dispatcher re-fan them out; In-Progress would be a dead end since
          # the dispatcher only picks Approved cards.
          rerun_status="Approved"
          if [ "${attempts}" -ge "${MAX_RERUN_ATTEMPTS}" ]; then
            rerun_status="Blocked"
          fi
          case "$state" in
            installed|browser_pending)                                status="Browser-Test";    next="verify" ;;
            scaffolded)                                               status="$rerun_status";   next="rerun" ;;
            ready)                                                    status="$rerun_status";   next="rerun" ;;
            # advance_discovery_reviewer demotes ready items that lack a
            # verdict back to discovery_review for AI re-evaluation. Send
            # them to Inbox so the next auto-discover cycle picks them up
            # for review — Blocked would burn a real candidate. Observed
            # in run 25484105991 (cosmos-server 2026-05-07T08:23).
            discovery_review)                                         status="Inbox";           next="re-review" ;;
            build_failed|codex_failed)                                status="Blocked";         next="blocked" ;;
            browser_failed)                                           status="Awaiting-Human";  next="wait" ;;
            browser_passed|copy_ready|publish_ready|waiting_for_human) status="Awaiting-Human";  next="wait" ;;
            published)                                                status="Published";       next="done" ;;
            filtered_out)                                             status="Filtered";        next="done" ;;
            *)                                                        status="Blocked";         next="unknown" ;;
          esac
          echo "queue_state=$state"  >> "$GITHUB_OUTPUT"
          echo "project_status=$status" >> "$GITHUB_OUTPUT"
          echo "next_action=$next"   >> "$GITHUB_OUTPUT"
          echo "Slug=$SLUG state=$state attempts=$attempts -> status=$status, next=$next"
          python3 scripts/project_board.py update "$SLUG" --status="$status"
          if [ "$status" = "Blocked" ] && { [ "$state" = "scaffolded" ] || [ "$state" = "ready" ]; }; then
            python3 scripts/project_board.py update "$SLUG" \
              --field="Failures=exhausted ${attempts} rerun attempts at state=${state}; needs human triage"
          fi

      - name: Hand off to auto-verify
        if: success() && steps.post.outputs.next_action == 'verify'
        run: |
          gh workflow run auto-verify.yml \
            --repo "${{ github.repository }}" \
            --ref template \
            --field slug="$SLUG"

      - name: Record failure on Project
        if: failure()
        continue-on-error: true
        run: |
          python3 scripts/project_board.py update "$SLUG" \
            --status=Blocked \
            --field="Failures=workflow ${{ github.run_id }} failed"
