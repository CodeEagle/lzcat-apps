# Phase F5 — browser verification.
#
# Runs in the lzcat-bb-browser image (Playwright + Python). Orchestrates the
# existing scripts:
#   - browser_acceptance_plan.py      -> .browser-acceptance-plan.json
#   - capture_web_screenshot.py       -> apps/<slug>/acceptance/<slug>-home.png
#   - functional_checker.py           -> apps/<slug>/.functional-check.json
#
# functional_checker classifies the run as browser_pass / browser_failed /
# browser_pending. Without an agent-driven .browser-acceptance.json (the
# Codex Browser-Use agent writes that), we'll typically land at
# browser_pending — Project moves to Awaiting-Human and a real human (or a
# future Codex Browser-Use stage) closes the loop.

name: Auto-Verify

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Migration slug to verify"
        required: true
        type: string

permissions:
  contents: write   # commit screenshots + check JSON back to migration/<slug>

concurrency:
  group: verify-${{ inputs.slug }}
  cancel-in-progress: true   # newer verify runs supersede stale ones

defaults:
  run:
    shell: bash

jobs:
  verify:
    name: verify-${{ inputs.slug }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/codeeagle/lzcat-bb-browser:latest
    timeout-minutes: 30
    env:
      SLUG: ${{ inputs.slug }}
      GH_TOKEN: ${{ secrets.GH_PAT }}
      GH_PAT: ${{ secrets.GH_PAT }}
      LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
      LAZYCAT_BOX_DOMAIN: ${{ secrets.LAZYCAT_BOX_DOMAIN }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      IS_SANDBOX: "1"

    steps:
      - name: Validate slug
        run: |
          case "$SLUG" in
            ""|*[!a-zA-Z0-9._-]*)
              echo "::error::Invalid slug: '$SLUG'"
              exit 1
              ;;
          esac

      - name: Ensure migration/${{ inputs.slug }} branch is up-to-date with template
        # Mirrors auto-migrate-worker.yml's same step. Without this, auto-verify
        # checks out a stale migration/<slug> sha from before recent script
        # fixes and breaks at import time. Specifically: stellaclaw run
        # 25530354890 still hit `ImportError: cannot import name 'UTC'`
        # after b34809b (UTC compat fix) had landed on template, because
        # migration/stellaclaw had been reset to a pre-fix sha and auto-verify
        # had no FF logic.
        run: |
          set -euo pipefail
          ref="migration/${SLUG}"
          repo="${{ github.repository }}"
          template_sha=$(gh api "/repos/${repo}/branches/template" --jq .commit.sha)
          if ! gh api "/repos/${repo}/branches/${ref}" >/dev/null 2>&1; then
            echo "::warning::${ref} does not exist — auto-verify needs the worker to have run first"
            exit 0
          fi
          status=$(gh api "/repos/${repo}/compare/${ref}...template" --jq .status)
          echo "compare ${ref}...template: status=${status}"
          case "$status" in
            identical) echo "${ref} already at template@${template_sha}" ;;
            ahead)
              gh api -X PATCH "/repos/${repo}/git/refs/heads/${ref}" \
                -f "sha=${template_sha}" -F force=false
              echo "fast-forwarded ${ref} to template@${template_sha}"
              ;;
            behind|diverged)
              echo "::warning::${ref} has slug-specific commits (status=${status}); not auto-updating"
              ;;
            *) echo "::warning::unexpected compare status ${status}; leaving ${ref} alone" ;;
          esac

      - name: Checkout migration/${{ inputs.slug }}
        uses: actions/checkout@v4
        with:
          ref: migration/${{ inputs.slug }}
          fetch-depth: 1

      - name: Configure git identity
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bootstrap project board (idempotent)
        # The "Map check + AI verdict -> Project Status" step at the end
        # of this workflow calls `project_board.py update` which requires
        # the project-cache.json to exist (mapping slugs to project item
        # ids). Without bootstrap, that step fails with "Project not
        # bootstrapped" and the verify run ends in failure even when
        # bb-browser + AI verdict both succeeded. Observed in stellaclaw
        # runs 25526203429 + 25529932498.
        run: python3 scripts/project_board.py bootstrap

      - name: Resolve entry URL
        id: url
        run: |
          set -euo pipefail
          if [ -z "${LAZYCAT_BOX_DOMAIN:-}" ]; then
            echo "::error::LAZYCAT_BOX_DOMAIN secret is not set"
            exit 1
          fi
          entry_url="$(python3 - <<'PY'
          import os, sys, pathlib
          sys.path.insert(0, "scripts")
          from browser_acceptance_plan import build_acceptance_plan
          plan = build_acceptance_plan(
              pathlib.Path("."),
              os.environ["SLUG"],
              box_domain=os.environ["LAZYCAT_BOX_DOMAIN"],
          )
          print(plan["entry_url"])
          PY
          )"
          echo "entry_url=$entry_url" >> "$GITHUB_OUTPUT"
          echo "Entry URL: $entry_url"

      - name: Generate acceptance plan
        run: |
          python3 scripts/browser_acceptance_plan.py "$SLUG" \
            --box-domain "$LAZYCAT_BOX_DOMAIN"

      - name: Walk the app with Playwright (writes .browser-acceptance.json)
        id: walk
        continue-on-error: true   # exit code 2 = walk found issues; we still want functional check + AI to weigh in
        run: |
          python3 scripts/browser_acceptance_runner.py "$SLUG" \
            --timeout-ms 60000

      - name: Run functional check
        id: check
        continue-on-error: true   # exit code 2 means browser_failed/pending; we still want to update Project + commit
        run: |
          python3 scripts/functional_checker.py "$SLUG" \
            --box-domain "$LAZYCAT_BOX_DOMAIN"

      - name: AI verify review (Claude)
        id: review
        continue-on-error: true   # never block the workflow on the reviewer; map status step has fallbacks
        run: |
          python3 scripts/claude_verify_reviewer.py "$SLUG"

      - name: Map check + AI verdict -> Project Status
        if: always()
        id: post
        run: |
          set -euo pipefail
          status="$(python3 - <<'PY'
          import json, os, pathlib, sys
          slug = os.environ["SLUG"]
          path = pathlib.Path(f"apps/{slug}/.functional-check.json")
          if not path.exists():
              print("browser_pending"); sys.exit(0)
          payload = json.loads(path.read_text())
          print(payload.get("browser_acceptance_status", "browser_pending"))
          PY
          )"
          ai="$(python3 - <<'PY'
          import json, os, pathlib, sys
          slug = os.environ["SLUG"]
          p = pathlib.Path(f"apps/{slug}/.claude-verify-review.json")
          if not p.exists():
              print("missing||0"); sys.exit(0)
          d = json.loads(p.read_text())
          print(f"{d.get('verdict','missing')}||{d.get('score', 0)}")
          PY
          )"
          ai_verdict="${ai%%||*}"
          ai_score="${ai##*||}"
          case "$ai_verdict" in
            pass)         project_status="Awaiting-Human" ;;   # AI says ship; human still clicks Publish
            fail)         project_status="Blocked" ;;
            needs_human)  project_status="Awaiting-Human" ;;
            *)
              # AI review missing/errored — fall back to mechanical mapping.
              case "$status" in
                browser_pass|browser_failed|browser_pending) project_status="Awaiting-Human" ;;
                *) project_status="Blocked" ;;
              esac
              ;;
          esac
          {
            echo "browser_status=$status"
            echo "ai_verdict=$ai_verdict"
            echo "ai_score=$ai_score"
            echo "project_status=$project_status"
          } >> "$GITHUB_OUTPUT"
          echo "Slug=$SLUG  browser=$status  ai=$ai_verdict@$ai_score -> $project_status"
          python3 scripts/project_board.py update "$SLUG" \
            --status="$project_status" \
            --field="Failures=ai=${ai_verdict}@${ai_score}; browser=${status}"

      - name: Commit verification artifacts
        if: always()
        run: |
          set -euo pipefail
          ART=(
            "apps/${SLUG}/.browser-acceptance-plan.json"
            "apps/${SLUG}/.functional-check.json"
            "apps/${SLUG}/.claude-verify-review.json"
            "apps/${SLUG}/acceptance/"
          )
          # -f forces add through .gitignore: these paths are
          # gitignored in apps/*/ to keep operator-local validation
          # runs from polluting the branch, but auto-verify's whole
          # purpose is to commit them as verification evidence
          # (SKILL.md rule 13 — real screenshots from running install).
          # Without -f, git refuses with "paths are ignored by one of
          # your .gitignore files" — observed in stellaclaw runs
          # 25530354890 and 25530458232.
          for path in "${ART[@]}"; do
            if [ -e "$path" ]; then git add -f "$path"; fi
          done
          if git diff --cached --quiet; then
            echo "auto-verify: no artifacts changed"
            exit 0
          fi
          git commit -m "chore(${SLUG}): record browser verification artifacts"
          for attempt in 1 2 3 4; do
            if git pull --rebase --autostash origin "migration/$SLUG" \
              && git push origin "migration/$SLUG"; then
              echo "auto-verify: pushed on attempt $attempt"
              exit 0
            fi
            sleep $((2 ** attempt))
          done
          echo "auto-verify: push failed after 4 attempts" >&2
          exit 1

      - name: Surface failure
        if: failure() && steps.check.outcome == 'failure'
        run: |
          echo "::warning::functional_checker exited non-zero — Project marked Blocked"
          python3 scripts/project_board.py update "$SLUG" --status=Blocked || true
