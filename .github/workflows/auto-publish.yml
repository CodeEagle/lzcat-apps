# Phase F6 — human-triggered publish stage. Runs copywriter + prepare_store_submission
# on a slug that's already passed verification, then opens a PR for human green-light.
#
# Intentionally workflow_dispatch only — no cron. Human operator clicks
# "Run workflow" once Awaiting-Human review on the Project board passes.

name: Auto-Publish

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Migration slug to publish"
        required: true
        type: string
      developer_url:
        description: "Override developer apps URL (otherwise from project-config.json)"
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: publish-${{ inputs.slug }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish-${{ inputs.slug }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/codeeagle/lzcat-migration-runner:latest
    timeout-minutes: 20
    env:
      SLUG: ${{ inputs.slug }}
      GH_TOKEN: ${{ secrets.GH_PAT }}
      GH_PAT: ${{ secrets.GH_PAT }}
      LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
      LZC_USR: ${{ secrets.LZC_USR }}
      LZC_PWD: ${{ secrets.LZC_PWD }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

    steps:
      - name: Validate slug
        run: |
          case "$SLUG" in
            ""|*[!a-zA-Z0-9._-]*)
              echo "::error::Invalid slug: '$SLUG'"
              exit 1
              ;;
          esac

      - name: Checkout migration/${{ inputs.slug }}
        uses: actions/checkout@v4
        with:
          ref: migration/${{ inputs.slug }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve LazyCat CLI token (signin if missing/expired)
        run: |
          python3 scripts/lzc_token_refresh.py

      - name: Run copywriter
        continue-on-error: true   # copywriter is best-effort; submission step is authoritative
        run: |
          python3 scripts/copywriter.py "$SLUG"

      - name: Prepare store submission
        run: |
          ARGS=("$SLUG")
          if [ -n "${{ inputs.developer_url }}" ]; then
            ARGS+=("--developer-url" "${{ inputs.developer_url }}")
          fi
          python3 scripts/prepare_store_submission.py "${ARGS[@]}"

      - name: Commit submission package
        run: |
          set -euo pipefail
          git add "apps/${SLUG}/store-submission/" "apps/${SLUG}/" || true
          if git diff --cached --quiet; then
            echo "auto-publish: no submission changes"
            exit 0
          fi
          git commit -m "chore(${SLUG}): prepare store submission $(date -u +%Y-%m-%dT%H:%MZ)"
          git push origin "migration/$SLUG"

      - name: Open publish PR
        id: pr
        run: |
          set -euo pipefail
          existing="$(gh pr list --repo "${{ github.repository }}" \
                     --head "migration/$SLUG" --base template \
                     --state open --json number,url -q '.[0].url' || true)"
          if [ -n "$existing" ]; then
            echo "pr_url=$existing" >> "$GITHUB_OUTPUT"
            echo "Reusing existing PR: $existing"
            exit 0
          fi
          body=$(cat <<EOF
          Automated publish PR. Submission package generated by auto-publish.yml.

          Reviewer checklist:
          - [ ] copywriter output reviewed
          - [ ] store-submission/ assets confirmed
          - [ ] LazyCat App Store metadata correct
          - [ ] icon + screenshots match guidelines

          Slug: \`${SLUG}\`
          Run: ${{ github.run_id }}
          EOF
          )
          pr_url="$(gh pr create \
            --repo "${{ github.repository }}" \
            --base template \
            --head "migration/$SLUG" \
            --title "publish(${SLUG}): release-ready submission" \
            --body "$body")"
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Mark Project Published-pending
        continue-on-error: true
        run: |
          python3 scripts/project_board.py update "$SLUG" \
            --status=Awaiting-Human \
            --field="PR=${{ steps.pr.outputs.pr_url }}"
